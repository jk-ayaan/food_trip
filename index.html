당 중 한 곳으로, 식당과 카페 공원이 함께 있는 복합외식공간이다. 음식의 수준도 무척 높지만 이곳에서 보이는 바다풍경은 정말 각별하다.","en":"Originally a cattle ranch, this place is one of the most famous restaurants in Yeongdo Island. It is a complex dining space with a restaurant, a cafe, and a park. The food is very good, but the view of the sea from this place is something else.","ja":"もともと牛を飼育する牧場だったこの場所は、影島で最も有名なお店のひとつである。お店とカフェのある公園が併設されている複合型飲食店で、料理のレベルも高いがここから見える海の風景は格別だ。"},"c":"고기·구이","g":"영도구","p":"0507-1440-5000","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418142211660_thumbL","lat":35.07162,"lng":129.05736,"v":6463,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1250&lang_cd=ko"},{"n":{"ko":"톤쇼우 광안점","en":"Tonshou","ja":"トンショウ"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"광안해변로279번길 13","en":"13, Gwanganhaebyeon-ro 279beon-gil","ja":"広安海辺路279番ギル13"},"h":{"ko":"11:00-21:30\n(20:30 라스트 오더)","en":"11:00-21:30 \n(Last order 20:30)","ja":"11:00-21:30\n(20:30ラストオーダー)"},"x":{"ko":"명절","en":"Traditional holidays","ja":"名節(旧正月·秋夕)"},"d":{"ko":"오픈 2시간 전부터 대기 줄이 있을 만큼 유명한 돈까스 전문점으로, 두툼하면서도 무척 부드러운 이곳의 돈까스는 참숯으로 훈연하여 놀라운 맛을 선사한다. 기다리는 손님을 위한 배려로 2층에 휴게공간을 운영하고 있기도 하다.","en":"It is a famous pork cutlet specialty store that has a two-hour queue before opening. The thick but extremely soft meat is smoked over charcoal to create an amazing taste. They have a lounge area on the second floor for the customers in line.","ja":"オープン2時間前から行列ができるほど有名なトンカツ専門店。肉厚でとても柔らかいこのお店のトンカツは、炭で燻煙することで他にない味を出している。 待機中のお客様のために、2階に休憩スペースを準備している。"},"c":"한식·백반","g":"수영구","p":"010-5835-7978","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511142349184_thumbL","lat":35.15631,"lng":129.12474,"v":11236,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1251&lang_cd=ko"},{"n":{"ko":"그라치에","en":"Grazie","ja":"グラチエ"},"m":{"ko":"감자뇨끼, 오징어먹물리조또","en":"Potato Gnocchi, Squid Ink Risotto","ja":"ジャガイモのニョッキ, イカ墨リゾット"},"a":{"ko":"영도구 청학동로 12","en":"12, Cheonghakdong-ro, Yeongdo-gu","ja":"影島区昌学洞路12"},"h":{"ko":"11:30-21:30\n(15:00-17:00 브레이크 타임)\n(14:30 라스트 오더)","en":"11:30-21:30 \n(Break time 15:00-17:00) \n(Last order 14:30)","ja":"11:30-21:30\n(15:00-17:00休憩時間)\n(14:30ラストオーダー)"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"모던한 인테리어의 작고 예쁜 이탈리안 레스토랑으로 많은 사람들이 이태리음식을 쉽게 접하길 바라는 마음을 담아 운영하고 있다고 한다. 특히, 이곳의 감자뇨끼는 손님들이 추천하는 메뉴이다.","en":"This small, cozy Italian restaurant with modern decor hopes to make Italian food more accessible to a wide audience. The potato gnocchi here is especially recommended by customers","ja":"モダンなインテリアのかわいいイタリアンレストランで多くの人にイタリア料理を気軽に味わってもらいたいという想いで営んでいる。特にジャガイモのニョッキはお客様に大人気のメニュー。"},"c":"양식·세계요리","g":"영도구","p":"0507-1392-6860","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418141051840_thumbL","lat":35.089043,"lng":129.06154,"v":4349,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1252&lang_cd=ko"},{"n":{"ko":"동촌황정순수육전골","en":"Dongchon Hwang Jeong-sun Suyuk Jeongol","ja":"ドンチョンファンジョン スンスユクジョンゴル"},"m":{"ko":"수육전골, 샤브샤브","en":"Suyuk Jeongol (Meat Hotpot), Shabu-Shabu","ja":"スユクジョンゴル(ゆで肉の寄せ鍋), しゃぶしゃぶ"},"a":{"ko":"조방로39-12","en":"39-12, Jobang-ro","ja":"ジョバン路39-12"},"h":{"ko":"월 -토 : 10:00-22:00","en":"Monday–Saturday: 10:00–22:00","ja":"月～土曜日：10:00-22:00"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"자극적이지 않지만 풍부한 맛의 국물요리가 특징인 곳으로, 미리 삶아 기름을 제거한 고기를 두껍게 썰어서 사용해 식감이 좋다. 모든 재료는 국내산을 사용하고 단 두 가지 메뉴만 정성껏 준비하고 있다.","en":"Their soup is rich without being spicy, and thick slices of meat that have been boiled in advance to remove lard have a nice texture to it. They use all ingredients that are domestically produced and carefully focus on preparing two menu items.","ja":"刺激的ではないが濃厚な味のスープが特徴的で、あらかじめ茹でて油を取り除いた肉を厚く切って使うので食感がよい。 すべての材料は国内産を使用し、２つのメニューのみを真心を込めて提供する。"},"c":"면·국물","g":"동구","p":"051-637-7178","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511153102499_thumbL","lat":35.13937,"lng":129.06071,"v":3571,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1255&lang_cd=ko"},{"n":{"ko":"소우닭계","en":"Soudakgye","ja":"ソウダッケ"},"m":{"ko":"매운 찜갈비 정식, 왕갈비탕, 한우 육개장","en":"Spicy Braised Ribs Set Meal, Wang Galbitang, Korean Beef Yukgaejang","ja":"辛味カルビチム定食, 王カルビタン, 韓牛ユッケジャン"},"a":{"ko":"조방로 16번길 20","en":"20, Jobang-ro 16beon-gil","ja":"ジョバン路16番ギル20"},"h":{"ko":"월-일 : 10:00-22:00","en":"Monday–Sunday: 10:00–22:00","ja":"月～日曜日：10:00-22:00"},"x":{"ko":"","en":"","ja":"日曜日"},"d":{"ko":"이름처럼 소와 닭을 사용한 한식요리를 전문으로 하는 곳으로, 오너쉐프의 비법으로 만든 부드러운 갈비찜이 유명하다. 밑반찬까지 직접 장만하고 있는 이곳은 혼자서도 갈비찜을 먹을 수 있는 메뉴가 준비되어 있다.","en":"As the name suggests, this restaurant specializes in Korean cuisine using beef and chicken. They are famous for the owner-chef’s tender ribs using the secret recipe. They make all the side dishes from scratch, and singleserving braised ribs are also available.","ja":"店名のように牛(ソ)と鶏(ダッ)を使った韓国料理を専門に扱うお店で、オーナーシェフの秘法で作った柔らかいカルビチムが有名。 おかずも直接準備しており、１人でもカルビチムを食べられるメニューが嬉しい。"},"c":"고기·구이","g":"동구","p":"051-633-2292","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511154322467_thumbL","lat":35.13942,"lng":129.0646,"v":3695,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1256&lang_cd=ko"},{"n":{"ko":"양지추어탕","en":"Yangji Chueotang","ja":"ヤンジ チュオタン"},"m":{"ko":"추어탕, 추어튀김, 코다리찜","en":"Chueotang (Loach Soup), Fried Loach, Kodarijjim (Braised Pollack)","ja":"チュオタン(ドジョウのスープ), ドジョウの天ぷら, コダリチム(スケトウダラの蒸し物)"},"a":{"ko":"중앙대로371번길 70-4","en":"70-4, Jungang-daero 371beon-gil","ja":"中央大路371番ギル70-4"},"h":{"ko":"월-일 : 11:00-20:00","en":"Monday–Sunday: 11:00–20:00","ja":"月～日曜日：11:00-20:00"},"x":{"ko":"한 달에 한번 일요일 휴무 (비 정기적 휴무)","en":"Closed one Sunday a month (irregular schedule)","ja":"月1回日曜日休業(不定休)"},"d":{"ko":"커다란 가마솥으로 끓인 추어탕에 농가에서 공수한 고춧가루를 사용하고, 직접 담은 김치를 사용하는 안심할 수 있는 식당이다. 저렴한 가격에 비해 놀라운 맛과 푸짐한 양의 음식이 제공되어 단골고객이 많다고 한다.","en":"Yangji Chueotang uses a large traditional-style cauldron to boil their chueotang (loach soup). They use red pepper powder from the local farm and make their own kimchi, which says a lot about the food’s quality. They have many regulars thanks to the amazing flavors and generous amount of food at low prices.","ja":"大きな釜で煮込んだチュオタン(ドジョウのスープ)に農家から仕入れた粉唐辛子を入れ、自家製のキムチを使用する安心できるお店。 手頃な価格でおいしくボリュームたっぷりの料理が提供されるため常連客が多いという。"},"c":"면·국물","g":"동구","p":"051-467-3924","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511160051644_thumbL","lat":35.130672,"lng":129.04565,"v":3310,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1257&lang_cd=ko"},{"n":{"ko":"초량통닭","en":"Choryang Tongdak","ja":"草梁トンダック"},"m":{"ko":"후라이드, 닭도리탕, 백숙","en":"Fried Chicken, Dakdoritang (Spicy Chicken Soup), Baeksuk (Chicken Soup)","ja":"メニュー フライド, 鶏肉の炒め煮, 水炊き"},"a":{"ko":"초량로 15","en":"15, Choryang-ro","ja":"草梁路15"},"h":{"ko":"월-토 : 16:00-23:30","en":"Monday–Saturday: 16:00–23:30","ja":"月～土曜日：16:00-23:30"},"x":{"ko":"일요일/명절","en":"Sundays/Traditional holidays","ja":"日曜日/ 名節(旧正月·秋夕)"},"d":{"ko":"1976년부터 40년이 넘게 운영하고 있는 이곳은, 이 지역에서는 모르는 사람이 드문 유명한 식당이다. 이곳의 육즙 가득한 프라이드치킨은 오랫동안 사랑받아온 메뉴로, 언제나 퇴근 후의 직장인들이 만석을 이루고 있다.","en":"This restaurant, which has been in business for over 40 years since 1976, is so famous that almost everybody knows about it. The juicy fried chicken here has been a favorite for a long time, and it is always full of office workers who visit after work.","ja":"1976年から40年以上営業してきたこのお店は、この地域では知らない人がほとんどいないほど有名。 肉汁あふれるフライドチキンは長年愛されてきたメニューで、いつも会社帰りの会社員でいっぱい。"},"c":"면·국물","g":"동구","p":"051-468-2738","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511163126270_thumbL","lat":35.118904,"lng":129.03996,"v":4526,"l":20,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1260&lang_cd=ko"},{"n":{"ko":"홍성방","en":"Hongseongbang","ja":"ホンソンバン"},"m":{"ko":"물만두 ￦8,000 / 10,000\n오향장육 ￦30,000 / 40,000","en":"Water Dumplings ￦8,000 / 10,000\nOhyangjangyuk(Five-Spice Sliced Steamed Pork) ￦30,000 / 40,000","ja":"水餃子 ￦8,000/10,000\n五香醤肉 ￦30,000/40,000"},"a":{"ko":"동구 중앙대로 179번길 16","en":"16, Jungang-daero 179beon-gil, Dong-gu","ja":"東区中央大路179番ギル16"},"h":{"ko":"11:00-15:00 / 17:00-21:30","en":"11:00-15:00 / 17:00-21:30","ja":"11:00-15:00 / 17:00-21:30"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"3대에 걸쳐 50년이 넘게 운영해오고 있는 이곳은, 부산차이나타운에서도 가장 유명한 식당 중 한 곳이다. 오래전부터 영주동 물만두집으로 불렸을 만큼 물만두가 인기 있으며, 주말에는 지방에서도 찾아오는 단골손님들이 많다.","en":"This restaurant, which has been operated for over 50 years by three generations, is one of the most famous restaurants in Busan’s Chinatown. Water dumplings are so popular that they have long been called “Yeongju-dong water dumplings,” and there are many regulars coming from other provinces on weekends as well.","ja":"3代にわたり50年以上営業してきたこのお店は、釜山のチャイナタウンで最も有名なお店のひとつ。昔から「ヨンジュドンの水餃子やさん」と呼ばれているほど水餃子が人気で、週末には地方から訪れる常連客も多い。"},"c":"한식·백반","g":"동구","p":"051-467-5398","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416173708292_thumbL","lat":35.113834,"lng":129.03781,"v":6361,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1262&lang_cd=ko"},{"n":{"ko":"먹음직 온천천점","en":"Meogeumjik","ja":"モグムジク"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"온천천로431번길 4-1","en":"4-1, Oncheoncheon-ro 431beon-gil","ja":"温泉川路431番ギル4-1"},"h":{"ko":"월-금 : 16:00-23:00\n(22:00 라스트 오더)\n토-일 : 12:00-23:00\n(15:00-16:00 브레이크 타임)\n(22:00 라스트 오더)","en":"Monday–Friday: 16:00–23:00\n(Last order at 22:00)\nSaturday–Sunday: 12:00–23:00\n(Break time 15:00–16:00)\n(Last order at 22:00)","ja":"月～金曜日：16:00-23:00\n(ラストオーダー22:00)\n土・日曜日：12:00-23:00\n(休憩時間15:00-16:00)\n(ラストオーダー22:00)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"온천천 카페거리에 있는 구이전문점인 이곳은, 유통도 함께 하고 있어 언제나 신선한 고기가 준비되어 있다. 직접 숙성한 고기와 함께 모든 음식을 정직하고 정성스럽게 제공하고 있는 곳으로 높은 평가를 받고 있다.","en":"This grill restaurant located on the Oncheoncheon Cafe Street also distributes meat, so fresh meat is always ready. They also prepare meat through an aging process and are highly acclaimed for serving all dishes with integrity and sincerity.","ja":"温泉川カフェ通りにある焼き物専門店。流通業も共に営んでおり、いつも新鮮な肉を用意している。 直接熟成させた肉はもちろん、すべての料理を誠実に丁寧に提供するお店として高い評価を受けている。"},"c":"카페·베이커리","g":"동래구","p":"0507-1319-2888","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511173540705_thumbL","lat":35.19219,"lng":129.1003,"v":4296,"l":11,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1264&lang_cd=ko"},{"n":{"ko":"미미루","en":"Mimiru","ja":"ミミル"},"m":{"ko":"짜장면 ￦7,000\n탕수육 ￦23,000","en":"Jjajangmyeon ￦7,000\nSweet and Sour Pork ￦23,000","ja":"ジャジャン麺 ₩7,000\n酢豚 ₩23,000"},"a":{"ko":"온천장로 91-1","en":"91-1, Oncheonjang-ro","ja":"オンチョンジャン路91-1"},"h":{"ko":"11:30-15:00 / 17:00-21:00","en":"11:30-15:00 / 17:00-21:00","ja":"11:30-15:00 / 17:00-21:00"},"x":{"ko":"명절 당일 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"스타일리시한 중화요리로 인기 높은 이곳은 보통의 중식전문점에서 쉽게 만날 수 없는 다양한 중화요리를 만날 수 있다. 식사시간은 웨이팅이 필수인 곳이기도 하다.","en":"Popular for its stylish Chinese cuisine, you’ll find a wide variety of dishes that you won’t find at your average Chinese restaurant. At mealtime, there is always a queue here.","ja":"スタイリッシュな中華料理として人気が高く、一般的な中華料理専門店では味わえない中華料理に出会えるお店。食事の時間帯にはウェイティング(入店までに並ぶこと)必須。"},"c":"중식","g":"동래구","p":"051-555-6609","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417100446762_thumbL","lat":35.219486,"lng":129.08296,"v":5233,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1265&lang_cd=ko"},{"n":{"ko":"밀보스79","en":"Milboss 79","ja":"ミルボス79"},"m":{"ko":"화덕 큐브스테이크, 게새피자, 생면 로제 파스타","en":"Oven-grilled Cube Steak, Crab and Shrimp Pizza, Fresh Rose Pasta","ja":"かまどキューブステーキ, カセピザ, 生麺ロゼパスタ"},"a":{"ko":"명륜로129번나길 11","en":"11, Myeongnyun-ro 129beonna-gil","ja":"明倫路129番ナギル11"},"h":{"ko":"월-일 : 12:00-02:00","en":"Monday–Sunday: 12:00–02:00","ja":"月～日曜日：12:00-02:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"캐주얼한 분위기의 실내가 먼저 눈에 들어오는 이곳은, 파스타나 피자 등의 메뉴와 함께 술을 즐길 수 있는 다이닝펍으로, 비교적 부담 없는 가격으로 좋은 시간을 보낼 수 있는 곳이다. 직접 만든 면과 소스를 사용한 파스타가 특히 맥주와 어울린다고 한다.","en":"The first thing that catches your eye is the casual atmosphere. This is a dining pub where you can spend a good time at a relatively affordable price, enjoying drinks with pasta and pizza. Their pasta and sauce made from scratch go really well with beer.","ja":"カジュアルな雰囲気の店内が素敵なこのお店は、パスタやピザなどのメニューとお酒が楽しめるダイニングパブ。比較的手頃な価格で楽しいひと時を過ごすことができる。 手作りの麺とソースを使ったパスタが特にビールに合う。"},"c":"고기·구이","g":"동래구","p":"0507-1341-8568","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511175416697_thumbL","lat":35.2058,"lng":129.08028,"v":4268,"l":8,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1266&lang_cd=ko"},{"n":{"ko":"세연정","en":"Seyeonjeong","ja":"セヨンジョン"},"m":{"ko":"특갈비살, 양념갈비 2대, 갈비살소금구이","en":"Special Ribs, Seasoned Ribs, 2 pcs, Grilled Ribs with Salt","ja":"特カルビ, 味付けカルビ2本, カルビの塩焼き"},"a":{"ko":"충렬대로 149","en":"149, Chungnyeol-daero","ja":"忠烈大路149"},"h":{"ko":"월-일 : 11:30-22:00","en":"Monday–Sunday: 11:30–22:00","ja":"月～日曜日：11:30-22:00"},"x":{"ko":"명절","en":"Traditional holidays","ja":"名節(旧正月·秋夕)"},"d":{"ko":"소갈비로 유명한 구이전문 패밀리레스토랑으로 청결한 공간과 높은 수준의 서비스를 자랑하는 이곳은, 직거래하는 향토 식자재와 직접 만든 된장, 유명한 산지에서 공수한 재료들을 사용하여 정성들인 음식을 제공하고 있다.","en":"A family restaurant specializing in grilled beef, Seyeonjeong is particularly known for its beef ribs. They boast a high level of hygiene and service and serve directly sourced local ingredients, homemade doenjang, and foods produced by renowned suppliers.","ja":"牛カルビで有名な焼き物専門ファミリーレストラン。清潔な室内とレベルの高いサービスを誇るこのお店は、直接仕入れる郷土食材や手作りの味噌、産地から空輸した材料を使って、真心を込めた料理を提供する。"},"c":"고기·구이","g":"동래구","p":"051-506-6666","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512093357835_thumbL","lat":35.20514,"lng":129.07704,"v":4270,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1268&lang_cd=ko"},{"n":{"ko":"조방낙지마당","en":"Jobang Nakji Madang","ja":"ジョバンナクヂマダン"},"m":{"ko":"낙지볶음, 낙새, 낙곱","en":"Stir-fried Octopus, Stir-fried Octopus with Shrimp, Stir-fried Octopus with Gopchang","ja":"テナガダコ炒め, テナガダコ・エビ, テナガダコ・ホルモン"},"a":{"ko":"사직북로47번길 14-4","en":"14-4, Sajikbuk-ro 47beon-gil","ja":"社稷北路47番ギル14-4"},"h":{"ko":"월-토 : 10:30-21:30","en":"Monday–Saturday: 10:30–21:30","ja":"月～土曜日：10:30-21:30"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"조방낙지라는 이름의 식당들은 대부분 보증된 맛을 가지고 있는데, 이곳 역시 보증된 낙지전문점이다. 이 지역에서 오랜 시간을 보내온 식당답게 단골손님도 많고, 다른 낙지전문점에 비해 낮은 가격이 마음을 든든하게 한다.","en":"Most of the restaurants named “Jobang Nakji” have guaranteed quality, and this is also a guaranteed octopus restaurant. As with any business that has been in the neighborhood for a long time, it has many regular\ncustomers, and the more affordable prices compared to other octopus restaurants will give you peace of mind.","ja":"「チョバンナクヂ」という名前が入ったお店の味は大体保証されているが、このお店も保証されたナクヂ(テナガダコ)専門店である。 この地域で長年営業してきただけあって常連客も多く、他のナクヂ専門店に比べて低価格なのが心強い。"},"c":"해산물·회","g":"동래구","p":"051-505-0708","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512094717830_thumbL","lat":35.19913,"lng":129.05907,"v":4196,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1269&lang_cd=ko"},{"n":{"ko":"초록담미역국","en":"Chorokdam Miyeokguk","ja":"チョロクダムわかめスープ"},"m":{"ko":"조개미역국, 한우 미역국","en":"Clam Seaweed Soup, Korean Beef Seaweed Soup","ja":"貝わかめスープ, 韓牛ワカメスープ"},"a":{"ko":"동래구 사직로 73, 2층","en":"2F, 73, Sajik-ro, Dongnae-gu","ja":"東莱区 社稷路73, 2階"},"h":{"ko":"월-일 : 10:00-20:30\n(15:00-16:30 브레이크 타임)\n(19:30 라스트 오더)\n\n*화요일 정기 휴무","en":"Monday–Sunday: 10:00–20:30\n(Break time 15:00–16:30)\n(Last order at 19:30)\n\n*Closed on Tuesdays","ja":"月～日曜日：10:00-20:30\n(休憩時間15:00-16:30)\n(ラストオーダー19:30)\n\n*火曜日は定休日"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"미역국에 사용되는 한우는 비계와 힘줄을 직접 제거하고, 직접 만든 반찬과 양념, 그리고 매일 새로 담근 김치를 준비한다. 이곳은 집밥같은 음식을 준비하는 미역국전문점으로 자극적이지 않은 맛으로 유명하다.","en":"The restaurant prepares hanwoo used for seaweed soup by removing the fat and tendons and makes their own side dishes and seasonings, as well as fresh kimchi every day. They specialize in seaweed soup, the ultimate “home-cooked food,” and are known for their mild taste.","ja":"ミヨックク(わかめスープ)に使われる韓牛は脂とすじを直接取り除き、自家製のおかずと調味料、そして毎日新たに漬けるキムチを準備する。このお店は家庭料理を提供するわかめスープ専門店で、刺激的でなくやさしい味が有名。"},"c":"해산물·회","g":"동래구","p":"0507-1422-5256","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230608101144664_thumbL","lat":35.194927,"lng":129.05788,"v":4060,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1270&lang_cd=ko"},{"n":{"ko":"타이빈","en":"Thai Bin","ja":"タイビン"},"m":{"ko":"크랩 팟 퐁 커리 ￦38,000-65,000\n뿌님 팟 퐁 커리 ￦30,000-55,000","en":"Crab Pat Phong Curry ￦38,000-65,000\nPunim Pat Phong Curry ￦30,000-55,000","ja":"クラブパッポンカレー ￦38,000-65,000\nプニムパッポンカレー ￦30,000-55,000"},"a":{"ko":"동래구 금강로73번길 12","en":"12, Geumgang-ro 73beon-gil, Dongnae-gu","ja":"東莱区クムガン路73番ギル12"},"h":{"ko":"11:00-15:00 / 17:00-22:00","en":"11:00-15:00 / 17:00-22:00","ja":"11:00-15:00 / 17:00-22:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"태국 정부로부터 Thai select 최고등급인 signature 인증을 받았다는 태국음식전문점으로, 태국인요리사가 준비하는 정통태국음식이 준비되어 있다. 태국으로 여행 온 기분을 느끼게 해주는 인테리어가 무척 인상적인 곳이다.","en":"This Thai restaurant has received the signature certification, the highest grade of Thai select, by the Thai government. They serve authentic Thai food prepared by a Thai chef. The decor of this place makes you feel like you are in Thailand.","ja":"タイ政府からThai selectの最高等級であるsignatureの認証を受けたタイ料理専門店。タイ人シェフが準備する正統派のタイ料理を楽しめる。タイへ旅行に来たような気分を感じさせるインテリアがとても印象的。"},"c":"양식·세계요리","g":"동래구","p":"051-558-8885","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250515170015997_thumbL","lat":35.216263,"lng":129.0773,"v":5320,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1271&lang_cd=ko"},{"n":{"ko":"경찰서옆초밥집","en":"Gyeongchalseo Yeop Chobapjip","ja":"警察署のとなりの寿司屋"},"m":{"ko":"추천초밥 12p, 광어+연어초밥 10p, 생선턱살구이","en":"Recommended Sushi 12p, Halibut and Salmon Sushi 10p, Grilled Fish Collar","ja":"おまかせ寿司　12p, ひらめ+サーモン寿司　10p, 魚のかま焼き"},"a":{"ko":"부산광역시 부산진구 부전로 92 1층","en":"15 Bujeon-ro 111beon-gil","ja":"釜田路111番ギル15"},"h":{"ko":"화요일~일요일 11:30~21:00\n(15:00~17:00 브레이크타임)","en":"Tuesday–Sunday: 17:00–22:00","ja":"火～日曜日：17:00-22:00"},"x":{"ko":"월요일","en":"Mondays","ja":"月曜日"},"d":{"ko":"18년 경력의 오너 쉐프가 모든 재료를 직접 만들고 손질한다. 매일 5시간씩 정성껏 준비한 재료와 알찬 구성 그리고 보증된 솜씨로 만들어 내는 초밥은 당신을 실망시키지 않는다.","en":"The owner-chef with 18 years of experience prepares and cooks all the ingredients. The sushi, made with guaranteed workmanship with ingredients carefully prepared for five hours every day, will not disappoint you.","ja":"18年の経歴を持つオーナーシェフがすべての材料を直接仕込む。 毎日5時間、丹念に準備した材料や充実した構成、保証された腕前で握るお寿司は、いつも私たちの期待に応えてくれる。"},"c":"일식","g":"부산진구","p":"0507-1408-3189","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512104118922_thumbL","lat":35.159702,"lng":129.05392,"v":6547,"l":14,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1272&lang_cd=ko"},{"n":{"ko":"동백아가씨1961 서면점","en":"Dongbaek Agassi 1961","ja":"椿の娘1961"},"m":{"ko":"빨간동백떡볶이, 하얀동백떡볶이, 떡꼬치","en":"Red Camellia Tteokbokki, White Camellia Tteokbokki, Rice Cake Skewers","ja":"赤い椿トッポッキ, 白い椿トッポッキ, 餅の串焼き"},"a":{"ko":"서전로37번길 18","en":"18, Seojeon-ro 37beon-gil","ja":"ソジョン路37番ギル18"},"h":{"ko":"화-일 : 11:30-21:00\n(16:00-17:00 브레이크 타임)","en":"Tuesday–Sunday: 11:30–21:00\n(Break time 16:00–17:00)","ja":"火～日曜日：11:30-21:00\n(休憩時間16:00-17:00)"},"x":{"ko":"월요일","en":"Mondays","ja":"月曜日"},"d":{"ko":"빈티지한 인테리어의 카페 같은 이곳은 놀랍게도 유명한 즉석떡볶이 전문점이다. 유명산지의 고춧가루를 사용하는 등 좋은 재료를 사용하고, 라면부터 돈까스까지 다양한 토핑을 추가할 수 있는 매력적인 곳이다.","en":"This cafe-like place with a vintage interior is surprisingly famous for its instant tteokbokki. They use quality ingredients such as red pepper powder from famous regions and add various toppings from ramen to pork cutlets.","ja":"ビンテージなインテリアのカフェのようなこのお店は、有名な即席トッポッキ専門店。 有名産地の粉唐辛子を使うなど良質な材料を使い、ラーメンからトンカツまで様々なトッピングが追加できる魅力的なお店だ。"},"c":"분식·주점","g":"부산진구","p":"0507-1373-1961","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512105240390_thumbL","lat":35.158566,"lng":129.064,"v":4662,"l":9,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1273&lang_cd=ko"},{"n":{"ko":"장어촌","en":"Jangeochon","ja":"うなぎ村"},"m":{"ko":"민물장어구이, 바다장어구이","en":"Grilled Freshwater Eel, Grilled Sea Eel","ja":"焼きうなぎ, 焼きあなご"},"a":{"ko":"부산진구 부전로96번길 36","en":"36, Bujeon-ro 96beon-gil, Busan-jin-gu","ja":"釜山鎮区釜田路96番ギル36"},"h":{"ko":"월-일 : 11:00-23:00","en":"Monday–Sunday: 11:00–23:00","ja":"月～日曜日：11:00-23:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"年中無休"},"d":{"ko":"부산에서 장어구이를 이야기할 때 항상 최고로 거론되는 곳 중 한 곳으로, 주문즉시 장만한 장어와 6시간을 끓여 만든 특제한방소스를 경험해 본다면 누구나 그 사실을 인정할 수밖에 없을 것 같다.","en":"It is one of the best places when it comes to grilled eel in Busan. Once you experience their eel prepared immediately upon order and the special herbal sauce boiled for 6 hours, you will have no choice but to admit it.","ja":"釜山でジャンオクイ(焼きうなぎ)を語る際、一番人気のあるお店のひとつ。注文後すぐに仕込んだうなぎと6時間煮込んで作った特製韓方ソースを食べたことのある人は、その事実を認めざるを得ない。"},"c":"해산물·회","g":"부산진구","p":"051-803-9617","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230602134652545_thumbL","lat":35.15863,"lng":129.05667,"v":5113,"l":10,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1275&lang_cd=ko"},{"n":{"ko":"전통음식점 원양","en":"Traditional Restaurant Wonyang","ja":"伝統飲食店 ウォンヤン"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"동평로 420번길 23","en":"23, Dongpyeong-ro 420beon-gil","ja":"東平路420番ギル23"},"h":{"ko":"월-일 : 11:00-22:30\n\n*1,3번째 일요일 정기 휴무","en":"Monday–Sunday: 11:00–22:30\n\n*Closed on 1st and 3rd Sunday of the month","ja":"月～日曜日：11:00-22:30\n\n*第1、第3日曜日は定休日"},"x":{"ko":"1,3주 일요일 휴무","en":"Closed on 1st and 3rd Sunday of the month","ja":"第1、第3日曜日は定休日"},"d":{"ko":"좋은 재료로 직접담은 김치와 밑반찬, 시골집에서 공수한 장류 및 장아찌들을 사용하여 30년이 넘게 꾸준히 직장인들의 사랑을 받아온 곳으로, 미식가들 사이에서 특히 평이 좋은 곳이라 한다. 연회를 위한 단체석도 마련되어 있다.","en":"It has been consistently loved by office workers for over 30 years by serving kimchi, side dishes, pickles, and sauces made with good ingredients sourced from country houses. It is especially well-reviewed by foodies. Group seating for banquets is also available.","ja":"良い材料で直接漬けたキムチとおかず、田舎から仕入れた醤類や漬物を扱う。30年以上にわたり会社員に愛されてきたお店で、美食家の間で特に評判のいいお店だ。 宴会のための団体席もある。"},"c":"한식·백반","g":"부산진구","p":"010-4545-0773","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512113115093_thumbL","lat":35.172222,"lng":129.06995,"v":4241,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1276&lang_cd=ko"},{"n":{"ko":"구공탄","en":"Gugongtan","ja":"クゴンタン"},"m":{"ko":"항정살, 마늘항정살, 껍데기","en":"Pork Jowl, Garlic Pork Jowl, Pork Rinds","ja":"豚トロ, ニンニク豚トロ, 皮"},"a":{"ko":"동평로 75","en":"75, Dongpyeong-ro","ja":"東平路75"},"h":{"ko":"월-토 : 16:00-24:00","en":"Monday–Saturday: 16:00–24:00","ja":"月～土曜日：16:00-24:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜日は定休日"},"d":{"ko":"주문과 함께 썰어내는 고기는 포를 뜨는 방식으로 썰어 더 좋은 식감을 자랑한다. 된장찌개로도 유명한 이곳은 오직 항정살만 전문적으로 취급하고 있는 구이전문점으로 운이 좋다면 유쾌한 이벤트도 경험할 수 있다.","en":"The meat is sliced very thinly after ordering, which creates a nicer texture. Also famous for doenjang jjigae, this restaurant specializes in grilled pork jowls. If you are lucky, you may encounter a delightful event.","ja":"注文と同時にさばくお肉は、薄切りに切り分けられさらに良い食感を出す。 味噌チゲでも有名なこのお店は、豚トロだけを専門的に扱っている焼き物専門店で、運が良ければ愉快なイベントも体験できる。"},"c":"고기·구이","g":"부산진구","p":"0507-1309-9204","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512114353372_thumbL","lat":35.165436,"lng":129.03777,"v":4342,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1277&lang_cd=ko"},{"n":{"ko":"금용만두","en":"Geumyong Dumpling","ja":"金龍餃子"},"m":{"ko":"찐만두 ￦8,000\n군만두 ￦8,000","en":"Steamed Dumplings ￦8,000\nPan-fried Dumplings ￦8,000","ja":"蒸し餃子 ₩8,000\n焼き餃子 ₩8,000"},"a":{"ko":"구포만세길 75","en":"75, Gupomanse-gil, Buk-gu","ja":"北区クポマンセギル75"},"h":{"ko":"월-일 : 10:30-20:30","en":"Monday–Sunday: 10:30–20:30","ja":"月～日曜日：10:30-20:30"},"x":{"ko":"명절휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"1960년부터 운영해온 중국만두전문점으로 찐돼지껍질과 사태, 소꼬리 살로 소를 만드는 산둥식 만두를 만들고 있다. 준비해둔 재료가 언제나 당일 소진이 될 정도로 인기가 높다.","en":"This Chinese dumpling restaurant has been operating since 1960, making Shandong-style dumplings with braised pork skin and oxtail meat. It is so popular that the prepared ingredients are always sold out on the same day.","ja":"1960年から営んでいる中国餃子専門店。蒸した豚の皮や牛の足、尾の肉でタネを作る山東式餃子。 準備しておいた材料がいつも当日に売り切れるほど人気がある。"},"c":"고기·구이","g":"북구","p":"051-332-1261","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417154726545_thumbL","lat":35.205463,"lng":128.99666,"v":6735,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1278&lang_cd=ko"},{"n":{"ko":"웅천집","en":"Ungcheonjip","ja":"ウンチョンチブ"},"m":{"ko":"향어회, 메기매운탕, 장어구이","en":"Leather Carp Hoe, Catfish Maeuntang (Spicy Soup), Grilled Eel","ja":"ヒャンオフェ(カガミゴイの刺身), ナマズのメウンタン, 焼きうなぎ"},"a":{"ko":"금곡대로616번길 7-14","en":"7-14, Geumgok-daero 616beon-gil","ja":"金谷大路616番ギル7-14"},"h":{"ko":"월-일 : 11:30-21:30\n(15:00-16:00 브레이크 타임)\n(20:30 라스트 오더)","en":"Monday–Sunday: 11:30–21:30\n(Break time 15:00–16:00)\n(Last order at 20:30)","ja":"月～日曜日：11:30-21:30\n(休憩時間15:00-16:00)\n(ラストオーダー20:30)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"1964년부터 3대째 운영하고 있는 전통 있는 식당으로, 3년 숙성 초장으로 만든 특제소스와 먹는 향어회가 특히 유명하지만, 고민 끝에 결국 장어구이와 매운탕까지 모든 메뉴를 먹게 된다는 무서운 곳이기도 하다.","en":"This is a traditional restaurant that has been in business for three generations since 1964. It is especially famous for the special sauce made with soy sauce aged for three years and leather carp hoe, but after deliberation, many guests end up trying out all the menu items, including grilled eel and maeuntang.","ja":"1964年から3代が営んできた伝統あるお店。3年熟成させた酢コチュジャンで作った特製ソースと食べるヒャンオフェ(カガミゴイの刺身)が特に有名だが、悩んだ末に結局焼きうなぎやメウンタンまですべてのメニューを食べることになってしまうという。"},"c":"해산물·회","g":"북구","p":"051-332-8740","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512131313725_thumbL","lat":35.26257,"lng":129.0153,"v":6288,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1279&lang_cd=ko"},{"n":{"ko":"평양집","en":"Pyeongyangjip","ja":"平壌チブ"},"m":{"ko":"만두백반, 만두전골, 녹두전","en":"Dumpling Set Meal, Dumpling Hotpot, Mung Bean Pancake","ja":"餃子定食, 餃子の寄せ鍋, 緑豆チヂミ"},"a":{"ko":"금곡대로 20번길 21","en":"21, Geumgok-daero 20beon-gil","ja":"金谷大路20番ギル21"},"h":{"ko":"월-토 : 10:30-16:00\n(15:30 라스트 오더)","en":"Monday–Saturday: 10:30–16:00\n(Last order at 15:30)","ja":"月～土曜日：10:30-16:00\n(ラストオーダー15:30)"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"24년째 운영 중인 평양식 수제만두집으로 흔치 않은 이북식 음식을 만날 수 있는 곳이다. 새벽마다 직접 만든 만두로 손님을 맞이하고 있으며, 100% 녹두를 이용해 만든 녹두전도 인기메뉴다.","en":"This is a Pyeongyangstyle handmade dumpling restaurant that has been open for 24 years. You can discover North Korean food here, a rarity in South Korea. They make dumplings every morning to welcome the guests, and the pancakes made of 100% mung beans is also a popular menu item.","ja":"24年間にわたり営んでいる平壌式の手作り餃子店。珍しい北朝鮮料理に出会える。 毎朝手作りの餃子でお客様を迎え、100%緑豆を使った緑豆チヂミも人気メニュー。"},"c":"면·국물","g":"북구","p":"0507-1475-5455","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512143357001_thumbL","lat":35.212116,"lng":129.00589,"v":4906,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1281&lang_cd=ko"},{"n":{"ko":"대왕불맛","en":"Daewang Bulmat","ja":"大王火味"},"m":{"ko":"막창반 곱창반, 불막창, 불곱창","en":"Half Abomasum, Half Intestines / Spicy Abomasum / Spicy Intestines","ja":"マクチャン(胃) 半、コプチャン(小腸)半 / ブルマクチャン(胃) / ブルコプチャン(小腸)"},"a":{"ko":"덕상로 54, 1층","en":"1F, 54, Deoksang-ro","ja":"ドクソン路54 1階"},"h":{"ko":"월-일 : 16:00-01:00\n\n*2,4째 주 월요일 정기 휴무","en":"Monday–Sunday: 16:00–01:00\n\n*Closed on 2nd and 4th Monday of the month","ja":"月～日曜日：16:00-01:00\n\n*第2、第4月曜日は定休日"},"x":{"ko":"2,4주 월요일","en":"2nd, 4th Mondays","ja":"第2·4週 月曜日"},"d":{"ko":"이곳은 테이크아웃과 배달을 전문으로 하는 내장요리전문점으로, 국내산 곱창·막창을 직화구이로 조리하여 제공한다. 수제양념으로 곱창 특유의 잡냄새를 제거한 매운 곱창메뉴가 인기 있다고 한다.","en":"This is a takeout and delivery restaurant specializing in offal cuisine and offers domestic gopchang and makchang cooked over direct fire. Their spicy gopchang, which eliminated the peculiar odor of intestines with homemade seasoning, is a popular item.","ja":"このお店はテイクアウトとデリバリー専門の内臓料理専門店。韓国産のホルモン(小腸·胃)を直火で焼いて提供する。自家製のタレにホルモン特有のにおいを取り除いた辛いコプチャンメニューが人気。"},"c":"고기·구이","g":"사상구","p":"051-303-5755","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512145041261_thumbL","lat":35.17614,"lng":128.99005,"v":4069,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1282&lang_cd=ko"},{"n":{"ko":"전골그집 주례본점","en":"Jeongol[Geujip]","ja":"ジョンゴル[クチブ]"},"m":{"ko":"얼큰한차돌박이전골, 차돌박이 숙주볶음, 비빔골뱅이","en":"Spicy Brisket Hot Pot, Stir-fried Brisket with Mung Bean Sprouts, Bibim Golbaenggi (Spicy Whelk)","ja":"辛い薄切り牛バラ肉の寄せ鍋, 薄切り牛バラ肉のもやし炒め, ビビンつぶ貝"},"a":{"ko":"가야대로 268-15, 1층","en":"1F, 268-15, Gaya-daero","ja":"伽耶大路268-15、1階"},"h":{"ko":"월-금 : 11:00-22:00\n(14:00-17:00 브레이크 타임)\n(21:00 라스트 오더)\n일요일 : 17:00-22:00\n(21:00 라스트 오더)","en":"Monday–Friday: 11:00–22:00\n(Break time 14:00–17:00)\n(Last order at 21:00)\nSundays: 17:00–22:00\n(Last order at 21:00)","ja":"月～金曜日：11:00-22:00\n(休憩時間14:00-17:00)\n(ラストオーダー21:00)\n日曜日：17:00-22:00\n(ラストオーダー21:00)"},"x":{"ko":"토요일","en":"Saturdays","ja":"土曜日"},"d":{"ko":"1년이 넘는 시간을 연구하여 만든 레시피로 만든 전골은 다소 찾기 힘든 골목 안쪽의 가게를 사람들로 북적이게 만들었다. 누구나 좋아할 것 같은 국물요리다.","en":"After researching for over a year, the owners developed an original hotpot recipe. Now, it has people fully packed in this hard-to-find hole in the wall of a restaurant inside a small alley. Everyone will love this soup.","ja":"1年以上時間をかけて出来上がったレシピで作るジョンゴル(鍋)のお店。少し見つけにくい路地の奥にあるがお客さんでにぎわっている。 誰もがおいしくいただけるスープ料理。"},"c":"면·국물","g":"사상구","p":"0507-1376-7988","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512155859812_thumbL","lat":35.149475,"lng":129.00208,"v":4258,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1284&lang_cd=ko"},{"n":{"ko":"함양본가어탕국수","en":"Hamyang Bonga Eotang Guksu","ja":"咸陽本家オタングクス"},"m":{"ko":"어탕국수, 참깨메기매운탕","en":"otang Noodles, Catfish Maeuntang (Spicy Soup)","ja":"オタングクス(魚スープ麺), ごま入りナマズのメウンタン"},"a":{"ko":"사상로181번길36","en":"36, Sasang-ro 181beon-gil","ja":"沙上路181番ギル36"},"h":{"ko":"월-일 : 10:00-22:00\n\n*격주 일요일 정기 휴무","en":"Monday–Sunday: 10:00–22:00\n\n*Closed every other Sunday","ja":"月～日曜日：10:00-22:00\n\n*隔週で日曜日定休日"},"x":{"ko":"격주 일요일 정기 휴무","en":"Closed every other Sunday","ja":"隔週で日曜日定休日"},"d":{"ko":"민물생선을 갈아서 만든 어탕국수는 생각보다 찾기 어려운 음식이다. 그래서인지 먼 거리에서 찾아오는 손님도 제법 많다는 이곳의 어탕국수는 많이 맵거나 자극적이지 않고 변함없는 맛으로 유명하다.","en":"Eotang guksu, noodles made with ground freshwater fish, are quite hard to find. Eotang guksu here is famous for its consistent taste without being too spicy or hard on the tongue. A lot of customers come from a far distance, too.","ja":"淡水魚をすりおろして作ったオタングクス(魚スープ麺)は、意外に珍しい食べ物である。 そのせいか遠方から訪れるお客さんも結構多いという。このお店のオタングクス(魚スープ麺)は、辛く刺激的ではない、いつも変わらない味。"},"c":"면·국물","g":"사상구","p":"051-312-4321","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512164338161_thumbL","lat":35.159695,"lng":128.98518,"v":5927,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1286&lang_cd=ko"},{"n":{"ko":"오공떵번","en":"50 Tan Binh","ja":"オゴントンボン"},"m":{"ko":"후띠우, 분짜, 넴","en":"Hu Tieu, Bun Cha, Nem","ja":"フーティウ, ブンチャー, ネム"},"a":{"ko":"승학로 50, 1층","en":"1F, 50, Seunghak-ro","ja":"昇鶴路50、1階"},"h":{"ko":"월-금 : 11:00-20:00\n토요일 : 11:00-17:00","en":"Monday–Friday: 11:00–20:00 \nSaturdays: 11:00–17:00","ja":"月～金曜日：11:00-20:00 \n土曜日：11:00-17:00"},"x":{"ko":"일요일 휴무","en":"Sundays","ja":"日曜日"},"d":{"ko":"한국에서 흔하게 맛볼 수 있는 쌀국수는 ‘포’라는 하노이식 쌀국수라면, 이곳은 ‘후띠우’라는 호치민식 쌀국수를 만들고 있다. ‘포’와는 달리 향이 강하지 않아 누구나 쉽게 즐길 수 있는 맛이다.","en":"While the Hanoi-style pho is perhaps the most common rice noodle in Korea, this place makes hu tieu, which are Ho Chi Minh-style. Unlike pho, the spices are not strong, which makes it enjoyable for everyone.","ja":"韓国でよく見かけるライスヌードルは、「フォー」と呼ばれるハノイ式だが、このお店では「フーティウ」と呼ばれるホーチミン式のライスヌードルを作っている。 「フォー」とは違い香りがきつくないため、誰でも気軽に楽しめる味だ。"},"c":"양식·세계요리","g":"사하구","p":"051-292-4441","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512165954952_thumbL","lat":35.105663,"lng":128.9738,"v":6193,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1287&lang_cd=ko"},{"n":{"ko":"우연횟집","en":"Uyeon Hoetjip","ja":"ウヨン フェッチブ"},"m":{"ko":"모듬회, 활어회","en":"Assorted Hoe, Hwareo Hoe (Prepared from live fish)","ja":"刺身の盛り合わせ, 活魚の刺身"},"a":{"ko":"낙동대로535번길18, 1층","en":"1F, 18, Nakdong-daero 535beon-gil","ja":"洛東大路535番ギル18、1階"},"h":{"ko":"월-토 : 18:00-24:00\n(23:00 라스트 오더)","en":"Monday–Saturday: 18:00–24:00\n(Last order at 23:00)","ja":"月～土曜日：18:00-24:00\n(ラストオーダー23:00)"},"x":{"ko":"일요일 휴무","en":"Sundays","ja":"日曜日"},"d":{"ko":"오픈 전 웨이팅으로 유명한 횟집으로, 주문 즉시 잡은 활어를 사용한다. 두툼한 회를 접시가 넘치도록 담아서 주는데 가격마저 저렴한 편이라, 대학가 상권인 이 지역에서 가장 인기 있는 주점 중 한 곳이라고 한다.","en":"This hoe restaurant is famous for long waits before opening. They prepare dishes with live fish caught immediately after ordering. They serve thick slices on a full plate at affordable prices, which makes it one of the most popular pubs in the college district.","ja":"オープン前のウェイティングで有名なフェッチブ(刺身屋)で、注文と同時に捕まえた活魚を使う。 ぶ厚いお刺身をお皿いっぱいに盛ってくれるうえ値段も安いので、大学周辺の商店街のこの地域で最も人気のある居酒屋のひとつだといわれる。"},"c":"해산물·회","g":"사하구","p":"0507-1461-0813","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512175424144_thumbL","lat":35.11137,"lng":128.96355,"v":6051,"l":18,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1289&lang_cd=ko"},{"n":{"ko":"마파람해물찜해물탕 구서본점","en":"Maparam Haemuljjim Haemultang Guseo Main Branch","ja":"マパラム　ヘムルチムヘムルタン 久瑞本店"},"m":{"ko":"해물찜 ￦60,000-90,000\n해물탕 ￦60,000-90,000","en":"Steamed seafood, Seafood soup","ja":"海鮮の蒸し物 ￦60,000-90,000\n海鮮鍋 ￦60,000-90,000"},"a":{"ko":"금정구 금강로 418 2층","en":"2F, 418, Geumgang-ro, Geumjeong-gu","ja":"金井区 金剛路 418 2階"},"h":{"ko":"11:00-15:00 / 17:00-22:30","en":"Monday–Sunday: 11:00–22:30\n(Break time 15:00–16:30)\n(Last order at 14:00, 21:00)","ja":"11:00-15:00 / 17:00-22:30"},"x":{"ko":"2, 4주 월요일 휴무","en":"Closed on second and fourth Mondays","ja":"第2/4月曜休み"},"d":{"ko":"깔끔한 외관과 인테리어를 가진 큰 규모의 매장은 언제나 손님들로 가득 차 있다. 2005년에 개업하여 꽤 오랜 시간 사랑받아 온 해산물요리전문점으로 싱싱한 해산물과 누구나 좋아할 것 같은 맛의 양념으로 인기 높은 곳이다.","en":"The spacious hall, with stylish external and internal decor, is always full of customers. Opened in 2005, it has been a longtime local favorite for its fresh seafood and delicious marinade that anyone would enjoy.","ja":"こぎれいな外観とインテリアの大きなお店はいつもお客さんでいっぱい。2005年に開業し長い間愛されてきた海産物料理専門店で、新鮮な海産物と誰でも食べやすい味付けで人気がある。"},"c":"해산물·회","g":"금정구","p":"051-557-5577","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230523140214260_thumbL","lat":35.244667,"lng":129.08856,"v":6171,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1436&lang_cd=ko"},{"n":{"ko":"청해수산","en":"Cheonghae Susan","ja":"チョンへスサン"},"m":{"ko":"모듬회, 제철 활어 (싯가)","en":"Assorted raw fish, Seasonal live fish (market price)","ja":"刺身の盛り合わせ, 旬の活魚(時価)"},"a":{"ko":"영도구 태종로 113번길 35","en":"35, Taejong-ro 113beon-gil, Yeongdo-gu","ja":"影島区 太宗路 113番キル 35"},"h":{"ko":"월-일 : 12:30-22:00\n(21:00 라스트 오더)\n\n*화요일 정기 휴무","en":"Monday–Sunday: 12:30–22:00\n(Last order at 21:00)\n\n*Closed on Tuesdays","ja":"月～日曜日：12:30-22:00\n(ラストオーダー21:00)\n\n*火曜日は定休日"},"x":{"ko":"화요일, 명절 휴무","en":"Closed on Tuesdays and public holidays","ja":"火曜、名節休み"},"d":{"ko":"두껍게 썬 회로 유명한 이 곳은 평범한 시장횟집처럼 보이지만 평일에도 이른 시간부터 늦은 시간까지 웨이팅이 이어지는 인기 있는 횟집이다. 회의 두께는 조절이 가능하고 포장을 위해 찾는 손님들도 많다.","en":"Famous for its thick slices of raw fish, it looks like an ordinary market hoetjip, but it is so popular that the queue starts early and remains long until late hours, even on weekdays. The thickness of raw fish can be accommodated. A lot of customers also frequent the place for takeouts.","ja":"ぶ厚く切った刺身で有名なこのお店は、普通の市場の刺身屋のように見えるが平日も早い時間から夜遅くまで列が続く人気の刺身屋だ。刺身の厚さは調節可能で、お持ち帰りで注文する客も多い。"},"c":"해산물·회","g":"영도구","p":"051-412-6888","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418144242123_thumbL","lat":35.092476,"lng":129.0438,"v":4870,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1437&lang_cd=ko"},{"n":{"ko":"궁중해물탕 조씨집 대연본점","en":"Gungjung Haemultang Jossijip","ja":"宮中ヘムルタン ジョシチブ"},"m":{"ko":"백년해물탕, 팔뚝탕","en":"100-Year Seafood Soup, Palttuktang (Fish entrails soup)","ja":"百年海鮮鍋, パルトゥクタン"},"a":{"ko":"남구 진남로 7-11","en":"7-11, Jinnam-ro, Nam-gu","ja":"南区 鎮南路 7-11"},"h":{"ko":"월-토 : 11:30-21:40\n(20:50 라스트 오더)","en":"Monday–Saturday: 11:30–21:40\n(Last order at 20:50)","ja":"月～土曜日：11:30-21:40\n(ラストオーダー20:50)"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"1959년에 개업하여 2대에 걸쳐 운영해오고 있는 유명한 해물탕전문점으로, 생선내장과 해물이 듬뿍 들어간 백년해물탕이 이곳의 대표 메뉴이다. 오랜 전통에만 기대지 않고 독자적인 메뉴를 개발하여 좋은 반응을 얻고 있는 곳이기도 하다.","en":"Opened in 1959, it is a famous seafood soup restaurant that has operated for two generations. The 100-year seafood soup with plenty of fish entrails and seafood is the main dish. It is receiving positive responses by developing original items without depending solely on long-standing traditional dishes.","ja":"1959年に開業し2代にわたって営む有名なヘムルタン(海鮮鍋)専門店で、魚の内臓と海鮮がたっぷり入った百年海鮮鍋が代表メニュー。長い伝統だけに頼らず、独自のメニューを開発し好評を得ている。"},"c":"해산물·회","g":"남구","p":"0507-1323-4749","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230524163636778_thumbL","lat":35.13556,"lng":129.09119,"v":4397,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1438&lang_cd=ko"},{"n":{"ko":"까치횟집","en":"Kkachi Hoetjip","ja":"カチフェッチブ"},"m":{"ko":"A코스, 모둠회","en":"A Course, Assorted raw fish","ja":"Aコース, 刺身の盛り合わせ"},"a":{"ko":"수영구 광안해변로344번길 17-20 풍경타워","en":"Punggyeong Tower, 17-20, Gwanganhaebyeon-ro 344beon-gil, Suyeong-gu","ja":"水営区 広安海岸路 344番キル 17-20 プンギョンタワー"},"h":{"ko":"월-일 : 10:30-22:30","en":"Monday–Sunday: 10:30–22:30","ja":"月～日曜日：10:30-22:30"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"광안리에는 멋진 바다풍경을 배경으로 식사 할 수 있는 좋은 횟집들이 많은데 이곳이 바로 그런 곳이다. 직접 준비하는 백김치가 회랑 잘 어울리고 간장게장과 새우장이 깔끔하고 맛있다.","en":"There are many good raw fish (Korean sashimi) restaurants in Gwangalli where you can dine\nagainst the backdrop of the wonderful sea view. Kkachi Hoetjip is one such place.\nThe white kimchi prepared from scratch goes well with raw fish, and the crabs and shrimp marinated in soy sauce are refreshingly tasty.","ja":"広安里には素敵な海の風景を背景に食事ができるフェッチブ(刺身屋)がたくさんあるが、\nこのお店がまさにその１つ。\n自家製の白キムチが刺身とよく合い、カンジャンケジャンと海老の醤油漬けがあっさりとおいしいお店。"},"c":"해산물·회","g":"수영구","p":"0507-1400-5663","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230524164757051_thumbL","lat":35.155018,"lng":129.13171,"v":5136,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1439&lang_cd=ko"},{"n":{"ko":"미청식당","en":"Micheong Sikdang","ja":"ミチョン食堂"},"m":{"ko":"앙장구 비빔밥, 참가자미 물회","en":"Angjanggu bibimbap, Dab mulhoe","ja":"バフンウニのビビンバ, マガレイの刺身入り冷やしスープ"},"a":{"ko":"기장군 일광읍 기장해안로 1303","en":"1303, Gijanghaean-ro, Ilgwang-eup, Gijang-gun","ja":"機張郡 日光邑 機張海岸路 1303"},"h":{"ko":"월-금 : 10:00-20:00\n(15:00-17:00 브레이크 타임)\n(19:40 라스트 오더)\n토-일 : 10:00-20:00\n(19:40 라스트 오더)","en":"Monday–Friday: 10:00–20:00\n(Break time 15:00–17:00)\n(Last order at 19:40)\nSaturday–Sunday: 10:00–20:00\n(Last order at 19:40)","ja":"月～金曜日：10:00-20:00\n(休憩時間15:00-17:00)\n(ラストオーダー19:40)\n土・日曜日：10:00-20:00\n(ラストオーダー19:40)"},"x":{"ko":"2, 4주 수요일, 명절 휴무","en":"Closed on second and fourth Wednesdays and public holidays","ja":"第2/4水曜、名節休み"},"d":{"ko":"일광해수욕장 해변에 자리한 이곳은 성게의 한 종류인 앙장구(말똥성게)비빔밥을 전문으로 하는 해산물식당으로 한정적인 메뉴를 취급하고 있는 것이 더 신뢰가 간다. 웨이팅이 상당한 곳이다.","en":"Located at Ilgwang Beach, Micheong specializes in bibimbap using common sea urchins, locally called “anjanggu.” Having a few items on the menu adds to the restaurant’s credibility. The waitlist is considerably long.","ja":"日光海水浴場の海辺に位置するウニの一種アンジャング(バフンウニ)ビビンバを専門としている、海産物のお店で限定されたメニューのみを扱っているので信頼できる。意外と待ち時間が長いお店でもある。"},"c":"해산물·회","g":"기장군","p":"051-721-7050","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230525150604270_thumbL","lat":35.260254,"lng":129.2332,"v":5340,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1441&lang_cd=ko"},{"n":{"ko":"피아크 카페&베이커리","en":"P. Ark Cafe&Bakery","ja":"ピアク カペ エン ベーカリー"},"m":{"ko":"마일드블루돌체라떼 ￦8,000\n피아크 몽블랑 ￦7,500","en":"Mild blue dolce latte ￦8,000\nP.ARK mont blanc ￦7,500","ja":"マイルドブルードルチェラテ ￦8,000\nピアクモンブラン ￦7,500"},"a":{"ko":"영도구 해양로 195번길 180 4층","en":"4F, 180, Haeyang-ro 195beon-gil, Yeongdo-gu","ja":"影島区 海洋路 195番キル 180 4階"},"h":{"ko":"월-일 : 10:00-23:00","en":"Monday–Sunday: 10:00–23:00","ja":"月～日曜日：10:00-23:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"하버뷰를 자랑하는 거대한 베이커리카페로 주말이면 유원지라도 온 듯 많은 인파가 몰리지만, 워낙 넓은 공간을 가지고 있어 웨이팅은 생각보다 짧다. 약 80여 종의 다양한 베이커리와 음료, 아이스크림이 준비되어 있고 볼거리가 많은 곳이다.","en":"This huge bakery cafe boasts its harbor view. During weekends, crowds gather here like an amusement park, but the wait is short thanks to the spacious hall. It serves over 80 different bakeries, drinks, and ice cream and has various things to see.","ja":"ハーバービューを誇る大きなベーカリーカフェで、週末には遊園地でも来たかのように多くの人々が集まるが、広い店内のおかげで待ち時間は思ったより少ない。約80種類のベーカリーと飲み物、アイスクリームが揃う見どころが多いお店。"},"c":"카페·베이커리","g":"영도구","p":"051-404-9204","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250529162311917_thumbL","lat":35.08665,"lng":129.077,"v":7731,"l":8,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1445&lang_cd=ko"},{"n":{"ko":"큐제","en":"QG","ja":"キュジェ"},"m":{"ko":"크로아상, 바게트","en":"Croissant, Baguette","ja":"クロワッサン, バゲット"},"a":{"ko":"부산 연제구 중앙대로1043번길 34","en":"34, Jungang-daero 1043beon-gil, Yeonje-gu, Busan","ja":"釜山広域市蓮堤区チュンアンデロ1043番ギル34"},"h":{"ko":"월-금 : 08:30-22:00\n(21:30 라스트 오더)\n토-일 : 11:00-21:00\n(20:30 라스트 오더)","en":"Monday–Friday: 08:30–22:00\n(Last order at 21:30)\nSaturday–Sunday: 11:00–21:00\n(Last order at 20:30)","ja":"月～金曜日：08:30-22:00\n(ラストオーダー21:30)\n土・日曜日：11:00-21:00\n(ラストオーダー20:30)"},"x":{"ko":"","en":"","ja":""},"d":{"ko":"프랑스인 파티셰가 운영하는 작은 베이커리 카페로, 최상급 밀과 버터를 사용하여 천연발효종과 저온숙성을 통해 빵을 구워낸다. 프랑스의 대표 빵인 바게트와 크로아상을 비롯해 20여 가지의 빵들을 만날 수 있다.\n\n*당분간 주말은 카페로만 운영 중","en":"QG is a small bakery cafe run by a French patisserie. It uses the finest wheat and butter to bake bread using natural sourdough starters and low-temperature fermentation. The cafe offers over 20 different kinds of bread, including baguettes and croissants, the best-known bakeries from France.\n\n*Weekend operations are limited to café until further notice","ja":"フランス人のパティシエが営む小さなベーカリーカフェで、最上級の小麦やバターを使用し天然発酵種と低温熟成でパンを焼き上げる。 フランスの代表的なパンであるバゲットやクロワッサンをはじめ、約20種類のパンに出会える。\n\n*当面の間、週末はカフェのみ営業中"},"c":"분식·주점","g":"금정구","p":"0507-1392-8489","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230531124838775_thumbL","lat":35.26486,"lng":129.08542,"v":3390,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1446&lang_cd=ko"},{"n":{"ko":"커피스가모 인 서면","en":"Coffee Sugamo in Seomyeon","ja":"コピスガモ イン 西面"},"m":{"ko":"사이폰커피(블렌딩), 생크림케이크","en":"Syphon coffee (blended), Cream cake","ja":"サイフォンコーヒー(ブレンド), 生クリームケーキ"},"a":{"ko":"부산진구 가야대로 755번길 23 1층","en":"1F, 23, Gaya-daero 755beon-gil, Busanjin-gu","ja":"釜山鎮区 伽倻大路 755番キル 23 1階"},"h":{"ko":"월-일 : 10:30-22:00","en":"Monday–Sunday: 10:30–22:00","ja":"月～日曜日：10:30-22:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"아주 드물게 전통적인 핸드드립과 사이폰을 이용해 커피를 내리는 이곳은 시간은 조금 더 걸리지만 색다른 커피를 즐길 수 있는 곳이다. 고급스러운 실내와 테이블 착석 후 주문하고 후불 결제하는 고풍스러운 운영을 고수하는 것도 인상적이다.","en":"This is a rare place that uses traditional hand-drip and syphon methods for brewing coffee. It takes a little longer, but the distinct flavors are worth it. The cafe has a very refined style and adheres to old ways of operation, such as taking orders after the customers are seated and receiving payment at the end of service.","ja":"滅多にみられない伝統的なハンドドリップとサイフォンを利用しコーヒーを淹れるこのお店は、時間は少しかかるがユニークなコーヒーを楽しむことができる。高級感のある室内とテーブルに着席した後に注文し、店を出る時に会計するという古風な運営にこだわるのも印象的。"},"c":"카페·베이커리","g":"부산진구","p":"051-818-1007","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230531125707807_thumbL","lat":35.15878,"lng":129.05403,"v":3890,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1447&lang_cd=ko"},{"n":{"ko":"칠암사계","en":"Chiramsagye","ja":"チルアムサゲ"},"m":{"ko":"소금빵(2) ￦4,000\n칠암돌만주 ￦2,300","en":"Salt bread(2) ￦4,000\nChiramdol Manju ￦2,300","ja":"塩パン(2) ￦4,000\nチルアムドル饅頭 ￦2,300"},"a":{"ko":"기장군 일광읍 칠암1길 7-10","en":"Chiram 1-gil, Ilgwang-eup, Gijang-gun","ja":"機張郡 日光邑 七岩1キル7-10"},"h":{"ko":"월-일 : 10:00-21:00","en":"Monday–Sunday: 10:00–21:00","ja":"月～日曜日：10:00-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"넓은 매장이 좁게 느껴질 정도로 많은 인파가 몰리는 이곳은 기장의 바다를 바라보면서 다양한 빵과 음료를 즐길 수 있는 유명한 카페다. 모든 곳이 예쁘고, 모든 빵이 맛있는 곳으로, 소금빵과 칠암돌만주가 특히 유명하다.","en":"This place attracts so many people that the huge hall feels small. At this famous cafe, customers can enjoy a variety of bread and drinks as they view the sea of Gijang. All the places are pretty, all the bread is delicious, and salt bread and Chiramdol Manju are especially famous.","ja":"広い店舗が狭く感じられるほど多くの人が集まるこのお店は、機張の海を眺めながら豊富な種類のパンや飲み物を楽しめる有名なカフェだ。どの場所も素敵でどのパンもおいしく、特に塩パンやチルアムドル饅頭が有名。"},"c":"카페·베이커리","g":"기장군","p":"0507-1318-4900","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416143959104_thumbL","lat":35.299957,"lng":129.25919,"v":9692,"l":8,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1448&lang_cd=ko"},{"n":{"ko":"초량온당","en":"Choryang Ondang","ja":"チョリャンオンダン"},"m":{"ko":"맘모스 ￦6,700-7,700\n크럼블 ￦5,700-6,500","en":"Mammoth ￦6,700-7,700\nCrumble ￦5,700-6,500","ja":"マンモス ￦6,700-7,700\nクランブル ￦5,700-6,500"},"a":{"ko":"동구 초량중로 135, 1층","en":"1F, 135, Choryangjung-ro, Dong-gu","ja":"東区 草梁中路 135、1階"},"h":{"ko":"화-토 : 12:00-19:00","en":"12:00–19:00","ja":"12:00-19:00"},"x":{"ko":"일, 월요일 휴무","en":"Closed on Sundays and Mondays","ja":"日曜、月曜休み"},"d":{"ko":"오픈시간이면 원하는 빵을 사기 위해 긴 줄이 생기는 유명 베이커리로 빵의 도시 부산에서도 보기 힘든 색다른 조합과 레시피의 다양한 빵들을 만날 수 있다. 특히 황 치즈를 사용한 빵들이 제일 인기 있다고 한다.","en":"At this famous bakery, a long queue is formed to buy the bread around the opening hour. You can find a variety of combinations and recipes that are rare even in Busan, the city of bread. The most popular items are bread made with yellow cheese","ja":"オープンの時間になるとパンを買うために長い列ができる有名ベーカリーで、パンの都市釜山でも珍しい組み合わせとレシピのパンに出会える。特に黄色いチーズを使ったパンが一番人気。"},"c":"카페·베이커리","g":"동구","p":"0507-1318-1271","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416173526207_thumbL","lat":35.123413,"lng":129.04155,"v":6288,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1450&lang_cd=ko"},{"n":{"ko":"원조 바다집","en":"Wonjo Badajip","ja":"元祖パダチブ"},"m":{"ko":"수중전골 ￦12,000\n낙지볶음 ￦11,000","en":"Sujung jeongol(Seafood hot pot) ￦12,000\nNakjibokkeum(Stir-fried small octopus) ￦11,000","ja":"海鮮寄せ鍋 ￦12,000\nテナガダコ炒め ￦11,000"},"a":{"ko":"중구 광복로 43번길 18-5","en":"18-5, Gwangbok-ro 43beon-gil, Jung-gu","ja":"中区 光復路 43番キル 18-5"},"h":{"ko":"월-일 : 11:00-21:00","en":"Monday–Sunday: 11:00–21:00","ja":"月～日曜日：11:00-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"대를 이어 50여 년을 운영 중인 유명한 식당으로 다수의 TV프로그램을 통해서도 많이 알려져 있다. 손질된 해산물이 가득 들어간 수중전골이 이곳을 유명하게 만든 메뉴이며 지역민들의 추억이 담긴 음식이기도 하다.","en":"The famous restaurant, which has been in business for more than 50 years, has also been introduced on several TV shows. Sujung jeongol, full of seafood ingredients, is the dish that made the place famous. It also evokes nostalgia to the locals.","ja":"代々にわたり50年以上営む有名なお店で、多数のテレビ番組を通じよく知られている。下ごしらえした海産物がたくさん入ったスジュンジョンゴル(海鮮寄せ鍋)はここを有名にしたメニューで、地域住民の思い出が詰まった食べ物でもある。"},"c":"해산물·회","g":"중구","p":"051-245-1924","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419111526831_thumbL","lat":35.100822,"lng":129.0299,"v":4114,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1451&lang_cd=ko"},{"n":{"ko":"이흥용과자점 부산대직영점","en":"Lee Heung-yong Bakery PSU Branch","ja":"イフンヨン菓子店 釜山大店"},"m":{"ko":"소금빵(2) ￦3,800\n명장전병 ￦13,000 / 23,000","en":"Salt bread(2) ￦3,800\nMyeongjang jeonbyeong ￦13,000 / 23,000","ja":"塩パン(2) ￦3,800\n名匠せんべい ￦13,000 / 23,000"},"a":{"ko":"금정구 부산대학로 63번길 30","en":"30, Busandaehak-ro 63beon-gil, Geumjeong-gu","ja":"金井区 釜山大学路 63番キル 30"},"h":{"ko":"월-일 : 08:30-21:00","en":"Monday–Sunday: 08:30–21:00","ja":"月～日曜日：08:30-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"너무나도 유명한 대한민국 제과명장의 베이커리로 4년간 간수 뺀 신안천일염, 제철 우리 농산물 등 좋은 재료를 사용한 100여종의 빵과 디저트를 매일 직접 구워 제공하고 있다.","en":"Owned by one of the most famous Korean confectionery masters, it uses quality ingredients such as sun-dried salt from Sinan that removed salt water for four years and seasonal domestic produce. Over 100 kinds of bread and desserts are prepared and served every day.","ja":"あまりにも有名な大韓民国製菓名匠のベーカリーで、4年間にがりを抜いたシンアン天日塩、旬の農産物など良質な材料を使った100種類以上のパンとデザートを毎日焼いて提供している。"},"c":"카페·베이커리","g":"금정구","p":"051-711-4454","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416104103550_thumbL","lat":35.23029,"lng":129.08397,"v":11818,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1452&lang_cd=ko"},{"n":{"ko":"소문난원조조방낙지본점","en":"Somunnan Wonjo Jobangnakji","ja":"ソムンナン 元祖ジョバンナクヂ"},"m":{"ko":"낙곱새(낙지/곱창/새우볶음), 각종 사리","en":"Nakgopsae (small octopus/pork intestines/shrimp), Various toppings","ja":"ナッコプセ(テナガダコ /コプチャン/ 海老炒め), / 各種追加トッピング"},"a":{"ko":"동래구 명륜로 94번길 37","en":"37, Myeongnyun-ro 94beon-gil, Dongnae-gu","ja":"東莱区 明倫路 94番キル 37"},"h":{"ko":"화-일 : 11:00-21:00\n(15:00-17:00 브레이크 타임)\n(20:30 라스트 오더)","en":"Tuesday–Sunday: 11:00–21:00\n(Break time 15:00–17:00)\n(Last order at 20:30)","ja":"火～日曜日：11:00-21:00\n(休憩時間15:00-17:00)\n(ラストオーダー20:30)"},"x":{"ko":"월요일, 명절 휴무","en":"Closed on Mondays and public holidays","ja":"月曜、名節休み"},"d":{"ko":"1972년부터 3대째 운영하고 있는 낙지볶음전문점으로 부산에서는 모르는 사람이 드문 식당 중 한 곳이기도 하다. 직접 뼈를 우려낸 육수와 비법 양념장으로 항상 많은 손님들이 찾는 곳이다.","en":"This restaurant has been in business for three generations since 1972 and is one of the best-known places in Busan. It is always filled with customers who enjoy bone broth made from scratch and secret marinade.","ja":"1972年から3代にわたり営むテナガダコ炒め専門店で、釜山では知らない人があまりいないというお店の一つ。骨からとった出汁と秘法のヤンニョムでいつも多くの客が訪れるところ。"},"c":"해산물·회","g":"동래구","p":"051-555-7763","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601144332074_thumbL","lat":35.203987,"lng":129.08392,"v":6163,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1453&lang_cd=ko"},{"n":{"ko":"오대양횟집","en":"Odaeyang Hoetjip","ja":"オデヤンフェッチブ"},"m":{"ko":"모듬회, 생삼겹","en":"Assorted raw fish, Pork belly","ja":"刺身の盛り合わせ , サムギョプサル"},"a":{"ko":"사상구 주례로 12","en":"12, Jurye-ro, Sasang-gu","ja":"沙上区 周禮路 12"},"h":{"ko":"매일 10:30~22:00 \n\n*일요일 휴무","en":"Monday–Sunday: 11:00–22:30 \n\n*Closed on Tuesdays","ja":"月～日曜日：11:00-22:30 \n\n*火曜日は定休日"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"평범한 횟집처럼 보이는 이곳은 회와 함께, 돼지·소고기 구이를 함께 하는 대단히 특이한 식당이다. 횟집에서 고기 먹는 사람이 있을까 싶은데 대부분 고기부터 시작해서 회로 마무리한다고 한다. 배달로도 인기 높은 곳이다.","en":"It looks like any other hoetjip that specializes in raw fish (Korean sashimi), but it unusually also offers pork and beef barbecue. Though it may seem unusual to eat meat at a raw fish place, most begin with meat and finish with raw fish. It is also a popular place for delivery.","ja":"普通の刺身屋のように見えるこのお店は、刺身と共に豚・牛肉の焼き物も提供するという非常に珍しいお店。刺身屋で肉を食べる人がいるのだろうかと思うが、大抵のお客さんが肉から始まり刺身で終わ るという。配達も人気がある。"},"c":"해산물·회","g":"사상구","p":"051-327-9463","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601145535123_thumbL","lat":35.150047,"lng":129.01125,"v":3806,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1454&lang_cd=ko"},{"n":{"ko":"오륙도낙지 범일본점","en":"Oryukdo Nakji Beomil Main Branch","ja":"五六島ナクヂ 凡一本店"},"m":{"ko":"낙곱새볶음, 해물 연포탕","en":"Nakgopsae bokkeum (small octopus, pork intestines, and shrimp stir-fry), Octopus and other seafood soup","ja":"ナッコプセ(テナガダコ /コプチャン/ 海老)炒め, 海鮮テナガダコスープ"},"a":{"ko":"동구 정공단로 46-1","en":"46-1, Jeonggongdan-ro, Dong-gu","ja":"東区 鄭公壇路 46-1"},"h":{"ko":"10:30-21:00","en":"10:30-21:00","ja":"10:30-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"1996년부터 30여 년을 운영 중인 곳으로 각종 TV프로그램을 통해서도 많이 소개된 곳으로, 유명세에 유사상호를 사용하는 곳들도 생겨 특허·상표등록을 했다고 한다. 동구의 1호 향토음식점이기도 하다.","en":"Since 1996, it has been operating for more than 30 years and has been introduced through various TV programs. Because of their fame, other places started using similar names, so they decided to register their patent and trademark. It was also designated as the first traditional Busan restaurant in Dong-gu.","ja":"1996年から約30年間営む、各種テレビ番組を通じて多く紹介されているお店。有名なことで類似した商号を使用する他店舗もあり特許・商標登録をしたという。東区の1号郷土料理店。"},"c":"해산물·회","g":"동구","p":"0507-1403-1593","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601150706501_thumbL","lat":35.136383,"lng":129.05554,"v":3642,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1455&lang_cd=ko"},{"n":{"ko":"일미아구찜","en":"Ilmi Agujjim","ja":"イルミアグチム"},"m":{"ko":"아귀찜 ￦40,000-60,000\n아귀수육 ￦60,000-80,000","en":"Agujjim(braised monkfish) ￦40,000-60,000\nAgu suyuk(steamed monkfish) ￦60,000-80,000","ja":"アンコウの蒸し物 ￦40,000-60,000\nゆでアンコウ ￦60,000-80,000"},"a":{"ko":"기장군 일광읍 학리등대로 102","en":"102, Hangnideungdae-ro, Ilgwang-eup, Gijang-gun","ja":"機張郡 日光邑 鶴里灯台路 102"},"h":{"ko":"월-일 : 10:30-20:00\n*화요일 정기 휴무","en":"10:30-20:00\n*Closed on Tuesdays","ja":"月～日曜日：10:30-20:00\n*火曜日は定休日"},"x":{"ko":"화요일, 명절 휴무","en":"Closed on Tuesdays and public holidays","ja":"火曜、名節休み"},"d":{"ko":"일광에 위치한 아귀찜전문점인 이곳은 어디서 구해오나 궁금할 정도로 커다란 아귀를 사용하여 아귀찜을 만든다. 정말 많은 사람들이 찾는 유명한 가게로 매운 정도를 선택할 수 있다.","en":"Located in Ilgwang Beach, this is an agujjim (braised monkfish) specialty restaurant. They use extra-large monkfish for the braise and allow customers to choose the level of spiciness at the time of order. It is very famous and filled with guests all the time.","ja":"日光に位置するアグチム(アンコウの蒸し物)専門店で、どこで仕入れるのか気になるほど大きなアンコウを使ってアンコウの蒸し物を作る。たくさんの人が訪れる有名なお店で、辛さの度合いを選ぶことができる。"},"c":"해산물·회","g":"기장군","p":"051-724-3318","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416143826363_thumbL","lat":35.25894,"lng":129.24767,"v":4700,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1456&lang_cd=ko"},{"n":{"ko":"제주복국","en":"Jeju Bokguk","ja":"済州ポックク"},"m":{"ko":"까치복 지리/매운탕 ￦18,000\n참복 지리/매운탕 ￦22,000","en":"Striped puffer soup(spicy or mild) ￦18,000\nTiger puffer soup(spicy or mild) ￦22,000","ja":"シマフグスープ/辛味スープ ￦18,000\nトラフグスープ/辛味スープ ￦22,000"},"a":{"ko":"영도구 절영로 481","en":"481, Jeoryeong-ro, Yeongdo-gu","ja":"影島区 絶影路 481"},"h":{"ko":"10:00-15:00 / 17:00-20:30","en":"10:00-15:00 / 17:00-20:30","ja":"10:00-15:00 / 17:00-20:30"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"뚝배기로 나오는 대부분의 복국집과 다르게 인원수만큼 끓인 복국을 그 자리에서 그릇에 담아준다. 부산에서 최고의 복국집을 거론할 때 항상 빠지지 않는 곳 중 한 곳으로 클래식한 분위기의 넓은 공간이 인상적인 곳이다.","en":"Unlike most bokguk (pufferfish soup) places that serve in earthen pots, this restaurant divides the soup on the spot by the number of people and serves them directly in the bowl. It is one of the best bokguk spots in Busan that always makes the list. The spacious hall is notable for its classic atmosphere.","ja":"土鍋で出てくる一般的なポックク(ふぐスープ)店とは異なり、人数分煮込んだふぐスープをその場で器に盛ってくれる。釜山で最高のふぐスープ店を取り上げる時、欠かすことのできないお店の一つでクラシックな雰囲気の広い空間が印象的。"},"c":"해산물·회","g":"영도구","p":"051-405-5050","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418144007166_thumbL","lat":35.07098,"lng":129.06885,"v":4581,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1457&lang_cd=ko"},{"n":{"ko":"1966정원 천성항점","en":"1966 Jungwon","ja":"1966ジョンウォン"},"m":{"ko":"블랙 쉬림프 버거, 클래식버거","en":"블랙 쉬림프 버거 , 클래식버거","ja":"ブラックシュリンプバーガー, クラシックバーガー"},"a":{"ko":"강서구 가덕해안로 787-1 1,2층","en":"787-1, Gadeokhaean-ro, Gangseo-gu","ja":"江西区 加德海岸路 787-1"},"h":{"ko":"월-금: 10:00-16:00 \n(15:00 라스트오더)\n토-일: 10:00-20:00 \n(19:00 라스트오더)","en":"Monday–Sunday: 10:00–19:00\n(Last order at 18:00)\nSaturday–Sunday: 09:00–21:00\n(Last order at 20:00)","ja":"月～日曜日：10:00-19:00\n(ラストオーダー18:00)\n土・日曜日：09:00-21:00\n(ラストオーダー20:00)"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"조용한 어촌마을에 자리한 양식당으로 아담한 정원과 엔틱풍의 인테리어가 돋보인다. 직접 구운 번으로 만든 수제버거가 대표메뉴이며 필라프, 샐러드 외에 다양한 음료도 준비되어 있는 곳.","en":"Located in a quiet fishing village, this western restaurant stands out with a small garden and an antique-style interior. Its main item is the handmade burger, made with buns baked by the owner. The menu also offers pilaf, salad, and various beverages.","ja":"静かな漁村に位置する洋食屋で、こぢんまりとした庭園とアンティーク風のインテリアが素敵なお店。直接焼いたバンズで作る手作りバーガーが代表メニューで、ピラフ、サラダの他に 豊富なドリンクメニューも楽しむことができる。"},"c":"양식·세계요리","g":"강서구","p":"051-971-9925","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601155348503_thumbL","lat":35.028156,"lng":128.81578,"v":3311,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1458&lang_cd=ko"},{"n":{"ko":"용호동할매팥빙수단팥죽 본점","en":"Yongho Halmae Patbingsu Danpatjuk","ja":"ヨンホハルメパッピンスタンパッチュク"},"m":{"ko":"팥빙수, 단팥죽","en":"Patbingsu (shaved ice with red beans), Danpatjuk (sweet red bean porridge)","ja":"小豆入りかき氷, 小豆粥"},"a":{"ko":"남구 용호로 90번길 24","en":"24, Yongho-ro 90beon-gil, Nam-gu","ja":"南区 龍湖路 90番キル 24"},"h":{"ko":"월-일 : 09:00-22:00\n\n*하절기 - 22:30\n*동절기 - 22:00","en":"Monday–Sunday: 09:00–22:00\n\n*Summer - 22:30\n*Winter - 22:00","ja":"月～日曜日：09:00-22:00\n\n*夏期 - 22:30\n*冬期 - 22:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"오래전부터 팥빙수와 단팥죽으로 유명했던 팥전문점으로 2대에 걸쳐 40여 년이 넘게 운영 중인 곳이다. 직접 삶은 통팥과 밀양얼음골사과, 부산우유를 사용하는 등 지역의 재료를 사용한 변함없는 맛을 지켜가고 있다.","en":"The shaved ice with red beans and red bean porridge have been longtime local favorites at this 40-year business continued by second-generation owners. It uses locally sourced ingredients such as whole red beans boiled from scratch, Miryang ice valley apples, and Busan milk to maintain the unchanging flavors.","ja":"昔からパッピンス(小豆入りかき氷)とタンパッチュク(小豆粥)で有名だった小豆専門店で、2代にわたって40年以上営んでいる。 自家製の茹でた小豆と密陽オルムコルのリンゴ、釜山牛乳を使用するなど、地域の食材を使い変わらぬ味を守っている。"},"c":"한식·백반","g":"남구","p":"0507-1401-9946","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601183719085_thumbL","lat":35.124126,"lng":129.11104,"v":4682,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1459&lang_cd=ko"},{"n":{"ko":"올드머그","en":"Old Mug","ja":"オールドマグ"},"m":{"ko":"시나몬 크림라떼, 스페셜티 아메리카노","en":"Cinnamon cream latte, Specialty americano","ja":"シナモンクリームラテ, スペシャルティアメリカーノ"},"a":{"ko":"해운대구 송정구덕포길 122, 1층","en":"1F, 122, Songjeonggudeokpo-gil, Haeundae-gu","ja":"海雲台区 松亭九徳浦キル 122 1階"},"h":{"ko":"월-일 : 06:30-24:00\n(22:00 라스트 오더)","en":"Monday–Sunday: 06:30–24:00\n(Last order at 22:00)","ja":"月～日曜日：06:30-24:00\n(ラストオーダー22:00)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"뒤로는 해변열차가 지나가고 산책길과 이어져 있는 핸드드립 전문 카페로 이른 아침부터 일출과 티타임을 즐기러 온 손님들이 많다. 실내와 실외 모두 감성적인 공간으로 색다른 송정바다를 만날 수 있는 곳이다.","en":"Old Mug is a hand-drip specialty cafe with the beach train running in the back and connected to a walking trail. Many guests come here to see the sunrise and have tea time in the early morning. Both indoor and outdoor areas are cozy, great for enjoying a different side of Songjeong Beach.","ja":"後ろには海辺列車が通り、散歩道とつながっているハンドドリップ専門のカフェで、早朝から日の出とティータイムを楽しみに多くの人が訪れる。室内も屋外も雰囲気の良い空間で、また違う松亭の海に出会えるお店。"},"c":"카페·베이커리","g":"해운대구","p":"051-704-9004","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419175034497_thumbL","lat":35.17039,"lng":129.19714,"v":4932,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1460&lang_cd=ko"},{"n":{"ko":"아데초이","en":"A’de Choi","ja":"アデチョイ"},"m":{"ko":"크로아상 샌드위치, 생과일 파이","en":"Croissant sandwich, Fresh fruit pie","ja":"クロワッサンサンドイッチ, フルーツパイ"},"a":{"ko":"기장군 일광읍 문오성길 162-1","en":"162-1, Munoseong-gil, Ilgwang-eup, Gijang-gun","ja":"機張郡 日光邑 ムンオソンキル 162-1"},"h":{"ko":"월-일 : 09:00-22:00","en":"Monday–Sunday: 09:00–22:00","ja":"月～日曜日：09:00-22:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"강렬한 색감의 고풍스러운 실내가 창밖으로 보이는 바다와 무척 잘 어울리는 카페로, 고급스러운 맛으로 유명한 이 곳의 디저트들은 동경제과학교 출신의 오너가 직접 만들고 있다. 클래식과 재즈 음악이 조금 나이가 있는 손님들과 참 잘 어울린다","en":"The intense colors and quaint decor of the interior look nice against the sea view outside the window. The desserts, famous for their refined flavors, are made by the owner who trained at Tokyo Confectionery School. It plays classical and jazz music appreciated by the older clientele of the place.","ja":"派手な色合いの古風な室内が窓の外から見える海ととてもよく似合うカフェで、上品な味で有名なデザートは東京製菓学校出身のオーナーが作っている。クラシックとジャズの音楽が年配のお客さんたちにお似合いだ。"},"c":"카페·베이커리","g":"기장군","p":"070-8804-1355","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601205022576_thumbL","lat":35.286453,"lng":129.25821,"v":4051,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1461&lang_cd=ko"},{"n":{"ko":"빌라빌레쿨라","en":"Villa Villekulla","ja":"ヴィラ·ヴィレクラ"},"m":{"ko":"퐁당오쇼콜라 + 아메리카노, 팬케이크 + 아메리카노","en":"Fondant Chocolat + Americano, Pancakes + Americano","ja":"フォンダンオショコラ+アメリカーノ, パンケーキ+アメリカーノ"},"a":{"ko":"동래구 여고로 63번 나길 8","en":"8, Yeogo-ro 63beon na-gil, Dongnae-gu","ja":"東莱区 余古路 63番 ナキル 8"},"h":{"ko":"월-토 : 11:00-19:00","en":"Monday–Saturday: 11:00–19:00","ja":"月～土曜日：11:00-19:00"},"x":{"ko":"일요일, 공휴일 휴무","en":"Closed on Sundays and public holidays","ja":"日曜、祝日休み"},"d":{"ko":"말괄량이 삐삐가 살던 오두막의 이름을 가진 이곳은 도심 속에서 만나는 휴식의 공간이다. 직접 만든 팬케이크 등의 디저트와 음료는 좋은 재료를 사용하였고, 구석구석 따뜻한 분위기를 가진 나만 알고 싶은 그런 카페다.","en":"Named after the hut where Pippi Longstocking lived, Villa Villekulla is a relaxing spot in the city center. Desserts and drinks, including handmade pancakes, are made of good ingredients. Every corner of the cafe gives off a warm atmosphere.","ja":"長くつ下のピッピが住んでいた別荘の名前が由来のこのお店は、都心で出会う休息の空間である。自家製のパンケーキなどのデザートや飲み物は良質な材料を使用しており、隅々まで暖かい雰囲気が心地よい誰にも教えたくないカフェ。"},"c":"카페·베이커리","g":"동래구","p":"0507-1379-0100","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601205653276_thumbL","lat":35.198376,"lng":129.06964,"v":3859,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_0 ,000\nB set(2인) ￦37,000","en":"A set(2 persons) ￦29,000\nB set(2 persons) ￦37,000","ja":"A セット(2人) ￦29,000\nB セット(2人) ￦37,000"},"a":{"ko":"금정구 장전로 12번길 16","en":"16, Jangjeon-ro 12beon-gil, Geumjeong-gu","ja":"金井区 長箭路 12番キル 16"},"h":{"ko":"11:00-15:00 / 16:30-21:00","en":"11:00-15:00 / 16:30-21:00","ja":"11:00-15:00 / 16:30-21:00"},"x":{"ko":"수요일 휴무","en":"Closed on Wednesdays","ja":"水曜休み"},"d":{"ko":"제대로 된 맛이 날 수 있게 사골 뼈를 24시간 이상 끓이고, 매일 아침 정성껏 재료를 준비한다. 정성들여 준비해야 좋은 맛이 나는 것은 어느 나라 음식이건 마찬가지다. 그간 베트남음식에 좋은 기억이 없던 사람들에게 먼저 추천해주고 싶은 곳.","en":"To make proper broth, this restaurant boils beef leg bones for over 24 hours and carefully prepares the ingredients every morning. No matter which cuisine it is, dedication is what makes great food. It’s highly recommended to people who have been unfamiliar with Vietnamese food.","ja":"本格的な味を出すために牛骨を24時間以上煮込み、毎朝真心を込めて材料を仕込む。真心を込めて準備してこそ良い味が出るのはどの国の食べ物でも同じだろう。 これまでベトナム料理に縁がなかった人におすすめしたいお店。"},"c":"양식·세계요리","g":"금정구","p":"051-583-2682","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416103220485_thumbL","lat":35.22843,"lng":129.08781,"v":4728,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1474&lang_cd=ko"},{"n":{"ko":"명란브랜드연구소","en":"Myeongnan Brand Laboratory","ja":"ミョンランブランド研究所"},"m":{"ko":"명란뵈르, 명란오일스파게티","en":"Myeongnan beurre, Myeongnan oil spaghetti","ja":"明太子ブール, 明太子オイルスパゲッティ"},"a":{"ko":"동구 영초윗길 22-1","en":"22-1, Yeongchowit-gil, Dong-gu","ja":"東区 瀛草ウィッキル 22-1"},"h":{"ko":"화-토 : 10:00-21:00\n(20:00 라스트 오더)\n일 : 10:00-19:00\n(18:00 라스트 오더)","en":"Tuesday–Saturday: 10:00–21:00\n(Last order at 20:00)\nSundays: 10:00–19:00\n(Last order at 18:00)","ja":"火～土曜日：10:00-21:00\n(ラストオーダー20:00)\n日曜日：10:00-19:00\n(ラストオーダー18:00)"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"동구 초량이바구길에 위치한 이곳은 5층 건물 전체가 명란과 관련된 이야기로 가득한 곳이다. 3층과 4층이 카페로 이용되는 곳으로 명란을 소재로 한 음식들을 만날 수 있다. 주말에는 음료만 판매한다고 하니 참고하자.","en":"Located on Choryang Ibagu-gil in Dong-gu, this five-story building i dex.do?menuCd=DOM_000000201002001000&uc_seq=1483&lang_cd=ko"},{"n":{"ko":"쉐프리","en":"Chef Lee","ja":"シェフリー"},"m":{"ko":"5개월미만 프렌치렉 양갈비(200g) ￦69,000\n오소부코 ￦65,000","en":"French Rack Lamb(under 5 months, 200g) ￦69,000\nOsso Buco ￦65,000","ja":"5ヶ月未満フレンチラック羊カルビ(200g) ₩69,000\nオッソブーコ ₩65,000"},"a":{"ko":"해운대구 해운대해변로209번길 13 바게트호텔 3층","en":"3F, Baguettes Hotel, 13, Haeundaehaebyeon-ro 209beon-gil, Haeundae-gu","ja":"海雲台区 海雲台海辺路 209番キル 13 バゲットホテル 3階"},"h":{"ko":"12:00-15:00 / 17:30-24:00","en":"12:00-15:00 / 17:30-24:00","ja":"12:00-15:00 / 17:30-24:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"화려한 경력의 오너쉐프가 운영하는 이탈리안 레스토랑으로 와인과도 잘 어울리는 요리들을 만날 수 있다. 예쁜 모습의 음식들이 많이 유행하고 있지만 역시 음식의 본질은 맛이다.","en":"This Italian restaurant, run by an owner-chef with an acclaimed career, presents delicious dishes that also pair well with wine. While fancy decorations seem to be popular these days, when it comes down to food, it has to taste good.","ja":"華やかな経歴を持つオーナーシェフが営むイタリアンレストランで、ワインとよく合う料理が味わえる。見た目が美しい食べ物が最近流行っているが、やはり食べ物の本質は味だ。"},"c":"고기·구이","g":"해운대구","p":"051-757-6127","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250530161709953_thumbL","lat":35.159615,"lng":129.15382,"v":3717,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1484&lang_cd=ko"},{"n":{"ko":"부우사안","en":"Busan","ja":"ブウサアン"},"m":{"ko":"당일 예약 베이징덕, 런치세트B","en":"Beijing duck (same-day reservation), Lunch Set B","ja":"当日予約 北京ダック, ランチセットB"},"a":{"ko":"해운대구 해운대해변로209번나길 16","en":"16, Haeundaehaebyeon-ro 209beonna-gil, Haeundae-gu","ja":"海雲台区 海雲海辺路 209番 ナギル 16"},"h":{"ko":"11:30-15:00 / 17:00-22:00\n(21:10 라스트오더)","en":"11:30-15:00 / 17:00-22:00","ja":"11:30-15:00 / 17:00-22:00"},"x":{"ko":"명절 휴무","en":"Closed on public holiday","ja":"名節休み"},"d":{"ko":"베이징덕으로 유명한 정통중식당으로 조금 특별한 날에 특별한 메뉴를 찾는 사람에게 권할만한 곳이다. 카빙 전 베이징덕을 먼저 보여주고 먹을 수 있게 장만해 주는 것이 재미있다.","en":"This authentic Chinese restaurant, famous for its Beijing Duck, is highly recommended for special occasions. It’s fun to see the whole Beijing duck before they are carved and served.","ja":"北京ダックで有名な正統中華料理店で、少し特別な日に特別なメニューを食べたい方におすすめのお店。カービング前の北京ダックを先に見せてから食べられるよう準備してくれるところが面白い。"},"c":"한식·백반","g":"해운대구","p":"051-741-3310","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230602145152107_thumbL","lat":35.160133,"lng":129.1545,"v":4696,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1485&lang_cd=ko"},{"n":{"ko":"스톤스트리트","en":"Stone Street","ja":"ストーン ストリート"},"m":{"ko":"청포도 샐러드, 마르게리따 피자","en":"Green Grape Salad, Margherita Pizza","ja":"マスカットサラダ, マルゲリータピザ"},"a":{"ko":"부산 중구 용두산길 12 1층","en":"1st floor, 12, Yongdusan-gil, Jung-gu, Busan","ja":"釜山広域市中区ヨンドゥサンギル12 1階"},"h":{"ko":"11:40-21:00\n(20:30 라스트오더)","en":"11:40-21:00","ja":"11:40-21:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"캐주얼한 화덕피자와 파스타가 인기 높은 곳으로 음식에 사용되는 리코타 치즈는 매일 직접 만든다고 한다. 시그니처 메뉴는 난과 함께 제공되는 청포도 샐러드인데 이곳의 단골들이 강력하게 추천하는 메뉴이다.","en":"Wood-fired casual pizza and pasta are popular stars at this restaurant. The ricotta cheese used in cooking is freshly made every day. Its signature dish is the green grape salad with naan, strongly recommended by the regulars.","ja":"カジュアルな石窯ピザやパスタが人気のお店で、料理に使われる自家製のリコッタチーズは毎日作るという。シグネチャーメニューはナンが付きのマスカットサラダで、当店の常連客が強くおすすめするメニューだ。"},"c":"양식·세계요리","g":"중구","p":"051-254-7736","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230602145719327_thumbL","lat":35.102036,"lng":129.03119,"v":5031,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1486&lang_cd=ko"},{"n":{"ko":"산동완탕교자관","en":"Sandong Wantang Gyojagwan","ja":"サンドンワンタン餃子館"},"m":{"ko":"가지요리, 마파두부","en":"Eggplant dish, Mapo tofu","ja":"茄子料理, 麻婆豆腐"},"a":{"ko":"동구 중앙대로296번길 11","en":"11, Jungang-daero 296beon-gil, Dong-gu, Busan","ja":"釜山広域市東区チュンアンデロ296番ギル11"},"h":{"ko":"11:00-22:00","en":"11:00-22:00","ja":"11:00-22:00"},"x":{"ko":"매달 2, 4번째 토요일 정기 휴무","en":"","ja":""},"d":{"ko":"중국인이 운영하고 있는 이곳은 중국에 있는 식당이 그대로 위치만 옮긴 것 같은 느낌을 준다. 만두를 전문으로 하고 낯선 메뉴와 현지화 되지 않은 중국 본토의 맛을 경험할 수 있는 특별한 식당이다.","en":"Operated by a Chinese owner, it feels as though a restaurant in China was relocated to Korea. It specializes in dumplings and offers unfamiliar and authentic mainland Chinese flavors that are not localized.","ja":"北京ダックで有名な正統中華料理店で、少し特別な日に特別なメニューを食べたい方におすすめのお店。カービング前の北京ダックを先に見せてから食べられるよう準備してくれるところが面白い。"},"c":"면·국물","g":"동구","p":"070-8240-2385","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230602145733245_thumbL","lat":35.119602,"lng":129.04268,"v":4381,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1487&lang_cd=ko"},{"n":{"ko":"삼형제오리 부산1호점","en":"Samhyeongje Ori","ja":"三兄弟オリ"},"m":{"ko":"양꼬치 2인, 오리바베큐","en":"Lamb skewers for two, Duck barbecue","ja":"羊肉串 2人, 鴨バーベキュー"},"a":{"ko":"영도구 태종로 73번길 23","en":"23, Taejong-ro 73beon-gil, Yeongdo-gu","ja":"影島区 太宗路 73番キル 23"},"h":{"ko":"17:00-23:00","en":"17:00-23:00","ja":"17:00-23:00"},"x":{"ko":"","en":"","ja":""},"d":{"ko":"중국 현지 북경오리 프랜차이즈의 국내 유일 지점으로 숯불에 구운 오리바베큐가 대표메뉴지만, 양갈비살로 만든 양꼬치도 인기 있다. 오리바베큐를 먹기 위해선 예약이 필수다.","en":"This is the only Korean branch of the Beijing duck franchise based in China. The signature dish is charcoal-grilled duck barbeque, but lamb skewers made of lamb ribs are also popular. Reservation is a must for the grilled duck.","ja":"中国現地の北京ダックフランチャイズの国内唯一の支店で、炭火で焼いた鴨バーベキューが代表メニューだが羊カルビ肉で作った羊肉串も人気がある。鴨バーベキューを食べたい時には事前にご予約を。"},"c":"고기·구이","g":"영도구","p":"051-417-7043","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230602150346849_thumbL","lat":35.09349,"lng":129.03928,"v":3906,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1488&lang_cd=ko"},{"n":{"ko":"석기시대","en":"Seokgisidae","ja":"石器時代"},"m":{"ko":"오향장육 ￦19,000 / 25,000\n군만두 ￦6,000","en":"Ohyangjangyuk(five-spice steamed pork) ￦19,000 / 25,000\nFried dumplings ￦6,000","ja":"五香醤肉 ￦19,000/25,000\n焼き餃子 ￦6,000"},"a":{"ko":"중구 동광길 75-1","en":"75-1, Donggwang-gil, Jung-gu","ja":"中区 東光キル 75-1"},"h":{"ko":"15:00-21:00","en":"15:00-21:00","ja":"15:00-21:00"},"x":{"ko":"일요일, 명절, 공휴일 휴무","en":"Closed on Sundays and public holidays","ja":"日曜日、名節、祝祭日休み"},"d":{"ko":"1987년에 개업한 중국만두전문점으로 맛과 품질에 비해 저렴한 가격의 만두와 오향장육을 만날 수 있다. 가볍게 술 마시기 좋은 곳으로 많은 단골손님이 찾아오는 가게이다.","en":"Opened in 1987, this restaurant specializes in Chinese dumplings. It is known for affordable and tasty dumplings and five-spice steamed pork. It is frequented by local regulars for casual dining and drinks.","ja":"1987年に開業した中国餃子専門店で、味や質に比べて安い値段で餃子と五香醤肉を味わえる。気軽にお酒も楽しめることから多くの常連客が来店する。"},"c":"중식","g":"중구","p":"010-2334-0358","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419105032027_thumbL","lat":35.106155,"lng":129.03487,"v":4532,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1489&lang_cd=ko"},{"n":{"ko":"음주양식당 오스테리아 어부","en":"Osteria Aboo","ja":"ウムジュ洋食堂 オステリアオブ"},"m":{"ko":"시그니처 테이스팅 코스(1인) ￦148,000\n로마식 까르보나라 ￦33,000","en":"Signature Tasting Course (1 person), La carbonara","ja":"シグネチャーテイスティングコース(1人), ローマ式カルボナーラ"},"a":{"ko":"부산 해운대구 해운대로570번길 23 더세일링타워 3층","en":"3F, The Sailing Tower, 23 Haeundae-ro 570beon-gil, Haeundae-gu, Busan, Republic of Korea","ja":"大韓民国 釜山市 海雲台区 海雲台路570番街23 The Sailing Tower 3階"},"h":{"ko":"17:00-22:30","en":"17:00-23:00","ja":"17:00-23:00"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"한국인에게는 다소 생소한 맛일지라도 이탈리아의 맛을 좋아하는 사람들을 위해 이탈리아 현지의 맛을 기준으로 조리한다는 이곳. 이곳은 부산이지만 이 공간만큼은 분명히 이탈리아다.","en":"Instead of catering to the Korean palate, this restaurant presents the flavors of Italy as closely as possible for those who love authentic taste. While it is located in Busan, the restaurant’s food will take you to Italy.","ja":"韓国人には食べ慣れない味でもイタリアの味を好む人のためにイタリア現地の味を基準に調理するというこの店。ここは釜山だが、この空間だけは確かにイタリアだ。"},"c":"양식·세계요리","g":"부산진구","p":"051-802-8858","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20231109183734515_thumbL","lat":35.160614,"lng":129.15663,"v":4609,"l":4,"u":"https://www.visitbusan. rvations.","ja":"釜山でひつまぶしを流行らせた有名なお店として知られ、うなぎは炭火を使って焼きその日使用するうなぎがなくなると店を閉める。事前の予約は受け付けておらず入店順に食事を提供する。"},"c":"해산물·회","g":"수영구","p":"0507-1360-1638","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418094044725_thumbL","lat":35.143585,"lng":129.10974,"v":5085,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1492&lang_cd=ko"},{"n":{"ko":"글라스앤보틀","en":"Glass and Bottle","ja":"グラスアンドボトル"},"m":{"ko":"들기름 명란 카펠리니, 네기도로 타르타르","en":"Perilla oil and myungnan cappellini, Negitoro tartare","ja":"エゴマ油明太子カペリーニ, ネギトロのタルタル"},"a":{"ko":"연제구 쌍미천로 179-1","en":"179-1, Ssangmicheon-ro, Yeonje-gu","ja":"蓮堤区 サンミチョン路 179-1"},"h":{"ko":"18:00-24:00","en":"18:00-24:00","ja":"18:00-24:00"},"x":{"ko":"일요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"일본의 골목길 비스트로를 연상시키는 분위기의 아담한 와인바로 부부가 함께 운영하고 있는 곳으로, 일식 기반의 캐주얼한 요리들이 와인과 무척 잘 어울린다. 테이블 수가 작아 예약이 필수다.","en":"Glass and Bottle is a small wine bar owned by a married couple that resembles small Japanese bistros inside alleyways. Its Japanese-style casual cuisine goes very well with wine. Reservation is a must as there are very few tables.","ja":"日本の路地裏にあるビストロを連想させる雰囲気のこぢんまりとしたワインバーを夫婦が営んでいる。和食ベースのカジュアルな料理がワインととてもよく合う。 テーブル数が少ないため事前に予約しよう。"},"c":"양식·세계요리","g":"연제구","p":"0507-1407-8598","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230602175414282_thumbL","lat":35.188755,"lng":129.0872,"v":3201,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1493&lang_cd=ko"},{"n":{"ko":"앙탄","en":"Angtan","ja":"アンタン"},"m":{"ko":"오리코스요리","en":"Duck course","ja":"鴨コース料理"},"a":{"ko":"강서구 식만로 118-1","en":"118-1, Sikman-ro, Gangseo-gu","ja":"江西区 食満路 118-1"},"h":{"ko":"월-금 11:30-15:00 /17:00-20:30\n(14:00,19:30 라스트오더)\n토-일 11:30-16:00 / 17:00-20:30\n(15:00,19:30 라스트오더)","en":"11:30-16:00 / 17:00-20:30","ja":"11:30-16:00 / 17:00-20:30"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"낙동강 강변에 위치한 조용하고 여유로운 식당으로, 멋진 풍경을 감상할 수 있는 오리코스요리 전문점이다. 깔끔하고 기분 좋은 코스와 ers’ stay is limited to two hours.","ja":"ナマコの内臓を手入れした海鼠腸(このわた)で有名な日本式居酒屋で、この店の海鼠腸の刺身を\n一度味わうために遠方から訪れる人も多いという。\n待ち時間を考慮し2時間の利用制限を設けている。"},"c":"일식","g":"수영구","p":"051-992-3838","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605094032446_thumbL","lat":35.140026,"lng":129.10835,"v":3976,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1497&lang_cd=ko"},{"n":{"ko":"동경밥상","en":"Donggyeongbapsang","ja":"東京パプサン"},"m":{"ko":"우나쥬 ￦43,000\n히츠마부시 ￦38,000","en":"Unajyu ￦43,000\nHitsumabushi ￦38,000","ja":"うな重 ￦43,000\nひつまぶし ￦38,000"},"a":{"ko":"수영구 남천바다로 34-6","en":"34-6, Namcheonbada-ro, Suyeong-gu","ja":"水営区 南川パダ路 34-6"},"h":{"ko":"11:30-15:00 / 17:30-21:00","en":"11:30-15:00 / 17:30-21:00","ja":"11:30-15:00 / 17:30-21:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"240여 년의 긴 역사를 가진 일본의 장어요리전문점 쥬바코에서 오랜 수련을 거친 오너쉐프가 쥬바코 스타일의 정통방식으로 만든 장어구이를 선보이는 곳으로, 외관부터 내부까지 일본에 온 듯한 분위기를 가지고 있다","en":"The owner-chef, who trained for a long time at Jyubako, a 240-year-old eel specialty restaurant in Japan, presents the authentic Jyubako-style grilled eel. The exterior and interior decor will also make you feel like you are in Japan.","ja":"240年以上の長い歴史を持つ日本のうなぎ料理専門店「重箱」で修行したオーナーシェフが重箱スタイルの伝統的な方法で作ったうなぎ焼きを提供する店で、外観から内部まで日本に来たような印象を与える。"},"c":"해산물·회","g":"수영구","p":"0507-1320-1428","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605094602155_thumbL","lat":35.148396,"lng":129.11385,"v":5830,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1498&lang_cd=ko"},{"n":{"ko":"슌","en":"Shun","ja":"シュン"},"m":{"ko":"점심특선 한 접시, 저녁 한 접시","en":"Lunch Special, Dinner Special","ja":"ランチ特選 一皿, ディナー 一皿"},"a":{"ko":"기장군 기장읍 차성동로 163","en":"163, Chaseongdong-ro, Gijang-eup, Gijang-gun","ja":"機張郡 機張邑 車城東路 163"},"h":{"ko":"12:00-14:30 / 17:00-21:30","en":"12:00-14:30 / 17:00-21:30","ja":"12:00-14:30 / 17:00-21:30"},"x":{"ko":"수요일, 명절 휴무","en":"Closed on Wednesdays and public holidays","ja":"水曜、名節
