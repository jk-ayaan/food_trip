<head>

<title>부산의 맛 · Taste of Busan</title>

<style>
:root{
  --bg:#eef1f5; --card:#fff; --ink:#16202c; --sub:#5d6b7a; --line:#e6eaf0;
  --sea:#0a6ebd; --sea2:#0fa3b1; --shadow:0 6px 22px rgba(20,40,70,.08);
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Hiragino Kaku Gothic ProN","Microsoft YaHei","Malgun Gothic",system-ui,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.5;-webkit-text-size-adjust:100%}
a{color:inherit;text-decoration:none}
img{display:block}

.hero{background:linear-gradient(135deg,var(--sea) 0%,var(--sea2) 100%);color:#fff;padding:calc(18px + var(--safe-t)) 18px 16px}
.hero .wrap{max-width:1180px;margin:0 auto}
.hero .topline{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.hero h1{margin:0;font-size:23px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.hero p{margin:6px 0 0;font-size:13px;opacity:.93;font-weight:500}
.hero .src{margin-top:9px;font-size:11px;opacity:.78;line-height:1.5}
.hero .src a{text-decoration:underline;text-underline-offset:2px}
.langs{display:flex;gap:4px;background:rgba(255,255,255,.16);border-radius:999px;padding:3px;flex:none}
.langs button{border:0;background:transparent;color:#fff;font-weight:700;font-size:12px;padding:6px 9px;border-radius:999px;cursor:pointer;opacity:.8;white-space:nowrap}
.langs button.on{background:#fff;color:var(--sea);opacity:1}

.tools{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.93);backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(20,40,70,.04)}
.tools .wrap{max-width:1180px;margin:0 auto;padding:11px 14px 7px}
.searchrow{display:flex;gap:8px;align-items:center}
.search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--line);border-radius:14px;padding:11px 14px;min-width:0}
.search:focus-within{border-color:var(--sea);background:#fff}
.search svg{flex:none;width:18px;height:18px;color:var(--sub)}
.search input{border:0;background:transparent;width:100%;font-size:15px;outline:none;color:var(--ink);min-width:0}
.viewtog{flex:none;display:flex;background:var(--bg);border:1.5px solid var(--line);border-radius:14px;overflow:hidden}
.viewtog button{border:0;background:transparent;padding:10px 12px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;display:flex;align-items:center;gap:5px}
.viewtog button.on{background:var(--sea);color:#fff}
.viewtog svg{width:15px;height:15px}
.sortwrap{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--line);border-radius:14px;padding:10px 11px;margin-left:8px}
.sortwrap svg{width:15px;height:15px;color:var(--sub);flex:none}
.sortwrap select{border:0;background:transparent;font-weight:700;color:var(--ink);font-size:13px;outline:none}

.chips{display:flex;gap:7px;overflow-x:auto;padding:8px 2px 3px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1.5px solid var(--line);background:#fff;color:var(--sub);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s}
.chip:hover{border-color:var(--sea)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .ct{opacity:.55;font-weight:700;margin-left:3px;font-size:11px}
.chip.on .ct{opacity:.7}
.chiplabel{flex:none;align-self:center;font-size:11px;font-weight:800;color:#9aa6b2;padding:0 4px 0 2px}

.count{max-width:1180px;margin:0 auto;padding:13px 16px 2px;font-size:13px;color:var(--sub);font-weight:600}
.count b{color:var(--sea);font-weight:800}

.grid{max-width:1180px;margin:0 auto;padding:10px 12px calc(60px + var(--safe-b));display:grid;grid-template-columns:1fr;gap:13px}
@media(min-width:560px){.grid{grid-template-columns:repeat(2,1fr);gap:14px;padding-inline:16px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}
.grid.hidden{display:none}

.card{background:var(--card);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(.99)}
@media(hover:hover){.card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(20,40,70,.13)}}
.thumb{position:relative;aspect-ratio:16/10;background:#dde3ea;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
@media(hover:hover){.card:hover .thumb img{transform:scale(1.05)}}
.thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;color:#aeb9c5}
.badge{position:absolute;top:10px;left:10px;padding:5px 10px;border-radius:999px;font-size:11.5px;font-weight:800;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.gbadge{position:absolute;top:10px;right:10px;padding:5px 10px;border-radius:999px;font-size:11.5px;font-weight:700;color:#fff;background:rgba(15,28,42,.62)}
.body{padding:13px 14px 14px;display:flex;flex-direction:column;gap:7px;flex:1}
.name{font-size:17px;font-weight:800;letter-spacing:-.02em;line-height:1.3}
.menu{font-size:13px;color:var(--sea);font-weight:700;display:flex;gap:6px;align-items:flex-start}
.menu .ic{flex:none;margin-top:1px}
.menu span{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.row{font-size:12.5px;color:var(--sub);display:flex;gap:6px;align-items:flex-start}
.row .ic{flex:none;margin-top:2px;opacity:.7}
.row span{overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.desc{font-size:12.5px;color:#75808c;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stat{font-size:11.5px;color:#9aa6b2;font-weight:600;display:flex;gap:11px}
.acts{display:flex;gap:7px;margin-top:auto;padding-top:11px}
.act{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 6px;border-radius:11px;font-size:12.5px;font-weight:700;border:1.5px solid var(--line);color:var(--sub)}
.act svg{width:14px;height:14px}
.act.call{background:var(--sea);border-color:var(--sea);color:#fff}
.act:active{filter:brightness(.96)}

/* 지도 */
#map{display:none;width:100%;height:calc(100vh - var(--toolsH,210px));min-height:420px;background:#dfe6ee}
#map.show{display:block}
.leaflet-popup-content{margin:0;width:230px!important}
.leaflet-popup-content-wrapper{border-radius:14px;overflow:hidden;padding:0}
.pop{width:230px;font-family:inherit}
.pop .pimg{width:100%;height:120px;object-fit:cover;background:#dde3ea}
.pop .pbody{padding:10px 12px 12px}
.pop .pn{font-size:15px;font-weight:800;color:var(--ink);line-height:1.3;margin-bottom:4px}
.pop .pm{font-size:12px;color:var(--sea);font-weight:700;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pop .pa{font-size:11.5px;color:var(--sub);line-height:1.4;margin-bottom:8px}
.pop .pacts{display:flex;gap:6px}
.pop .pacts a{flex:1;text-align:center;padding:7px 4px;border-radius:9px;font-size:11.5px;font-weight:700;border:1.5px solid var(--line);color:var(--sub)}
.pop .pacts a.call{background:var(--sea);border-color:var(--sea);color:#fff}
.mk{width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35)}
.maphint{position:absolute;z-index:900;left:50%;transform:translateX(-50%);bottom:calc(14px + var(--safe-b));background:rgba(15,28,42,.82);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:999px;pointer-events:none;opacity:0;transition:.3s}
.maphint.show{opacity:1}

.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--sub)}
.empty .em{font-size:42px}
.empty p{font-weight:600;margin:12px 0 0}
.top{position:fixed;right:16px;bottom:calc(16px + var(--safe-b));width:46px;height:46px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:1100;cursor:pointer}
.top.show{opacity:1;pointer-events:auto}
footer{max-width:1180px;margin:0 auto;padding:8px 18px calc(30px + var(--safe-b));color:#9aa6b2;font-size:11.5px;line-height:1.6;text-align:center}
footer a{text-decoration:underline}
</style>
</head>

ndex.do?menuCd=DOM_000000201002001000&uc_seq=87&lang_cd=ko"},{"n":{"ko":"원조할매집","en":"Wonjo Halmaejip","ja":"元祖ハルメチブ"},"m":{"ko":"낙곱새(낙지/곱창/새우볶음) ￦10,000\n각종 사리 ￦1,000","en":"Nakgopsae(small octopus/pork intestines/\nshrimp) ￦10,000\nVarious toppings ￦1,000","ja":"ナッコプセ(タコ/コプチャン/エビ炒め) ￦10,000\n各種追加トッピング ￦1,000"},"a":{"ko":"부산진구 골드테마길 10","en":"10, Goldthema-gil, Busanjin-gu","ja":"釜山鎮区 ゴールドテーマキル 10"},"h":{"ko":"10:00-20:50","en":"10:00-20:50","ja":"10:00-20:50"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":""},"d":{"ko":"1968년부터 운영 중인 이곳을 소개하는 것은 딱 한마디면 충분하다.\n부산의 향토음식인 ‘조방낙지’가 시작된 곳. 더 이상 무슨 설명이 필요하겠는가.","en":"One word is enough to introduce this place, which was established in 1968.\nThis is where Busan’s local food, “jobang nakji,” was born.\nThere’s nothing more to add.","ja":"1968年から営むこのお店を紹介する時はたった一言で十分。\n釜山の郷土料理「ジョバンナクヂ 」の元祖。\nこれ以上何の説明もいらないお店。"},"c":"해산물·회","g":"부산진구","p":"051-643-5037","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417143908074_thumbL","lat":35.142147,"lng":129.06017,"v":5506,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=92&lang_cd=ko"},{"n":{"ko":"가야할매밀면","en":"GayaHalmaeMaemilmyeon","ja":"カヤハルメミル麺"},"m":{"ko":"물 밀면, 비빔밀면","en":"Mul Milmyeon, Bibim Milmyeon","ja":"水ミル麺, 拌荞麦面(ビビンミル麺)"},"a":{"ko":"부산 연제구 월드컵대로 145번길 32","en":"32, World cup-daero 145beon-gil, Yeonje-gu","ja":"釜山広域市蓮堤区ワールドカップ通り145番ギル32"},"h":{"ko":"11:00-20:00","en":"11:00-20:00","ja":"11:00-20:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"유명한 밀면전문점으로, 밀가루에 옥수수 전분을 섞어, 다른 밀면전문점들보다 더 탄력있는 면이 특징이다. 육수는 돼지뼈와 소뼈에 각종 야채와 여러 한약재를 섞어 만들고, 사이드 메뉴인 만두도 인기 있다.","en":"This restaurant specializes in milmyeon (wheat noodles), a folk dish in Busan. They add more corn starch, which makes them more elastic than others. The broth is made by mixing pork bones, beef bones, various vegetables, and herbs. The side dish of dumplings is also popular.","ja":"釜山の郷土料理であるミル麺専門店で、小麦粉にコーンスターチを混ぜて いるため他のミル麺専門店よりも弾力性のある麺が特徴的。スープは豚骨 と牛骨以外にも様々な野菜や複数の韓薬材を混ぜて作り、サイドメニュー の餃子も人気だ。"},"c":"면·국물","g":"연제구","p":"051-865-8017","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20191217201857896_thumbL","lat":35.185196,"lng":129.07988,"v":10389,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=94&lang_cd=ko"},{"n":{"ko":"국제밀면본점","en":"Gukje Milmyeon Main Branch","ja":"国際ミル麺本店"},"m":{"ko":"물밀면 ￦9,000\n비빔밀면 ￦9,000","en":"Mul Milmyeon ￦9,000\nBibim Milmyeon ￦9,000","ja":"水ミル麺 ￦9,000\nビビンミル麺 ￦9,000"},"a":{"ko":"연제구 중앙대로1235번길 23-6","en":"23-6, Jungang-daero 1235beon-gil, Yeonje-gu","ja":"蓮堤区中央大路1235番ギル23-6"},"h":{"ko":"10:00-20:00 (라스트오더 19:30)\n5~8월 10:00-21:00 (라스트오더 20:30 전후)","en":"10:00-20:00","ja":"10:00-20:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"밀면전문점 중에서도 특히 맛으로 소문난 이곳은\n소 사골만을 사용한 육수 등 독창적인 방식의 밀면을 만들고 있다. \n보통 기계로 잘려진 편육이 고명으로 올려지는데, 이곳은 손으로 일일이 얇게 찢은 \n양지머리 고기가 올려지는 것이 특징이다.","en":"This place is widely recognized as one of the best spots for milmyeon, mainly for its exceptional taste. It \nis one of the most famous restaurants among Busan’s many wheat noodle restaurants. \nThey present a distinct type of wheat noodles in beef bone broth. Elsewhere, the meat topping is \nusually cut by machines, but they are known for hand-pulled thin pieces of brisket.","ja":"小麦麺(ミルミョン)専門店の中でも特に美味しいと有名なこのお店は\n牛骨だけを使ったスープなど独創的な小麦麺を作っている。\n通常、機械で切られた薄切りゆで肉がゴミョン(盛り付け)としてのせられるが、このお店では一つ一つ\n手で薄く裂いた肩バラ肉がのせられるのが特徴。"},"c":"면·국물","g":"연제구","p":"051-501-5507","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418134454110_thumbL","lat":35.19689,"lng":129.07785,"v":12209,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=95&lang_cd=ko"},{"n":{"ko":"할매가야밀면","en":"Gaya Milmyeon","ja":"ガヤミルミョン(伽耶小麦麺)"},"m":{"ko":"밀면, 비빔밀면","en":"Milmyeon, Bibim Milmyeon","ja":"ミル麺, ビビンミル麺"},"a":{"ko":"중구 광복로 56-14","en":"56-14, Gwangbok-ro, Jung-gu","ja":"中区光復路56-14"},"h":{"ko":"10:30-21:30","en":"10:30-21:30","ja":"10:30-21:30"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"깔끔한 맛의 육수가 인상적인 40년 전통의 밀면 전문점으로, \n식사시간에는 항상 긴 줄이 늘어서 있지만 140석을 갖춘 넓은 매장으로 인해 \n웨이팅 시간은 짧은 편. 항상 청결하게 관리되고 있는 기분 좋은 식당이다.","en":"Gaya Milmyeon is a historic restaurant with 40 years of tradition, known for its refreshing broth. \nYou can always find a long queue of people at mealtimes, but thanks to the large hall with 140 \nseats, the wait is shorter than it seems. The dining space is delightfully clean at all times.","ja":"さっぱりした味のスープが印象的な40年の伝統を誇るミルミョン(小麦麺)専門店で、\n食事時には常に長い列ができるが、140席が確保された広い店舗なので \n待ち時間は短いほう。いつも清潔に管理されている清々しいお店。"},"c":"면·국물","g":"중구","p":"051-246-3314","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605153300303_thumbL","lat":35.098934,"lng":129.03122,"v":11491,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=102&lang_cd=ko"},{"n":{"ko":"거인통닭","en":"Darin Geoin tongdak","ja":"タリン コイントン ダック"},"m":{"ko":"후라이드치킨","en":"Fried chicken, Banban chicken","ja":"フライドチキン"},"a":{"ko":"중구 중구로47번길34","en":"34 Jung-gu-ro 47beon-gil, Jung-gu","ja":"中区 中区路 47番キル 34"},"h":{"ko":"11:30-20:00\n13:30-14:30 브레이크 타임","en":"11:30-20:00\nBreak time 13:30-14:30","ja":"11:30-20:00\n13:30-14:30休憩時間"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"3대에 걸쳐 약 60여 년을 운영 중인 유명한 식당으로, 프라이드치킨 단 하나의 메뉴만을 고수하고 있는 이곳은 가장 맛있는 치킨을 이야기할 때 항상 거론되는 곳이다.","en":"This famous restaurant has been in business for nearly 60 years, spanning three generations, and it has stuck to one menu item: fried chicken. It is always mentioned when talking about the best chicken in town.","ja":"3代にわたって約60年営む有名店。メニューは\n唯一フライドチキンのみで、一番おいしいチキン\nといえばいつも話にあがるお店。"},"c":"기타","g":"중구","p":"051-246-6079","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419092440105_thumbL","lat":35.102345,"lng":129.02612,"v":6192,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=103&lang_cd=ko"},{"n":{"ko":"김해식당","en":"Gimhae Sikdang","ja":"金海食堂"},"m":{"ko":"생아구수육, 아구찜","en":"Steamed Monkfish, Braised Monkfish","ja":"茹で生鮟鱇, 鮟鱇の蒸し煮"},"a":{"ko":"중구 자갈치로 51-2","en":"51-2, Jagalchi-ro, Jung-gu","ja":"中区チャガルチ路51-2"},"h":{"ko":"09:30-21:00\n(20:15 라스트오더)","en":"09:30-21:00\n(Last order 20:15)","ja":"09:30-21:00\n(20:15ラストオーダー)"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"TV프로그램에도 자주 소개되는 유명한 아귀요리전문점으로\n1980년부터 생 아귀를 이용한 음식들을 만들고 있다.\n푸짐하고 신선한 아귀와 아귀 특수부위를 함께 먹을 수 있으며 외국인들도 즐겨 찾는 식당이다.","en":"This is a famous monkfish restaurant, often introduced on TV, serving dishes made of fresh\nmonkfish since 1980. Known for the generous portions of fresh monkfish and specialty cuts,\nGimhae Sikdang is also popular among foreign customers.","ja":"テレビ番組でもよく紹介される鮟鱇料理専門店で、1980年から営業している。\n鮟鱇も冷凍していない新鮮なもので、ボリュームもたっぷり。鮟鱇の特殊部位まで、\n美味しくいただけるので、外国人にも人気のあるお店だ。"},"c":"해산물·회","g":"중구","p":"051-255-8242","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230525160402713_thumbL","lat":35.09748,"lng":129.02994,"v":6583,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=107&lang_cd=ko"},{"n":{"ko":"물꽁식당","en":"Mulkkong Sikdang","ja":"ムルコン食堂"},"m":{"ko":"아구찜, 아구수육","en":"Braised Monkfish, Steamed Monkfish","ja":"アンコウの蒸し物, アンコウのゆで肉"},"a":{"ko":"중구 흑교로59번길 3","en":"3, Heukgyo-ro 59beon-gil, Jung-gu","ja":"中区フッギョ路59番ギル3"},"h":{"ko":"10:00-21:00","en":"10:00-21:00","ja":"10:00-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"60년째 3대를 이어 운영해온 전통 있는 아귀요리전문점으로 신선한 아귀를 사용해 아구찜, 수육, 탕을 만든다. \n자극적이지 않은 담백한 맛의 아구찜이 대표메뉴로 오래되었지만 청결한 가게가 인상적이다","en":"Handed down to the third generation, this 60-year specialty restaurant uses fresh monkfish to\nsteam, braise, and make soup. The mild-tasting monkfish is their signature dish. Despite the\nold history, the restaurant is very clean","ja":"60年間3代にわたり営業してきたアンコウ料理専門店で、新鮮なアンコウを使いアンコウの蒸し物、\nゆで肉、スープを作る。刺激が強くなくさっぱりした味のアンコウの蒸し物が代表メニュー。\n古いお店だが清潔さが印象的。"},"c":"해산물·회","g":"중구","p":"051-257-3230","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419094840707_thumbL","lat":35.104504,"lng":129.0244,"v":6029,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=109&lang_cd=ko"},{"n":{"ko":"부산명물횟집","en":"Busan Myeongmul Hoet-jip","ja":"釜山名物フェッチブ"},"m":{"ko":"회백밥 1인분 ￦40,000\n생선회 ￦110,000","en":"Hoe Set Menu for 1 ￦40,000\nHoe(sliced raw fish) ￦110,000","ja":"刺身定食(1人) ₩40,000\n魚の刺身 ₩110,000"},"a":{"ko":"중구 자갈치해안로 55","en":"55, Jagalchihaean-ro, Jung-gu","ja":"中区チャガルチ海岸路55"},"h":{"ko":"10:30-15:00 / 16:00-22:00","en":"10:30-15:00 / 16:00-22:00","ja":"11:00-21:30\n(15:00-16:30休憩時間)"},"x":{"ko":"1, 3주 월요일 휴무","en":"Closed on first and third Mondays","ja":"第1/3月曜休み"},"d":{"ko":"1946년부터 운영해 온 무척 유명한 횟집으로 여러 유명인사들의 단골집이기도 하다.\n광어회 한 접시에 고기뼈를 푹 고아서 만든 진하고 담백한 맑은 국과 여섯 가지 밑반찬이 나오는 회정식이 인기메뉴이다","en":"This is a very well-known restaurant specializing in raw fish (Korean-style sashimi) since 1946,\nfrequented by numerous celebrities. Their popular dish is a raw fish set menu with a plate of\nsliced halibut, rich and nourishing meat and bone broth, and six side dishes.","ja":"1946年から続くとても有名な刺身専門店で、数多くの有名人が訪れる。ヒラメの刺身に、そのあらをじ\nっくり煮込んだ濃厚で淡泊なスープと6種類のおかずが提供される刺身定食が人気。"},"c":"해산물·회","g":"중구","p":"051-245-4995","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419101804650_thumbL","lat":35.09714,"lng":129.0312,"v":9710,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=112&lang_cd=ko"},{"n":{"ko":"부산꼼장어맛집 성일집","en":"Seongiljip","ja":"釜山コムジャンオ店 ソンイルチプ"},"m":{"ko":"소금구이, 양념구이","en":"Eel salt roast, Eel seasoned roast","ja":"コムジャンオ塩焼き, コムジャンオヤンニョム焼き"},"a":{"ko":"중구 대교로 103","en":"103, Daegyo-ro, Jung-gu","ja":"中区 大橋路 103"},"h":{"ko":"11:00-23:00\n(22:00 라스트오더)","en":"11:00-23:00 \n(Last order 22:00)","ja":"11:00-23:00\n(22:00ラストオーダー)"},"x":{"ko":"명절 휴무","en":"Closed on holidays","ja":"名節休み"},"d":{"ko":"1950년부터 3대에 걸쳐 74년째 운영 중인 곳으로 가장 유명한 곰장어전문점 중 한 곳이다. 싱싱하게 살아있는 국내산 곰장어와 23가지의 한약재를 사용한 특별한 양념을 사용한다.","en":"In operation for "ja":"10:00-18:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"주택을 개조하여 만든 예쁜 외관의 브런치카페로, 휴일과 잘 어울릴 것 같은 화사한 실내와창 너머에 보이는 화단이 인상적이다. 아메리칸 브런치, 불고기파니니, 맥앤치즈파니니, 부리또 브런치, 리코타샐러드 등이 인기 있는 메뉴이다.","en":"It is a brunch cafe with a pretty exterior of a renovated house and a perfect, cozy interior for the holidays. An impressive flowerbed is shown beyond the window.\nPopular items include American brunch,bulgogi panini, mac & cheese panini, burrito brunch, and ricotta salad.","ja":"民家をリノベーションした素敵な外観のブランチカフェ。休日を過ごすのに最適な陽当たりのいい室内と、窓から見える花壇が印象的だ。アメリカンブランチ、焼肉パニーニ、マックアンドチーズパニーニ、ブリットブランチ、リコッタサラダなどが人気メニューだ。"},"c":"카페·베이커리","g":"사상구","p":"0507-1332-2292","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230531123640913_thumbL","lat":35.12544,"lng":128.96982,"v":6152,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=158&lang_cd=ko"},{"n":{"ko":"문스시","en":"Moon Sushi","ja":"ムン寿司"},"m":{"ko":"오마카세 문 스시, 오마카세 스 스시","en":"Omakase Moon Sushi, Omakase Su Sushi","ja":"おまかせ, おまかせムン寿司, おまかせ, おまかせス寿司"},"a":{"ko":"부산 해운대구 좌동순환로 43","en":"43, Jwadongsunhwan-ro, Haeundae-gu","ja":"釜山広域市海雲台区佐洞循環路43"},"h":{"ko":"평일: 11:30-15:00 / 17:30-22:00 (13:45 20:30 라스트오더)\n주말 : 11:30-15:00 / 17:00-22:00 (13:45 20:30 라스트오더)","en":"am 11:30 ~ pm 22:00\n15:00~17:30 (break time)\n20:30 (Last order)","ja":"am 11:30 ~ pm 22:00\n15:00~17:30 (break time)\n20:30 (Last order)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"TV프로그램을 통해 소개된 유명 쉐프가 운영하는 일식전문점으로, 기대를 충족하는 수준 있는 요리들과 깔끔하고 세련된 인테리어가 특징이다. 쉐프가 추천하는 음식으로 구성되는 오마카세 스시 코스가 특히 유명하다.","en":"This Japanese restaurant is run by a famous celebrity chef. It features elegant and satisfactory dishes, in a sophisticated interior. The Omakase Sushi Course, which consists of dishes recommended by the chef, is particularly famous.","ja":"TV番組で紹介された有名シェフが運営する日本料理専門店。期待を十分満足 させる美味しい料理と、きれいで洗練されたインテリアが特徴だ。シェフのお勧 めメニューで構成された「おまかせ寿司コース」が特に有名。"},"c":"일식","g":"해운대구","p":"051-744-3316","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200818130348030_thumbL","lat":35.17031,"lng":129.16615,"v":7174,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=163&lang_cd=ko"},{"n":{"ko":"할매재첩국집","en":"Halmae Jaecheopguk","ja":"ハルメチェチョプクク"},"m":{"ko":"재첩국, 재첩회","en":"Shellfish Soup, Jaecheop hoe (freshwater clam served raw)","ja":"チェチョプクク, シジミの刺身"},"a":{"ko":"사상구 낙동대로1530번길 20-15","en":"20-15, Nakdong-daero 1530beon-gil, Sasang-gu","ja":"沙上区 洛東通り1530番ギル20-15"},"h":{"ko":"07:00-21:00","en":"07:00-21:00","ja":"07:00-21:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"낙동강변 재첩요리 먹거리 타운에서 30여 년을 운영하고 있는 재첩국전문점으로, \n비빔그릇에 함께 나온 된장과 재첩을 넣고 \n비빔밥을 만들어 재첩국과 함께 먹는 방법이 인기 있다.","en":"It is a jaecheopguk (freshwater clam soup) specialty restaurant that has been in business for 30 \nyears at the corbicula specialty town located alongside the Nakdong River. \nThe popular way of enjoying the shellfish is making bibimbap with soybean paste and freshwater \nclam. and eating it with the soup.","ja":"洛東江辺にあるシジミ料理グルメタウンで30年以上営んでいるシジミスープ専門店で、\nビビン器に一緒に出てくる味噌とシジミを入れ\nビビンバを作ってシジミスープと一緒に食べるのが人気。"},"c":"해산물·회","g":"사상구","p":"051-301-7069","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230608100341246_thumbL","lat":35.193363,"lng":128.98607,"v":7716,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=164&lang_cd=ko"},{"n":{"ko":"예이제","en":"Yeije","ja":"イェイジェ"},"m":{"ko":"런치 ₩39,000 / 49,000\n예이제 코스 ₩69,000-150,000","en":"Lunch ₩39,000 / 49,000\nYeije Course ₩69,000-150,000","ja":"ランチ ₩39,000 / 49,000\nイェイジェコース ₩69,000-150,000"},"a":{"ko":"부산 해운대구 해운대해변로298번길 29 해운대푸르지오시티 2층","en":"29, Haeundaehaebyeon-ro 298beon-gil, Haeundae-gu","ja":"釜山広域市海雲台区海雲台海辺路298番ギル29、2階"},"h":{"ko":"12:00-15:00 / 17:30-21:20","en":"12:00-15:00 / 17:30-21:20","ja":"12:00-15:00 / 17:30-21:20"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"해운대 해변인근에 위치한 한정식전문점으로, 가족모임이나 손님 대접 등으로 많이 찾는 곳이다. 주인이 직접 고른 제철 식재료와 지인이 운영하는 농장에서 키운 채소를 사용하는이 곳은 먹는 것이 고민스러울 정도로 예쁜 음식이 특징이다.","en":"Located near Haeundae Beach, this Hanjeongsik restaurant is a favorite for family gatherings and treating guests. Using seasonal ingredients selected by the owner and vegetables grown in a farm run by an acquaintance, this restaurant presents beautiful plates that you can’t help but admire before eating.","ja":"海雲台ビーチの近くにある韓定食専門店で、家族の集まりや接待などに適して いる。店主自らが選んだ旬の食材や知人の経営する農場で採れた野菜を使用 しており、食べるのがもったいないくらい盛り付けにも気を配っている。"},"c":"한식·백반","g":"해운대구","p":"051-731-1100","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419174000260_thumbL","lat":35.16123,"lng":129.16664,"v":9015,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=166&lang_cd=ko"},{"n":{"ko":"합천일류돼지국밥","en":"Hapcheon Illyu Dwaejigukbap","ja":"陜川一流テジクッパ"},"m":{"ko":"고기국밥, 수육백반","en":"Gogigukbap (meat soup with rice), Steamed Pork Set","ja":"コギクッパ, スユク白飯"},"a":{"ko":"사상구 광장로 34","en":"34, Gwangjang-ro, Sasang-gu","ja":"沙上区広場路34"},"h":{"ko":"00:00-24:00 (24시간 영업)","en":"00:00-24:00 (Open 24 hr)","ja":"00:00-24:00(24時間営業)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"맛있는 식당들이 많기로 유명한 사상시외버스터미널 근처에서도 특히 유명한 돼지국밥 전문점으로, \n24시간 운영되는 이곳은, 관광객들이 많이 찾는 곳이기도 하다. \n마늘다대기가 수북하게 올려져 있는 것이 특징이며, 국밥만큼이나 돼지고기 수육도 유명하다.","en":"In the vicinity of Sasang Intercity Bus Terminal, famous for many delicious holes in the wall, this \nplace is especially famous for pork soup. It is open 24 hours a day, and is also a popular spot for \ntourists. They are known for topping off the soup with heaps of ground garlic. Steamed pork is just \nas famous as their soup.","ja":"おいしい店が多いことで知られる沙上(ササン)市外バスターミナルの近くでも特に有名な豚クッパ「テ\nジクッパ」の専門店。24時間営業のため観光客が多く訪れる場所でもある。ニンニクとタデギ(辛味噌)\nが山盛りに乗せられているのが特徴であり、クッパのみならず茹で豚肉「スユク」も有名だ。"},"c":"고기·구이","g":"사상구","p":"051-317-2478","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605170838962_thumbL","lat":35.16191,"lng":128.98045,"v":12768,"l":9,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=167&lang_cd=ko"},{"n":{"ko":"원조석대추어탕","en":"Wonjo Seokdae Chueotang","ja":"元祖ソッテチュオタン"},"m":{"ko":"추어탕, 가오리찜","en":"Chueotang, Braised Stingray","ja":"チュオタン, エイ蒸し"},"a":{"ko":"부산 해운대구 반송로 571번길 5","en":"5, Bansong-ro 571beon-gil, Haeundae-gu","ja":"釜山広域市海雲台区盤松路571番ギル5"},"h":{"ko":"08:30-21:00","en":"08:30-21:00","ja":"08:30-21:00"},"x":{"ko":"화요일","en":"Tuesdays","ja":"火曜日"},"d":{"ko":"입구를 들어서면 가득 쌓인 장작과 아궁이에 올려 진 커다란 무쇠솥이 눈에 들어온다.\n유명한 추어탕전문점인 이 곳의 추어탕은, 강한 화력으로 오래 끓여 부드럽고 풍부한 맛이 특징으로, 논고동무침과 가오리찜도 인기 있다.","en":"When you enter the entrance, you will see a pile of firewood and a large iron pot placed on the fireplace. This famous chueotang restaurant boils the soup for a long time on strong heat, which creates tender and rich flavor. They also offer tossed shellfish and braised stingray.","ja":"入口を入ると、高く積み上げられ薪とかまどの上の鋳鉄釜が目に入ってくる、有名 なチュオタン(どじょう鍋)専門店。強力な火で長時間煮るので柔らかく豊かな味わ いが楽しめる。ノンゴドン(たにし)の和え物とホンオチム(エイの蒸し物)も人気。"},"c":"면·국물","g":"해운대구","p":"051-523-7819","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20191219104936271_thumbL","lat":35.2195,"lng":129.12512,"v":7115,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=169&lang_cd=ko"},{"n":{"ko":"웨이브온커피","en":"Waveon Coffee","ja":"ウェーブオンコピ"},"m":{"ko":"월내 라떼, 브라질 캄포 알레그레 드립 커피","en":"Wolnae latte, Brazilian Campo Alegre drip coffee","ja":"ウォルネ ラテ, ブラジル カンポ アレグレ ドリップコーヒー"},"a":{"ko":"기장군 장안읍 해맞이로 286","en":"286, Haemaji-ro, Jangan-eup, Gijang-gun","ja":"機張郡長安邑の日の出で 286"},"h":{"ko":"10:00-24:00","en":"10:00-24:00","ja":"10:00-24:00"},"x":{"ko":"연중무휴","en":"","ja":"年中無休"},"d":{"ko":"바다와 카페라는 테마를 이야기할 때 항상 거론되는 로스토리 카페로 전문 큐그레이더가\n직접 가져온 스페셜티 커피를 이용한 드립 커피 등 커피 베리에이션 메뉴가 전문이다 .\n야외에 해변을 바라볼 수 있는 자리와 담요가 구비되어 있다.","en":"The name of this coffee roastery always comes up when discussing cafes and the sea.\nIt is known for serving a wide variety of coffee, including drip coffees using specialty beans\nselected by a certified Q grader. It has seats and blankets for appreciating the view of the\nbeach outside","ja":"海とカフェというテーマを語る時、いつも取り上げられるロースターリカフェで、専門のキューグレーダ\nーが選んだスペシャルティコーヒーを利用したドリップコーヒーなどコーヒーバリエーションメニューを\n専門にしている。 屋外には海辺を眺められる席があり、ブランケットが準備されている"},"c":"카페·베이커리","g":"기장군","p":"051-727-1660","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416143124508_thumbL","lat":35.32225,"lng":129.26979,"v":6312,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=174&lang_cd=ko"},{"n":{"ko":"대티물꽁","en":"DaetiMulkkong","ja":"デティムルコン"},"m":{"ko":"아귀찜 ￦28,000-45,000\n코다리찜 ￦28,000-45,000","en":"Agujjim(braised monkfish) ￦28,000-45,000\nKodarijjim(Braised Dried Pollack) ￦28,000-45,000","ja":"アンコウの蒸し物 ￦28,000-45,000\n半干しスケトウダラの蒸し物 ￦28,000-45,000"},"a":{"ko":"사하구 낙동대로 135번안길15","en":"15, Nakdong-daero 135beonan-gil, Saha-gu","ja":"沙下区 洛東大路 135番アンギル 15"},"h":{"ko":"11:30-21:30","en":"11:30-21:30","ja":"11:30-15:00 / 17:00-21:30"},"x":{"ko":"명절휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"주택을 개조한 포근한 공간은 중·장년층의 향수를 자극할만한 소품들로 인테리어 되어 있다.\n비교적 저렴한 가격으로 푸짐한 음식들을 만날 수 있어 이 지역의 주민들에게 오랜 시간 사랑받아온 아귀찜전문점이다.","en":"The renovated house has a cozy décor, filled with props that bring out the nostalgia of the older generation.\nIt is a beloved neighborhood hole-in-the-wall that specializes in braised monkfish, and serves generous portions at affordable prices.","ja":"住宅を改造した居心地のよい空間は中高年層の郷愁を誘う小物でインテリアされている。\n比較的リーズナブルでボリュームたっぷりの料理を楽しめる \nこの地域の住民に長い間愛されてきたアンコウ蒸し専門店。"},"c":"한식·백반","g":"사하구","p":"051-203-4425","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417163511863_thumbL","lat":35.10239,"lng":129.00041,"v":5144,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=177&lang_cd=ko"},{"n":{"ko":"원조18번완당","en":"Wonjo 18beon Wandang","ja":"元祖18番 ワンタン"},"m":{"ko":"발국수 ￦8,500\n완당 ￦8,500","en":"Balguksuk ￦8,500\nWandang(Wontons) ￦8,500","ja":"パルグクス ￦8,500\nワンタン ￦8,500"},"a":{"ko":"서구 구덕로 238번길 6","en":"6, Gudeok-ro 238beon-gil, Seo-gu","ja":"西区 九德路 238番キル 6"},"h":{"ko":"10:30-19:30","en":"10:30-19:30","ja":"10:30-19:30"},"x":{"ko":"연중무","en":"Open every day","ja":"年中無休"},"d":{"ko":"1947년부터 3대를 이어 운영 중인 유명한 식당으로 \n1대 창업주가 일본에서 배워온 완당을 한국인의 입맛에 맞게 발전시켰다.\n부산 음식문화의 한 부분을 장식한 유서 깊은 식당이다.","en":"Since 1947, this famous restaurant has been operating for three generations. \nThe founder learned how to make wontons in Japan and developed it to accommodate the \nKorean palate. This is a historic restaurant that played an important part in establishing \nthe food culture in Busan.","ja":"1947年から3代続けて営む有名店で、1代目の創業者が日本で学んできたワンタンを\n韓国人の好みに合わせて発展させた。\n釜山の食文化の一部を飾った由緒あるお店だ。"},"c":"면·국물","g":"서구","p":"051-256-3391","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418090456625_thumbL","lat":35.105713,"lng":129.02045,"v":5650,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=184&lang_cd=ko"},{"n":{"ko":"할매복국","en":"Halmae Bokguk","ja":"ハルメボクグク"},"m":{"ko":"복지리, 흰밀복수육","en":"Pufferfish Soup , Steamed White Pufferfish Meat","ja":"ふぐちり, シロサバフグのゆで肉"},"a":{"ko":"달맞이길62번길 1","en":"1, Dalmaji-gil 62beon-gil","ja":"ダルマジギル62ギル1"},"h":{"ko":"오픈 07:00 / 마감 21:30\n(break time 15:00~17:00) \n(Last order 14:00, 20:30)","en":"Open 07:00 / Closed 21:30\n(break time 15:00~17:00) \n(Last order 14:00, 20:30)","ja":"開店 07:00 / 閉店 21:30\n(break time 15:00~17:00) \n(Last order 14:00, 20:30)"},"x":{"ko":"월요일","en":"Mondays","ja":"月曜日"},"d":{"ko":"‘복국촌’으로 알려진 미포 지역의 대표적인 복요리 전문점으로, 부산 향토 음식점 31곳 중하나이다. 복어를 사용한 맑은 탕인 복지리가 대표메뉴이며, 복어죽과 수육, 복불고기와 복어찜 등의 요리도 맛볼 수 있다.","en":"One of the 31 designated folk restaurants in Busan, it is the best-known pufferfish restaurant in the Mipo area, known as “pufferfish village.” Bokjiri, a clear broth from pufferfish, is the signature menu. You can also enjoy dishes such as pufferfish porridge, steamed pufferfish, pufferfish bulgogi, and braised pufferfish.","ja":"「ふぐ村」として知られているミポ(尾浦)地域の代表的なふぐ料理専門店。 釜山の郷土料理店38か所のうちの一つ。ふぐちりが代表メニューで、 ほかにもふぐのお粥とスユク、焼き物、蒸し物などの料理も味わえる。"},"c":"해산물·회","g":"해운대구","p":"051-742-2790","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20191219134018171_thumbL","lat":35.160915,"lng":129.17152,"v":8183,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=190&lang_cd=ko"},{"n":{"ko":"젠스시","en":"Zen Sushi","ja":"善寿司"},"m":{"ko":"디너 1인 ￦150,000\n콜키지 병당 ￦50,000","en":"Dinner for one ￦150,000\nCorkage per bottle ￦50,000","ja":"ディナー 1人 ￦150,000\nコルケージ 1本あたり ￦50,000"},"a":{"ko":"해운대구 대천로42번길28-5","en":"28-5, Daecheon-ro 42beon-gil, Haeundae-gu","ja":"海雲台区大川路42番ギル28-5"},"h":{"ko":"18:00-22:00","en":"18:00-22:00","ja":"18:00-22:00"},"x":{"ko":"월, 화요일 휴무","en":"Closed on Mondays and Tuesdays","ja":"月、火曜休み"},"d":{"ko":"해운대의 유명 일식전문점으로, 명인 인증서를 받은 오너 쉐프가 운영하며, 주방 분위기가 엄격하고, 위생에 무척 신경을 쓰는 것으로도 유명하다. 열 가지의 초밥과 함께 미소시루, 달걀 찜, 튀김 등으로 구성 된 코스요리가 대표메뉴.","en":"It is a famous Japanese restaurant in Haeundae, operated by the owner-chef who received a certificate of Master Chef. Zen Sushi is known for its strict kitchen atmosphere and attention to hygiene. A course meal consisting of 10 kinds of sushi, miso soup, egg custard, tempura, and more, is the top menu item.","ja":"海雲台の有名な日本料理専門店で、名人の証明書を保有するオーナーシェフが運営している。キッチン\nの管理が厳しく、衛生に非常に気を使うことでも有名。10種類の寿司と味噌汁、茶碗蒸し、天ぷらなど\nで構成されたコース料理が代表メニュー。"},"c":"일식","g":"해운대구","p":"051-746-7456","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240422090815838_thumbL","lat":35.170803,"lng":129.17145,"v":7385,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=193&lang_cd=ko"},{"n":{"ko":"신창국밥 본점","en":"Sinchang Gukbap","ja":"シンチャンクッパ"},"m":{"ko":"왕순대국밥 ￦9,000\n수육 ￦30,000 / 45,000","en":"Wangsundae Gukbap ￦9,000\nSteamed pork ￦30,000 / 45,000","ja":"特大スンデクッパ ￦9,000\nゆで肉 ￦30,000/45,000"},"a":{"ko":"서구 보수대로 53","en":"53, Bosu-daero, Seo-gu","ja":"西区 寶水大路 53"},"h":{"ko":"09:00-21:00","en":"09:00-21:00","ja":"09:00-21:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"1969년에 국제시장 신창동에서 시작하여 신창국밥이라 이름 지어진 식당으로,\n맑은 국물의 돼지국밥이 시작된 곳이다.\n신선한 재료와 전통방식인 토렴을 고수하고, 직접 만드는 이북식 순대도 인기 있다.","en":"The famous restaurant was named Sinchang Gukbap, as it was established in 1969 at the Gukje \nMarket in Sinchang-dong. This is the origin of clear-broth dwaejigukbap.\nThey insist on fresh ingredients and the traditional toryeom method, and their North Korean-style \nsundae made from scratch is also very popular.","ja":"1969年に国際市場の新昌洞(シンチャンドン)で始まり、シンチャンクッパと名付けられた有名店で、\n澄んだスープのテジクッパの始まりとされる。\n新鮮な材料や伝統的な方法であるトゥェヨム(退染)にこだわり、自家製の北部式スンデも人気がある。"},"c":"면·국물","g":"서구","p":"051-244-1112","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417173744613_thumbL","lat":35.10093,"lng":129.02254,"v":6491,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=198&lang_cd=ko"},{"n":{"ko":"옛날오막집","en":"Yennal Omakjip","ja":"イェンナル　オマクチブ"},"m":{"ko":"특양 170g ￦38,000\n대창 180g ￦37,000","en":"Tripe 170g ￦38,000\nLarge Intestines 180g ￦37,000","ja":"上ミノ170g ￦38,000\n大腸 180g ￦37,000"},"a":{"ko":"서구 구덕로274번길 14","en":"14 Gudeok-ro 274beon-gil, Seo-gu","ja":"西区九徳路274番ギル14"},"h":{"ko":"12:00-21:30\n(20:30 라스트 오더)","en":"12:00-21:30","ja":"12:00-21:30"},"x":{"ko":"2, 4주 월요일 휴무","en":"Closed on second and fourth Mondays","ja":"第2/4月曜休み"},"d":{"ko":"1958년부터 운영하고 있는 유명한 내장구이전문점으로 오랜 세월 사랑받고 있는 곳이다 .\n이곳의 내장구이는 전통만큼이나 각별한 맛을 자랑하는데 함께 제공되는\n장아찌와 나물들을 곁들여 먹으면 또 다른 맛을 즐길 수 있다.","en":"Established in 1958, Yetnal Omakjip is a longtime local favorite for grilled beef innards.\nTheir amazing grilled meats prove their history and taste even better with pickles and\ntossed vegetables offered on the side.","ja":"1958年から続く有名なホルモン焼き専門店として長年愛されてきた。このお店のホルモン焼き\nは伝統のある味が自慢だが、漬物や野菜の和え物「ナムル」と合わせて頂くとまた違った味わい\nが楽しめる。"},"c":"고기·구이","g":"서구","p":"051-243-6973","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418090136482_thumbL","lat":35.108913,"lng":129.0199,"v":6325,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=200&lang_cd=ko"},{"n":{"ko":"평안도족발","en":"Pyeongan-do Jokbal","ja":"平安道豚足"},"m":{"ko":"족발, 마늘족발","en":"Jokbal, Garlic Jokbal","ja":"豚足、ニンニク豚足"},"a":{"ko":"부산 해운대구 달맞이길 14","en":"14, Dalmaji-gil, Haeundae-gu","ja":"釜山広域市海雲台区タルマジキル14"},"h":{"ko":"12:00-24:00","en":"12:00-24:00","ja":"12:00-24:00"},"x":{"ko":"명절","en":"Traditional holidays","ja":"名節（旧正月・秋夕）"},"d":{"ko":"30년 넘게 한자리에서 운영해온 전통 있는 족발전문점으로, 이 지역 사람들에게 오래 사랑 받아온 곳이다. 오래된 식당답게 족발 특유의 냄새가 없는 깔끔하고 균형 잡힌 족발의 맛이 특징이며, 냉채족발과 마늘족발 등의 메뉴도 인기 있다.","en":"This is a long-established jokbal shop that has been operating in one place for over 30 years, a long-time local favorite. This longstanding legend is known for the balanced, clean taste of pork hocks free of meaty odor. Naengchae jokbal and garlic jokbal are also very popular.","ja":"30年以上、この場所で営んできた伝統ある豚足専門店。地元の人にも長く愛され てきた店らしく、豚足特有の臭さがない、バランスのとれた美味しさが特徴。 冷菜豚足とニンニク豚足などのメニューも人気。"},"c":"한식·백반","g":"해운대구","p":"051-741-6568","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20191219141936064_thumbL","lat":35.161945,"lng":129.16637,"v":6766,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=201&lang_cd=ko"},{"n":{"ko":"한우숯불양곱창","en":"Hanwoo Sootbul Yanggopchang","ja":"韓牛炭火ヤンゴプチャン"},"m":{"ko":"특양(200g), 전골","en":"Special Yang, Hot Pot","ja":"特羊, 鍋"},"a":{"ko":"부산 해운대구 해운대해변로 385","en":"385, Haeundaehaebyeon-ro, Haeundae-gu","ja":"釜山広域市海雲台区海雲台海辺路385"},"h":{"ko":"16:00-22:00","en":"16:00-22:00","ja":"16:00-22:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"해운대 중동역 인근의 양곱창 전문점인 이 곳은 특히 소의 첫 번째 위인 특양 양념구이가 유명하다. 주문과 동시에 특제양념을 발라, 점원이 구워주는 이 곳의 특양 구이는 무척 부드 러우면서도 살짝 탄력 있는 식감이 특징이다.","en":"Located near Haeundae Jung-dong Station, this grilled tripe restaurant is especially known for the marinaded and grilled teugyang, stomach chamber 1. At the time of order, the special marinade is brushed on the meat, then the staff provides the grilling service. It has a very tender yet slightly chewy texture.","ja":"海雲台中洞駅近くのヤンゴプチャン専門店で、特に牛の第一胃袋である特羊味 付け焼きが有名である。注文と同時に  모두 셀프리필이 가능하고, 직원들이 항상 친절한 것으로도 유명하다","en":"It is a popular nakjibokkeum (spicy small octopus stir-fry) specialty restaurant known for\ngenerous portions and a relatively mild taste.\nIt has emerged as a new rising star among Busan’s competing octopus stir-fry places.\nAll of the side dishes can be self-refilled, and the service is always friendly.","ja":"ボリュームたっぷりで刺激の少ない味が人気のテナガダコ炒め専門店で、\n釜山の錚々たるテナガダコ炒め専門店の中から新星として注目されている。\nおかずはすべてセルフでおかわりができ、店員がいつも親切なことでも有名なお店。"},"c":"해산물·회","g":"수영구","p":"051-754-7776","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418103113463_thumbL","lat":35.168022,"lng":129.11382,"v":5192,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=208&lang_cd=ko"},{"n":{"ko":"베지나랑","en":"Vegenarang","ja":"ベジナラン"},"m":{"ko":"흑미콩까스, 아보카도 롤","en":"Bean Cutlet with Black Rice, Avocado roll","ja":"黒米豆カツ, アボカドロール"},"a":{"ko":"수영구 광안해변로370번길 9-32 노블스카이 9층","en":"9F, Noble Sky, 9-32, Gwanganhaebyeon-ro 370beon-gil, Suyeong-gu","ja":"水営区 広安海辺路 370番キル 9-32ノーブルスカイ9階"},"h":{"ko":"11:30-15:00 / 17:00-21:00\n(14:20, 20:00 라스트 오더)","en":"11:30-15:00 / 17:00-21:00 \n(Last order 14:20, 20:00)","ja":"11:30-15:00 / 17:00-21:00\n(14:20, 20:00ラストオーダー)"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"매일 준비하는 깨끗한 채수로 맛을 내고 간단한 샐러드부터 일품요리, \n코스요리까지 다양하게 준비하는 비건 식당이다.\n비건 식당 특성 상 외국인 손님들이 많이 찾는다고 한다.","en":"Vegenarang is a vegan restaurant that uses flavors from clean veggie-based broth \nand serves simple salads as well as a la carte dishes.\nThe vegan menu is especially popular among foreign visitors.","ja":"毎日仕入れる新鮮な野菜で味をつけ、手軽なサラダから一品料理、 \nコース料理まで豊富なメニューが楽しめるビーガンレストラン。\nビーガンレストランらしく外国人客が多く訪れるという。"},"c":"기타","g":"수영구","p":"0507-1416-5561","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230608142501309_thumbL","lat":35.156757,"lng":129.13426,"v":5099,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=212&lang_cd=ko"},{"n":{"ko":"광안리신라횟집","en":"Silla Hoetjip" coli soup and seasonal green salad. The crispy tonkatsu goes wonderfully with their special sauce.","ja":"シンプルでモダンなインテリアが印象的な軽洋食専門店。ローストンカツを注文 すると、濃厚なブロッコリーのクリームスープや新鮮な生ローストンカツ、季節の サラダがセットで付いてくる。揚げたてのトンカツと特製ソースのバランスが絶妙 に美味しい。"},"c":"해산물·회","g":"남구","p":"051-612-5649","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20191219153031872_thumbL","lat":35.13028,"lng":129.10002,"v":5338,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=215&lang_cd=ko"},{"n":{"ko":"초원복국 대연본점","en":"Chowonbokguk","ja":"草原ポック"},"m":{"ko":"복국 ￦16,000\n복수육 ￦40,000","en":"Bokguk(pufferfish soup) ￦16,000\nBok suyuk(steamed pufferfish meat) ￦40,000","ja":"ポックク(ふぐスープ) ￦16,000\nゆでふぐ ￦40,000"},"a":{"ko":"남구 황령대로492번길 30","en":"30, Hwangnyeong-daero, 492beon-gil, Nam-gu","ja":"南区荒嶺大路492番ギル30"},"h":{"ko":"09:00-15:00 / 17:00-21:00","en":"09:00-15:00 / 17:00-21:00","ja":"09:00-15:00 / 17:00-21:00"},"x":{"ko":"명절휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"무척 유명한 복어요리 전문점인 이곳은 50년 경력의 일식요리사인 아버지와\n부산 최초의 특수조리사 복어자격증 소지자인 아들이 2대째 경영하고 있는 곳으로,\n언제나 많은 손님들로 북적이는 곳이다. 최상급의 복어요리를 만날 수 있는 곳이다","en":"Chowonbokguk is a well-known restaurant specializing in pufferfish cuisine. Started by a father with 50 years of experience as a Japanese restaurant chef, it is now managed by his son, who was the first to obtain the special cooking license for pufferfish in Busan. The place is always packed with customers who want to taste their top-notch pufferfish dishes.","ja":"とても有名な河豚(ふぐ)料理専門店で、この道50年の経歴を持つ日本料理人の父と、釜山\nで初めて河豚の特殊調理師の資格を取得した息子が経営している。いつも大勢のお客さ\nんで賑わい、最上級の河豚料理が楽しめる。"},"c":"해산물·회","g":"남구","p":"051-628-3935","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416153630841_thumbL","lat":35.137794,"lng":129.10591,"v":6464,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=218&lang_cd=ko"},{"n":{"ko":"석화한정식","en":"Seokhwa Hanjeongsik","ja":"ソクファ韓定食"},"m":{"ko":"석화 한정식, 석화고향 한정식","en":"Seokhwa Hanjeongsik, Seokhwa Hometown Hanjeongsik","ja":"ソクファ韓定食, ソクファコヒャン韓定食"},"a":{"ko":"부산광역시 동구 조방로 21","en":"21, Jobang-ro","ja":"ジョバン路21"},"h":{"ko":"11:30-21:00\n(14:00-17:00 브레이크 타임)\n(19:00 라스트 오더)","en":"11:30-21:00 \n(Break time 14:00-17:00) \n(Last order 19:00)","ja":"11:30-21:00\n(14:00-17:00休憩時間)\n(19:00ラストオーダー)"},"x":{"ko":"매달 2,4번째 월요일","en":"Traditional holidays","ja":"名節(旧正月·秋夕)"},"d":{"ko":"차려지는 음식 하나하나가 먹기 아까울 정도로 섬세하게 담겨져 나온다. 격식있는 모임의 장소로도 유명한 고급한정식전문점으로, 버섯탕수와 전복초가 나오는 고향한정식과 관자숙 회와 갈비찜 장어구이가 나오는 어머니한정식이 대표메뉴.","en":"Each dish is presented in such a delicate way that it is almost too beautiful to eat. It is a fine-dining Korean restaurant popular for formal gatherings. Their signature dishes include the Hometown Hanjeongsik served with fried mushrooms and stir-fried abalones, and Mother’s Hanjeongsik served with steamed scallops, braised beef ribs, and grilled eel.","ja":"料理１品１品が食べるのがもったいないほど繊細に盛りつけられて出てくる。 格式ある集まりの場所としても有名な高級韓定食専門店で、ポソッタンス(きのこの甘酢揚げ)やジョンボクチョ(アワビの煮つけ)が出てくるコヒャン韓定食と、貝柱の刺身やカルビチム、焼きウナギが出てくるオモニ韓定食が代表メニュー。"},"c":"한식·백반","g":"동구","p":"0507-1496-5005","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220513092736141_thumbL","lat":35.13881,"lng":129.06189,"v":8019,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=234&lang_cd=ko"},{"n":{"ko":"내당","en":"Naedang","ja":"ネダン"},"m":{"ko":"일품한상(평일점심특선) 1인, 연코스(코스메뉴) 1인","en":"Ilpum Hansang (Weekday Lunch Special) for 1, Yeon Course (Course Meal) for 1","ja":"一品一膳(平日ランチ特選)１人, ヨンコース(コースメニュー)１人"},"a":{"ko":"동래구 금강공원로 20번길 23 호텔농심 별관","en":"Hotel Nongshim Annex, 23 Geumganggongwon-ro 20beon-gil, Dongnae-gu","ja":"東莱区 金剛公園路 20番キル 23 ホテル農心 別館"},"h":{"ko":"월-금 12:00-21:30\n(15:00-17:30 브레이크 타임)\n토-일 11:30-21:30\n(13:30-14:00 브레이크 타임)\n(16:00-17:00 브레이크 타임)\n(19:00-19:30 브레이크 타임)","en":"Monday-Friday 12:00-21:30 \n(Break time 15:00-17:30) \nSaturday-Sunday 11:30-21:30 \n(Break time 13:30-14:00) \n(Break time 16:00-17:00) \n(Break time 19:00-19:30)","ja":"月曜日～金曜日12:00-21:30\n(15:00-17:30休憩時間)\n ":"고기만두 ₩4,500\n군만두 ₩5,300","en":"Meat Dumplings ₩4,500\nGrilled Dumplings ₩5,300","ja":"肉餃子(コギマンドゥ) ₩4,500\n焼き餃子(クンマンドゥ) ₩5,300"},"a":{"ko":"부산 동구 대영로243번길62","en":"62, Daeyeong-ro 243beon-gil, Dong-gu","ja":"釜山広域市東区大瀛路243番ギル62"},"h":{"ko":"11:00 ~ 21:00","en":"11:00 ~ 21:00","ja":"11:00 ~ 21:00"},"x":{"ko":"화요일","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"부산차이나타운의 양대 만두전문점 중 하나인 유명한 식당으로, 시간과 관계없이 길게 줄이 서있는 곳이다. 중국빵과 만두를 전문으로 하는 이 곳의 만두는 두께감이 느껴지는 푹신한 만두피와 풍부한 육즙의 고기만두가 대표음식이다.","en":"This famous restaurant is one of the two major dumpling shops in Busan Chinatown. You will find long lines of people regardless of the time. Specializing in Chinese bread and dumplings, this shop’s thick and fluffy dumplings, mainly the juicy meat dumplings, are popular.","ja":"釜山チャイナタウンの有名な二大餃子専門店の一つで、時間帯に関わら ず、常に行列ができている。中国のパンと餃子を専門にしているこの店の 餃子は、本場中国風のふっくらと厚みのある皮と、食べた瞬間肉汁がにじ み出る肉餃子「コギマンドゥ」が代表メニュー。"},"c":"고기·구이","g":"동구","p":"051-467-0177","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20191220111654951_thumbL","lat":35.114815,"lng":129.03873,"v":9753,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=242&lang_cd=ko"},{"n":{"ko":"초량 1941","en":"Choryang 1941","ja":"草梁1941"},"m":{"ko":"바닐라우유, 생강우유","en":"Vanilla Milk, Ginger Milk","ja":"バニラミルク, ジンジャーミルク"},"a":{"ko":"동구 망양로 533-5","en":"533-5, Mangyang-ro, Dong-gu","ja":"釜山広域市東区望洋路533-5"},"h":{"ko":"10:30-18:00\n(17:30 라스트 오더)","en":"10:30-18:00 \n(Last order 17:30)","ja":"10:30-18:00\n(17:30ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"동구의 관광명소인 ‘이바구길’에 위치한 이 카페는 1941년 당시 부산에 살던 일본인에 의해 지어진 집을 개조한 곳으로, 주변 환경을 포함해 외관도 실내도 모두 1941년을 연상시 키는 레트로한 감성을 가지고 있다. \n메인메뉴는 자체개발한 예쁜 병에 담겨있는 다양한 ‘우유’이다.","en":"Located in Ibagu-gil, a tourist attraction in Dong-gu, this cafe renovated a house built by the Japanese who lived in Busan in 1941. The exterior and interior, including the surrounding environment,\nare reminiscent of the day. The main menu is a variety of “milk” contained in pretty bottles designed by the cafe.","ja":"東区の観光スポットである「イバグキル」にあるこのカフェは、1941年当時、釜山に住んでいた日本人に\nよって建てられた家をリノベーションしたもので、周囲もそうだが、外観や室内も、当時を連想させるレ\nトロな感性を持っている。\nメインメニューは、独自開発したという、瓶入りのいろいろな「牛乳」。"},"c":"분식·주점","g":"동구","p":"051-462-7774","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601112526719_thumbL","lat":35.11969,"lng":129.02942,"v":12293,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=245&lang_cd=ko"},{"n":{"ko":"60년 전통 할매국밥","en":"Halmae Gukbap","ja":"60年の伝統 ハルメクッパ"},"m":{"ko":"따로 국밥 ￦7,000\n수육백반 ￦9,000","en":"Ddaro gukbap ￦7,000\nSteamed meat set ￦9,000","ja":"タロクッパ ￦7,000\nゆで肉白飯 ￦9,000"},"a":{"ko":"동구 중앙대로533번길 4","en":"4, Jungang-daero 533beon-gil, Dong-gu","ja":"東区 中央大路533番ギル4"},"h":{"ko":"10:00-19:00","en":"10:00-19:00","ja":"10:00-19:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"60년 전통의 돼지국밥 전문점으로 식사 시간에는 30분 이상을 기다려야 하는 유명한 식당이다. \n대부분의 돼지국밥들과는 다른 맑은 국물이 특징이며, 대충 썬 것 같은 돼지 수육은 \n예상외로 부드러운 맛이다. 돼지국물과 고기가 따로 나오는 수육백반이 특히 인기 있다.","en":"This is a restaurant specializing in pork soup with 60 years of tradition. It’s so famous that you \nhave to wait longer than 30 minutes during meal times. Unlike most other pork soup, their dwaejigukbap has clear broth, and the roughly sliced pork meat is incredibly tender. \nThe steamed meat set, which serves the pork broth and meat separately, is especially popular.","ja":"60年の伝統を持つ、テジクッパ専門店で、食事時間には、30分以上並ばないといけないという程、有名\nな店だ。一般的なテジクッパとは違い、澄んだスープが特徴。大まかにスライスされたゆで豚肉は、予\n想以上にまろやかな味。\nスープと肉を混ぜない状態で出されるゆで肉白飯「スユクペッパン」が特に人気。"},"c":"면·국물","g":"동구","p":"051-646-6295","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416171620563_thumbL","lat":35.141018,"lng":129.05618,"v":13309,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=246&lang_cd=ko"},{"n":{"ko":"함경면옥","en":"Hamgyeong Myeonok","ja":"咸鏡麺屋"},"m":{"ko":"냉면, 왕갈비탕, 왕만두 소","en":"Naengmyeon (Cold Noodles), Wang Galbitang, Dumplings Small","ja":"冷麺, 王カルビタン, 王餃子 小"},"a":{"ko":"부산광역시 동래구 온천장로 64 1층","en":"213, Chungnyeol-daero","ja":"忠烈大路213"},"h":{"ko":"11:00 -22:00","en":"11:00 -22:00","ja":"11:00-21:00\n(20:30ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"隔週月曜日"},"d":{"ko":"30년 장인의 솜씨로 만든 냉면의 맛은 비교할만한 대상이 드물다. 부산에서 가장 유명한 냉면전문점 중 한 곳으로, 계절을 가리지 않고 항상 많은 사람들이 찾아오는 것이 이곳의 변하지 않는 맛을 증명하고 있다","en":"The taste of naengmyeon made by artisans for 30 years is hard to compare with others. It is one of the most famous naengmyeon restaurants in Busan, and the fact that many people always come, regardless of the season, proves the unchanging taste of this place.","ja":"30年の実力を持つ職人が作った冷麺の味は比べ物にならない。 釜山で最も有名な冷麺専門店のひとつで、季節を問わず訪れる多くのお客さんがこの店の変わらぬ味を証明している。"},"c":"고기·구이","g":"동래구","p":"051-556-2020","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220512102852754_thumbL","lat":35.216976,"lng":129.08171,"v":4515,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=252&lang_cd=ko"},{"n":{"ko":"김유순대구뽈찜","en":"Kim Yu-sun Daegu Ppoljjim","ja":"キムユスンデグボルチム"},"m":{"ko":"대구뽈찜 ￦31,000 / 43,000 / 50,000","en":"Braised codfish cheeks ￦31,000 / 43,000 / 50,000","ja":"たらの頭の蒸し物 ￦31,000 / 43,000 / 50,000"},"a":{"ko":"남구 진남로15","en":"15, Jinnam-ro, Nam-gu","ja":"南区 鎮南路 15"},"h":{"ko":"11:30-21:00","en":"11:30-21:00","ja":"11:30-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"충무식당이란 이름으로도 많이 기억하고 있는 대구뽈찜전문점으로\n양파가 가득 들어간 빨간 양념이 특징이다. 콩나물과 빨간 양념이 수북하게 쌓여있는\n독특한 모습의 대구뽈찜은 막걸리와도 잘 어울리고, 감자면 사리를 추가해서 먹으면 완벽하다.","en":"Also remembered by its old name, Chungmu Restaurant, this restaurant specializes in\nbraised codfish cheek, characterized by the spicy marinade and a heap of onion slices. The\nunique presentation of braised codfish cheeks, which are topped with bean sprouts and\nspicy marinade, pairs well with makgeolli and is perfect when eaten with potato noodles.","ja":"チュンムシクタンという名前でも記憶されるデグボルチム(たらの頭の蒸し物)専門店で、玉ねぎがいっ\nぱい入った赤いヤンニョムが特徴的。もやしと赤いヤンニョムが山積みになっているユニークな見た\n目のたらの頭の蒸し物はマッコリともよく合い、じゃがいも麺を追加して食べると完璧。"},"c":"면·국물","g":"남구","p":"051-627-4319","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230525155402064_thumbL","lat":35.136368,"lng":129.09152,"v":7432,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=564&lang_cd=ko"},{"n":{"ko":"백산키친","en":"Baeksan Kitchen","ja":"ペクサンキッチン"},"m":{"ko":"모듬숙성회 ￦60,000-120,000\n수비드 스테이크 ￦35,000","en":"Assorted aged sliced raw fish\n￦60,000-120,000\nSous vide steak ￦35,000","ja":"熟成刺身の盛り合わせ ￦60,000-120,000\nスーヴィードステーキ ￦35,000"},"a":{"ko":"동구 조방로14 동일타워","en":"(Dongil Tower), 14 Jobang-ro, Dong-gu","ja":"東区チョバンロ14トンイルタワー"},"h":{"ko":"17:30-01:00","en":"17:30-01:00","ja":"17:30-01:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"계절재료를 사용해 사시미, 구이, 탕 등 다양한 요리를 만들어내는 일식주점으로\n술을 즐기려 찾았다가 배부르게 식사하게 된다는 무서운 곳이다.\n숙련된 쉐프가 정성껏 준비하는 친절하고 기분 좋은 곳이다.","en":"This Japanese-style izakaya restaurant uses seasonal ingredients to create a variety of dishes \nsuch as sashimi, grilled dishes, and soup.\nPeople come here for drinks but end up very full.\nThe service is friendly and pleasant, and the food is carefully prepared by experienced chefs.","ja":"季節の材料を使って刺身、焼き物、スープなど様々な料理を提供する日本式の居酒屋で、\nお酒を楽しむために訪れたらお腹いっぱい食べてしまっていたといわれるほど。\n熟練したシェフが丹念に料理を仕込む親切で心地よいお店。"},"c":"해산물·회","g":"동구","p":"051-635-8219","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416172624208_thumbL","lat":35.13873,"lng":129.06345,"v":4042,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=566&lang_cd=ko"},{"n":{"ko":"왔다식당","en":"Wakda Sikdang","ja":"ワッダシクタン"},"m":{"ko":"스지수육, 스지 된장전골","en":"Steamed tendon, Doenjang jeongol with tendons","ja":"スジゆで肉, スジ入りテンジャンの寄せ鍋"},"a":{"ko":"영도구 하나길 811","en":"811, Hana-gil, Yeongdo-gu","ja":"影島区 ハナキル 811"},"h":{"ko":"월~토 08:30-15:00\n*라스트오더 14:00","en":"Monday–Saturday 08:30-15:00","ja":"月曜日～土曜日08:30-15:00"},"x":{"ko":"일요일, 명절 휴무","en":"Closed on Sundays and public holidays","ja":"日曜、名節休み"},"d":{"ko":"일본인 손님들도 자주 찾는 이곳은 30여 년간 운영해온 한우스지요리 전문점으로, \n부드러운 식감의 스지는 반드시 한우만 사용한다고 한다.\n대표메뉴인 된장전골을 먹을 때는 반드시 라면사리를 추가하는 것을 추천한다.","en":"This Hanwoo tendon specialty restaurant that has been operating for more than 30 years is \nalso frequented by Japanese guests. It only uses Hanwoo beef for the soft-textured tendons. \nIf you are ordering doenjang jeongol, their signature item, it’s highly recommended to add \nramen noodles.","ja":"日本人客もよく訪れるこの店は、約30年間営む韓牛スジ料理専門店で、 \n柔らかい食感のスジは必ず韓牛だけを使うという。\n代表メニューであるテンジャンの寄せ鍋を食べる時は、必ずラーメンを追加してみて。"},"c":"면·국물","g":"영도구","p":"051-412-2676","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418143145988_thumbL","lat":35.094036,"lng":129.05635,"v":5650,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=576&lang_cd=ko"},{"n":{"ko":"영변횟집","en":"Yeongbyeon Hoejip","ja":"ヨンビョンフェッチプ"},"m":{"ko":"세꼬시(넙치), 모듬회","en":"Seggoshi (flounder), Assorted Hoe (sashimi)","ja":"セコシ（ヒラメ), 盛り合わせ刺身"},"a":{"ko":"부산 해운대구 송정강변로 15","en":"15 Songjeonggangbyeon-ro, Haeundae-gu, Busan","ja":"釜山市海雲台区ソンジョンガンビョンロ15"},"h":{"ko":"매일 11:00 ~ 21:00","en":"Every day 11:00-21:00","ja":"毎日11:00~21:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"뼈와 함께 먹는 잘게 썬 세꼬시가 특히 유명한 생선회전문점으로, 도다리, 광어, 우럭, 돌돔, 농어 등 다양한 활어를 철에 따라 즐길 수 있다. 특히 가자미나 광어를 이용한 세꼬시가 인기 메뉴로 회를 주문하면 상을 꽉 채우는 반찬과 해산물 등이 함께 제공된다.\n\n※ 2026년 설 연휴(2/16~2/18) 정상 영업","en":"This restaurant specializes in seggosi(sashimi), which is finely chopped hoe eaten with bones. Enjoy a variety of live fish such as flounder, halibut, rockfish, rock bream, and sea bass according to the season. Seggosi made with flounder or halibut are quite popular here. When you order hoe, the table is filled with side dishes and seafood.\n\n※ Open as usual during the 2026 Lunar New Year holiday (Feb 16–18)","ja":"骨ごと細かく切ったセコシ(背越しの刺身)が特に有名な刺身専門店。メイタガレイ、ヒラ メ、クロソイ、石鯛、スズキなど、様々な旬の活魚を味わうことができる。特にカレイやヒラ メが人気メニュー。刺身を注文するとテーブルいっぱいにおかずや海産物が並ぶ。\n\n※ 2026年旧正月（ソルラル）連休（2月16日～2月18日）は通常通り営業いたします"},"c":"해산물 eshing taste of yukgaejang is also very popular","ja":"美食家だけが訪れる隠れた名店として知られていたが\n現在は多くの人々が気軽に訪れることができるよう広い店舗に移り営業している。 \n餃子だけでなく、さっぱりした味のユッケジャンが有名なお店。"},"c":"기타","g":"동래구","p":"051-502-8784","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607173727769_thumbL","lat":35.196102,"lng":129.06027,"v":6415,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=904&lang_cd=ko"},{"n":{"ko":"석화정","en":"Seokhwajeong","ja":"ソッカジョン"},"m":{"ko":"굴국밥, 생굴","en":"Oyster Soup with Rice, Raw oysters","ja":"牡蛎クッパ, 生牡蛎"},"a":{"ko":"영도구 동삼로 42번길 16-11","en":"16-11, Dongsam-ro 42beon-gil, Yeongdo-gu","ja":"影島区東三路42番ギル16-11"},"h":{"ko":"09:00-21:00","en":"09:00-21:00","ja":"09:00-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"20여 년을 운영해 온 굴요리 전문점으로, 제철 생굴, 굴구이, \n굴튀김, 굴파전, 굴김치 등 굴을 이용한 다양한 음식들을 즐길 수 있다. \n특히 대표메뉴인 굴국밥은 신선한 자연산 굴을 사용하여, 깔끔하고 풍부한 맛으로 인기 있다","en":"This is a restaurant specializing in oysters for 20 years. You can enjoy a variety of dishes made with \noysters, such as fresh oysters, grilled oysters, fried oysters, oyster pancake, and oyster kimchi. \nIn particular, an oyster soup made with fresh natural oysters is popular for its refreshing and rich \nflavor.","ja":"20年以上営んでいるカキ料理専門店で、旬の生牡蛎、牡蛎焼き、牡蛎フライ、牡蛎チヂミ、牡蛎キムチな\nど、牡蛎を使ったいろいろな料理を楽しむことができる。特に代表メニューである牡蛎「クル」クッパは、\n新鮮な天然の牡蛎を使い、旨みがしっかり出たスープが人気。"},"c":"해산물·회","g":"영도구","p":"070-8913-9989","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230608114815119_thumbL","lat":35.07709,"lng":129.07228,"v":9192,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=917&lang_cd=ko"},{"n":{"ko":"에테르","en":"Aether","ja":"エーテル"},"m":{"ko":"랍스터롤, 치킨아보카도롤","en":"Lobster Roll, Chicken Avocado Roll","ja":"ロブスターロール, チキンアボカドロール"},"a":{"ko":"부산 영도구 절영로 234","en":"234, Jeoryeong-ro, Yeongdo-gu","ja":"影島区ジョリョン路234"},"h":{"ko":"10:00-22:00\n(21:00 라스트 오더)","en":"10:00-22:00 \n(Last order 21:00)","ja":"10:00-22:00\n(21:00ラストオーダー)"},"x":{"ko":
