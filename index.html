or its high value for the price. It serves fresh assorted sushi at a reasonable price. Many customers also order takeout or delivery here.","ja":"価格に比べ満足度がとても高いといわれる寿司専門店で、合理的な価格で新鮮な寿司を構成よく提供する。テイクアウトやデリバリーの注文が多いお店。"},"c":"일식","g":"수영구","p":"0507-1348-5036","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605105014796_thumbL","lat":35.1689,"lng":129.11972,"v":4192,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1504&lang_cd=ko"},{"n":{"ko":"타이가 텐푸라","en":"Taiga Tempura","ja":"タイガー天ぷら"},"m":{"ko":"타이가텐동, 토리텐동","en":"Taiga tendon, Tori tendon","ja":"タイガー天丼,トリ天丼"},"a":{"ko":"해운대구 우동1로 38번가길 15","en":"15, Udong 1-ro 38beonga-gil, Haeundae-gu","ja":"海雲台区 佑洞1路 38番街キル 15"},"h":{"ko":"월-금 11:00-15:30 / 17:00-20:00\n토-일 11:00-20:00","en":"11:00-15:30 / 17:00-20:00","ja":"11:00-15:30 / 17:00-20:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"부산에 텐동유행을 불러온 가게 중 하나로, 후쿠오카의 유명 텐동전문점인 텐푸라타카오에서 직접 전수 받은 레시피와 소스로 완성도 높은 텐동을 선보인다.주문과 동시에 조리가 시작된다.","en":"This is one of the restaurants that led the popularity of tendon (tempura rice bowl) in Busan. The high-quality tendon uses the recipe taught by Fukuoka’s famous tendon specialty store, Tempura Takao. Cooking begins at the time of ordering.","ja":"釜山に天丼を流行らせた店の一つで、福岡の有名な天丼専門店である天ぷら「たかお」から直に伝授されたレシピとソースで完成度の高い天丼を提供する。注文を受けてから調理に入る。"},"c":"일식","g":"해운대구","p":"051-731-1914","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605114432846_thumbL","lat":35.164764,"lng":129.1584,"v":5042,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1505&lang_cd=ko"},{"n":{"ko":"톤쇼우 부산대점","en":"Tonshou PNU Branch","ja":"トンショウ 釜山大店"},"m":{"ko":"버크셔K 특 로스카츠 ￦16,500\n히레카츠 ￦11,500","en":"Berkshire K Special Roast Katsu ￦16,500\nHirekatsu ￦11,500","ja":"バークシャーK 特ロースカツ ￦16,500\nヒレカツ ￦11,500"},"a":{"ko":"금정구 금강로 247-10","en":"247-10, Geumgang-ro, Geumjeong-gu","ja":"金井区 金剛路 247-10"},"h":{"ko":"11:00-21:00","en":"11:00-21:00","ja":"11:00-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"유명한 돈카츠전문점 톤쇼우의 본점으로, 좋은 재료를 선별해 저온, 고온, 레스팅, 숯불구이의 네 단계의 조리를 거쳐 만들어진 돈카츠는 놀라운 맛을 선사한다.","en":"This is the main branch of the famous tonkatsu specialty store Tonshou. The restaurant selects quality ingredients and makes amazing tonkatsu through four stages: low-temperature frying, high-temperature frying, resting, and charcoal grilling.","ja":"有名な豚カツ専門店トンショウの本店で、良質の材料を選別して低温、高温、レスティング(肉を休ませる)、炭火焼きの4段階の調理を経て作られた豚カツは驚きを隠せない味。"},"c":"일식","g":"금정구","p":"010-5685-5482","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240416105423031_thumbL","lat":35.230446,"lng":129.08427,"v":7704,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1506&lang_cd=ko"},{"n":{"ko":"삼성밀면","en":"Samseong Milmyeon","ja":"サムソンミルミョン"},"m":{"ko":"밀면 ￦7,500\n주물럭 ￦8,500","en":"Milmyeon ￦7,500\nJumulleok milmyeon ￦8,500","ja":"小麦麺 ￦7,500\n揉み小麦麺 ￦8,500"},"a":{"ko":"부산진구 월드컵대로449번길 47","en":"47, World Cup-daero 449beon-gil, Choeup-dong, Busanjin-gu","ja":"釜山鎮区 草邑洞 ワールドカップ大路 449番キル 47 小麦麺 ￦7,500\n揉み小麦麺 ￦8,500"},"h":{"ko":"10:30-18:00","en":"10:30-18:00","ja":"10:30-18:00"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"60여 년째 밀면의 맛을 이어가고 있는 밀면전문점인 이곳은 유일하게 1세대 영업주가 운영하는 식당으로 부연 설명이 필요없는 식당이다.","en":"This milmyeon specialty restaurant has maintained its original taste for 60 years. It is also the only remaining milmyeon restaurant run by the first-generation owner. What more is there to say?","ja":"60年以上ミルミョン(小麦麺)の味を守っている小麦麺専門店であるこのお店は唯一、1代目の店主が営んでいるお店で、さらなる説明は必要ないだろう。"},"c":"면·국물","g":"부산진구","p":"051-806-1256","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417141426032_thumbL","lat":35.181423,"lng":129.05115,"v":5720,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1507&lang_cd=ko"},{"n":{"ko":"부산약콩밀면","en":"Busak Yakkong Milmyeon","ja":"釜山薬豆ミルミョン"},"m":{"ko":"물밀면 ￦8,000\n물비빔밀면 ￦9,000","en":"Mul milmyeon ￦8,000\nMulbibim milmyeon ￦9,000","ja":"小麦冷麺 ￦8,000\nスープ入り混ぜ小麦麺 ￦9,000"},"a":{"ko":"남구 동명로145번길 80 1층","en":"1F, 80, Dongmyeong-ro 145beon-gil, Nam-gu","ja":"南区 東明路 145番キル 80 1階"},"h":{"ko":"11:00-15:30 / 17:00-19:30","en":"11:00-15:30/17:00-19:30","ja":"11:00-15:30/17:00-19:30"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"밀면에 맛과 건강을 더하기 위해, 40년간 쌓인 노하우를 바탕으로 약콩과 함초, 톳으로 만든 천연간수와 기장 다시마로 직접 만든 식초를 사용하여 깊은 맛을 가진 특색 있는 밀면을 개발해 낸 밀면전문점.","en":"To make milmyeon more flavorful and healthy, they applied 40 years of know-how to create a unique recipe using natural brine from yakkong soybeans, hamcho (glasswort), and tot (hijiki) and vinegar made of kelp produced in Gijang.","ja":"ミルミョン(小麦麺)に味と健康をプラスするため、40年間培ってきたノウハウをもとに薬豆やアッケシソウ、ヒジキで作った天然にがりと機張(キジャン)の昆布で作った酢を使用し、深い味わいを持つ特色ある小麦麺を開発した小麦麺専門店。"},"c":"면·국물","g":"남구","p":"051-611-1231","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605160757154_thumbL","lat":35.123108,"lng":129.11333,"v":4325,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1508&lang_cd=ko"},{"n":{"ko":"면채움","en":"Myeonchaeum","ja":"ミョンチェウム"},"m":{"ko":"밀면, 비빔만두","en":"Milmyeon, Bibim mandu","ja":"小麦麺, 混ぜ餃子"},"a":{"ko":"금정구 금정로231번길 11","en":"11, Geumjeong-ro 231beon-gil, Geumjeong-gu","ja":"金井区 金井路 231番キル 11"},"h":{"ko":"월-금 10:30-15:30\n(15:10 라스트오더)\n토-일 10:00-15;30 / 17:30-20:00\n(19:40 라스트오더)","en":"10:30-21:00\n(20:40 Last order)","ja":"10:30-21:00\n(20:40 ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"건강한 밀면의 맛을 위해 오곡을 제분하여 직접 면을 뽑고 48시간 우려낸 육수와 과일, 채소로 맛을 낸 천연 양념장을 사용하는 밀면전문점으로, 추억의 음식인 비빔만두도 인기 있는 곳이다.","en":"To make milmyeon healthier, this restaurant uses five different grains to make its own noodles. The broth is boiled for 48 hours, and the sauce incorporates fruits and vegetables for natural flavor. Bibim mandu, a nostalgic dish for the locals, is also popular here.","ja":"健康的なミルミョン(小麦麺)を作るために五穀を製粉して麺をこしらえ、48時間煮出したスープと果物や野菜で味付けした天然のヤンニョンジャンを使用する小麦麺専門店で、思い出の味が懐かしい混ぜ餃子も人気がある。"},"c":"면·국물","g":"금정구","p":"0507-1468-4448","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605162454973_thumbL","lat":35.24463,"lng":129.0901,"v":4355,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1509&lang_cd=ko"},{"n":{"ko":"대연밀면","en":"Daeyeon Milmyeon","ja":"デヨンミルミョン"},"m":{"ko":"비빔밀면, 들깨칼국수","en":"Bibim milmyeon, Deulkkae kalguksu (hand-cut noodle soup with perilla seeds)","ja":"混ぜ小麦麺, エゴマカルグクス"},"a":{"ko":"남구 천제등로 55(1층)","en":"1F, 55, Cheonjedeung-ro, Nam-gu","ja":"南区 天際燈路 55(1階)"},"h":{"ko":"11:00-17:00\n(16:50 라스트오더)","en":"11:00-17:00\n(16:50 Last order)","ja":"11:00-17:00\n(16:50 ラストオーダー)"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"2011년부터 영업 중인 밀면 전문점으로 이 지역에서 꾸준히 사랑받아 온 식당이다. 기본에 충실한 전통적인 밀면의 맛을 가지고 있으며, 이곳 역시 웨이팅을 감수하고 찾아야 하는 곳이기도 하다.","en":"Established in 2011, this milmyeon restaurant has been popular among the locals ever since.It serves the authentic milmyeon that’s true to the basics. The queue is also quite long, but it’s well worth the wait.","ja":"2011年から営む小麦麺(ミルミョン)専門店でこの地域で愛されてきた。基本に忠実な伝統的な小麦麺の味で、このお店も待ち時間を念頭において訪れなければいけない。"},"c":"면·국물","g":"남구","p":"0507-1355-6120","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605163059829_thumbL","lat":35.13132,"lng":129.08981,"v":5547,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1510&lang_cd=ko"},{"n":{"ko":"합천국밥집","en":"Hapcheon Gukbapjip","ja":"ハプチョンクッパチブ"},"m":{"ko":"돼지국밥 ￦12,000\n수육 ￦40,000 / 45,000","en":"Dwaejigukbap(pork soup with rice) ￦12,000\nSteamed pork ￦40,000 / 45,000","ja":"豚肉クッパ ￦12,000\nゆで肉 ￦40,000/45,000"},"a":{"ko":"남구 용호로 235","en":"235, Yongho-ro, Nam-gu","ja":"南区 龍湖路 235"},"h":{"ko":"09:00-14:00 / 14:30-20:00","en":"09:00-14:00 / 14:30-20:00","ja":"09:00-14:00 / 14:30-20:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"부산의 돼지국밥을 이야기할 때 빠지지 않는 곳 중 한 곳으로 다른 유명 돼지국밥집과는 다르게 맑고 깔끔한 국물이 특징이다. 국산 돼지고기만 사용하는데, 큼직한 고기가 아낌없이 들어가 있다.","en":"This restaurant is indispensable when discussing dwaejigukbap in Busan. It’s differentiated from other gukbap joints by the clear and lean broth. Large chunks of domestic pork are generously served in the soup.","ja":"釜山のテジクッパ(豚肉クッパ)を話す時に外すことができないお店の一つで、 他の有名な豚肉クッパの店とは違い、透き通ったさっぱりしたスープが特徴だ。国産豚肉のみを使用しており、大きな肉がたっぷり入っている。"},"c":"고기·구이","g":"남구","p":"051-628-4898","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605171506269_thumbL","lat":35.111244,"lng":129.11125,"v":6997,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1511&lang_cd=ko"},{"n":{"ko":"정짓간 돼지국밥 & 막국수","en":"Jeongjitgan","ja":"ジョンジッガン"},"m":{"ko":"돼지국밥, 막국수","en":"Dwaejigukbap (pork soup with rice), Makguksu","ja":"豚肉クッパ, 混ぜそば"},"a":{"ko":"사하구 비봉로 6 1층","en":"1F, 6, Bibong-ro, Saha-gu","ja":"沙下区 飛峯路 6 1階"},"h":{"ko":"월 00:00-24:00 \n화 00:00-23:50 \n수 06:00-24:00\n목 00:00-24:00\n금 00:00-24:00\n토 00:00-24:00\n일 00:00-24:00","en":"Open 24 hours","ja":"24時間"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"부엌의 경상도 방언을 상호로 쓰는 이곳은 가마솥에서 48시간 끓여 돼지국밥을 만든다. 수육백반의 고기는 삼겹살과 항정살 중 선택할 수 있고, 국밥 역시 고기와 온도, 맵기 등 취향대로 선택할 수 있는 것이 장점이다.","en":"This place, named after the Gyeongsangdo dialect for “kitchen,” cooks dwaejigukbap by boiling the broth for 48 hours in a cauldron. The steamed pork can be either pork belly or jowl meat, and the toppings, temperature, and level of spice for the soup can also be selected.","ja":"厨房という意味の慶尚道の方言を商号で使うこのお店は、釜で48時間煮込み豚クッパを作っている。ゆで肉定食の肉はサムギョプサルと豚トロの中から選択でき、クッパも肉と温度、辛さなど好みに合わせて選べるのがいい。"},"c":"고기·구이","g":"사하구","p":"0507-1411-2900","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417171440711_thumbL","lat":35.095695,"lng":128.96248,"v":6090,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1512&lang_cd=ko"},{"n":{"ko":"우리돼지국밥","en":"Uri Dwaejigukbap","ja":"ウリテジクッパ"},"m":{"ko":"돼지국밥, 모듬수육","en":"Dwaejigukbap (pork soup with rice), Assorted steamed pork","ja":"豚肉クッパ, ゆで肉の盛り合わせ"},"a":{"ko":"동구 초량로 27-1","en":"27-1, Choyang-ro, Dong-gu","ja":"東区 草梁路 27-1"},"h":{"ko":"24시간","en":"Open 24 hours","ja":"24時間"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"1975년부터 3대째 운영하고 있는 이곳은, 24시간 국물을 계속 끓이며 전통적인 토렴방식을 유지하고 있는 곳이다. 돼지 한 마리를 통째로 사용하기 때문에 원하는 부위를 주문하면 즉시 조리해 준다고 한다.","en":"Since 1975, it has been operating for three generations. It boils the broth for 24 hours and serves the soup with the traditional toryeom method. It uses the whole pig and immediately serves customers their favorite parts upon request.","ja":"1975年から3代が営むこのお店は、24時間スープを煮続けながら伝統的なトゥェヨム(退染)方式を維持している。豚一匹を丸ごと使うので、好きな部位を注文すれば直ちに調理してくれるという。"},"c":"고기·구이","g":"동구","p":"051-468-5623","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230605175347129_thumbL","lat":35.11995,"lng":129.03925,"v":5508,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1513&lang_cd=ko"},{"n":{"ko":"수복돼지국밥","en":"Subok Dwaejigukbap","ja":"スボクテジクッパ"},"m":{"ko":"수육백반, 돼지국밥","en":"Suyuk Baekban (Steamed pork with set meal), Dwaejigukbap (pork soup with rice)","ja":"ゆで肉定食, 豚肉クッパ"},"a":{"ko":"연제구 고분로 41-1 2층","en":"2F, 41-1, Gobun-ro, Yeonje-gu","ja":"蓮堤区 古墳路 41-1 2階"},"h":{"ko":"08:00-21:50\n(21:20 라스트오더)","en":"08:00-21:50\n(21:20 Last order)","ja":"08:00-21:50\n(21:20 ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"국내산 돼지고기와 내장, 직접 만든 순대를 사용하고, 김치와 깍두기 역시 직접 담는다. 이른 시간부터 누구에게 대접해도 손색없이 음식준비에 정성을 들이고 있으며, 넓은 주차장과 청결한 매장을 갖추고 있다.","en":"The restaurant serves domestic pork meat and innards, and sundae, kimchi, and kkakdugi made from scratch. From the early hours, they pay special care to the preparation of food and provide clean dining rooms and plenty of parking spaces.","ja":"韓国産の豚肉や内臓、自家製スンデを使用し、キムチやカクトゥギも手作りするお店。早い時間から誰にもてなしても恥ずかしくないよう料理の仕込みに力を入れており、広い駐車場と清潔な売り場を備えている。"},"c":"고기·구이","g":"연제구","p":"051-866-3349","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607101844356_thumbL","lat":35.1859,"lng":129.0869,"v":4660,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1515&lang_cd=ko"},{"n":{"ko":"부광돼지국밥","en":"Bugwang Dwaejigukbap","ja":"ブグァンテジクッパ"},"m":{"ko":"돼지국밥 ￦10,000\n수육 ￦30,000 / 35,000","en":"Dwaejigukbap(pork soup with rice) ￦10,000\nSteamed pork ￦30,000 / 35,000","ja":"豚肉クッパ ￦10,000\n豚のゆで肉 ￦30,000 / 35,000"},"a":{"ko":"중구 대청로 141번길 15-1","en":"15-1, Daecheong-ro 141beon-gil, Jung-gu","ja":"中区 大廳路 141番キル 15-1"},"h":{"ko":"09:30-19:30","en":"09:30-19:30","ja":"09:30-19:30"},"x":{"ko":"일요일, 명절 휴무","en":"Closed on Sundays and public holidays","ja":"日曜、名節休み"},"d":{"ko":"3대에 걸쳐 40여 년을 영업 중인 이곳은 전통적인 방식으로 돼지국밥을 만들고 있는 곳이다.\n김치와 깍두기는 직접 담그며, 오래도록 인기 있는 가게답게 신선하고 좋은 재료를 고집한다고 한다.","en":"This authentic dwaejigukbap restaurant has been in business for more than 40 years for three generations. Kimchi and kkakdugi are made from scratch, and their insistence on fresh quality ingredients shows why they have been popular for so long.","ja":"3代にわたって40年以上営むこのお店は、伝統的な方法で豚肉クッパを作っている。 キムチとカクトゥギは自家製で、長い間愛され続けるお店らしく新鮮で良質な材料にこだわっている。"},"c":"고기·구이","g":"중구","p":"051-466-1708","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419095508857_thumbL","lat":35.104244,"lng":129.03506,"v":5057,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1516&lang_cd=ko"},{"n":{"ko":"행복을 짓는 수향촌밥상","en":"Suhyang Bapsang","ja":"スヒャンパプサン"},"m":{"ko":"추어탕, 갈비탕","en":"Chueotang (Loach soup), Short rib soup","ja":"どじょうスープ, カルビタン"},"a":{"ko":"사하구 다대로 592","en":"592, Dadae-ro, Saha-gu","ja":"沙下区 多大路 592"},"h":{"ko":"09:00-16:00/16:30-22:00","en":"09:00-16:00/16:30-22:00","ja":"09:00-16:00/16:30-22:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"가족단위 손님이 많이 찾는다는 추어요리전문점으로 진한 국물의 추어탕이 대표메뉴.\n직영 양어장을 운영하는 등 건강하고 좋은 재료를 사용하기 위해 많은 노력을 기울이고 있는 곳이다.","en":"This loach specialty restaurant is beloved by families. \nThe rich loach soup is the most popular dish. They make a lot of effort to use healthy and quality ingredients, such as directly operating a fish farm.","ja":"家族連れのお客さんが多く訪れるというどじょう料理専門店で、濃厚なスープのチュオタン(どじょうスープ)が代表メニュー。直営の養魚場を運営するなど質の良い材料を使用するため努めるお店。"},"c":"고기·구이","g":"사하구","p":"051-266-4726","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607104813073_thumbL","lat":35.053585,"lng":128.97047,"v":4620,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1517&lang_cd=ko"},{"n":{"ko":"해물왕창칼국수","en":"Haemul Wangchang Kalguksu","ja":"ヘムルワンチャンカルグクス"},"m":{"ko":"해물왕창칼국수(2인부터 주문) ￦12,000\n육전물밀면 ￦8,000","en":"Haemul Wangchang Kalguksu\n(hand-cut noodles with seafood for two) ￦12,000\nMul milmyeon with yukjeon ￦8,000","ja":"海鮮たっぷりカルグクス(2人から注文可））￦12,000\n牛肉のチヂミ入り小麦冷麺 ￦8,000"},"a":{"ko":"사상구 사상로 316","en":"316, Sasang-ro, Sasang-gu","ja":"沙上区 沙上路 316"},"h":{"ko":"11:00-21:00","en":"11:00-21:00","ja":"11:00-21:00"},"x":{"ko":"월요일, 명절 휴무","en":"Closed on Mondays and public holidays","ja":"月曜、名節休み"},"d":{"ko":"칼국수의 맛을 내는 조개류는 전라도 고흥에서 매일 공수해오고 있으며, 해물탕에 넣어먹는 자가제면 칼국수는 매일 직접 반죽하여 숙성 시킨다. 신선한 재료와 정성이 듬뿍 들어간 칼국수는 오늘도 인기 있다.","en":"Clams for the broth are supplied every day from Goheung, Jeolla Province. The dough for the kalguksu (knife-cut noodles) that goes into the seafood soup is made freshly and rested each morning. The noodle soup, made with fresh ingredients and tender loving care, is never going to be unpopular.","ja":"カルグクスの味を出す貝類は全羅道の高興(コフン)から毎日空輸しており、 海鮮鍋に入れて食べる自家製麺のカルグクスは毎日練って熟成させる。新鮮な材料と心のこもったカルグクスは今日も人気だ。"},"c":"해산물·회","g":"사상구","p":"0507-1357-2579","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417163101609_thumbL","lat":35.1727,"lng":128.98376,"v":6083,"l":11,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1518&lang_cd=ko"},{"n":{"ko":"할매재첩국부산본점","en":"Halmae Jaecheopguk","ja":"ハルメチェチョプグク"},"m":{"ko":"재첩정식, 재첩덮밥","en":"Jaecheop set meal, Jaecheop with rice","ja":"シジミ定食, シジミ丼"},"a":{"ko":"수영구 광남로120번길 8","en":"8, Gwangnam-ro 120beon-gil, Suyeong-gu","ja":"水営区 広南路120番キル8"},"h":{"ko":"06:00-21:00","en":"06:00-21:00","ja":"06:00-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"1950년 구포에서 재첩국 판매를 시작하여 지금의 자리로 온 것은 20여년이 되었다고 하는 재첩국전문점으로, 이른 시간부터 운영하고 있어 아침을 먹으러 오는 손님들도 많다.\n서울에 직영점을 운영하고 있기도 하다.","en":"The owner started selling jaecheopguk (freshwater clam soup) in Gupo in 1950 and moved to today’s location 20 years ago. Since it opens early, many customers come here to eat breakfast. It also has a directly managed branch in Seoul.","ja":"1950年に亀浦でシジミスープの販売を始め、現在の場所に来て約20年になるというシジミスープ専門店で、朝早くから営業しており朝食を求めて来店する人が多い。ソウルに直営店をもつお店。"},"c":"한식·백반","g":"수영구","p":"0507-1400-7658","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418131536518_thumbL","lat":35.151875,"lng":129.11638,"v":6839,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1519&lang_cd=ko"},{"n":{"ko":"동래할매파전","en":"Dongnae Halmae Pajeon","ja":"東莱ハルメパジョン"},"m":{"ko":"동래할매파전 ￦28,000 / 40,000\n동래고동찜 ￦30,000","en":"Dongnae halmae pajeon ￦28,000 / 40,000\nDongnae steam conch ￦30,000","ja":"東莱ハルメパジョン(ねぎのチヂミ) ￦28,000 / 40,000\n東莱巻貝の蒸し物 ￦30,000"},"a":{"ko":"동래구 명륜로 94번길 43-10","en":"43-10, Myeongryun-ro 94beon-gil, Dongnae-gu","ja":"東莱区 明倫路 94番キル 43-10"},"h":{"ko":"11:30-15:00 / 17:00-21:30","en":"11:30-15:00 / 17:00-21:30","ja":"11:30-15:00 / 17:00-21:30"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日休み"},"d":{"ko":"4대를 이어오고 있는 유명한 식당으로 부산의 대표적 향토음식인 동래파전의 전통을 이어가고 있는 곳. 사진으로는 담을 수 없는 식재료의 푸짐함을 느낄수 있다.","en":"Dongnae Halmae Pajeon is a famous restaurant that has been in business for four generations. It continues the tradition of Dongnae pajeon, Busan’s signature local food. The green onion pancakes, with more presence in the material than in the photos, will keep exceeding your expectations with each bite.","ja":"4代続く有名なお店で、釜山の代表的な郷土料理である東莱式パジョン(ねぎのチヂミ)の伝統を守っている。写真には写しきれない食材のボリュームがうれしい。"},"c":"한식·백반","g":"동래구","p":"051-552-0792","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417095049087_thumbL","lat":35.204575,"lng":129.08385,"v":8259,"l":8,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1520&lang_cd=ko"},{"n":{"ko":"박해윤통영해물밥상","en":"Park Hae-yun Tongyeong Bapsang","ja":"パク・ヘユントンヨンヘムルバプサン"},"m":{"ko":"해물밥상, 보리굴비밥상","en":"Seafood set, Bori gulbi set","ja":"海鮮御前, / 熟成干しイシモチ御前"},"a":{"ko":"동래구 연안로 38","en":"38, Yeonan-ro, Dongnae-gu","ja":"東莱区 蓮安路 38"},"h":{"ko":"월-금 11:00-22:00\n토-일 11:00-15:00 / 16:00-22:00\n(21:00 라스트오더)","en":"11:00-15:00 / 16:00-22:00\n(21:00 Last order)","ja":"11:00-15:00 / 16:00-22:00\n(21:00 ラストオーダー)"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"통영에서 수급한 신선한 해산물을 사용하는 한정식전문점으로, 정갈한 음식과 넓은 주차장, 잘 꾸며진 쾌적한 실내를 갖추고 있어 돌잔치, 상견례 등의 행사로도 많이 찾는 곳이다","en":"This hanjeongsik restaurant uses fresh seafood supplied from Tongyeong. It is also beloved as the venue for special occasions such as first birthdays and family meetings for marriage, with quality food, a spacious parking lot, and a pleasant interior.","ja":"統営(トンヨン)から仕入れた新鮮な海産物を使用する韓定食専門店で、美しい料理や広い駐車場、快適な室内インテリアを備えており、 1歳の誕生日祝いや両家の顔合わせなどのイベントに多く利用される。"},"c":"해산물·회","g":"동래구","p":"051-525-0120","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607115106313_thumbL","lat":35.191082,"lng":129.10825,"v":6705,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1521&lang_cd=ko"},{"n":{"ko":"원조꼬리곰집","en":"Wonjo Kkorigomjip","ja":"元祖コリゴムチブ"},"m":{"ko":"한우 꼬리수육, 꼬리탕","en":"Steamed Hanwoo tail Slices, Oxtail soup","ja":"韓牛テールゆで肉, 牛テールのスープ"},"a":{"ko":"동래구 온천장로 52","en":"52, Oncheonjang-ro, Dongnae-gu","ja":"東莱区 温泉場路 52"},"h":{"ko":"08:30-21:30\n(20:50 라스트오더)","en":"08:30-21:30\n(20:50 Last order)","ja":"08:30-21:30\n(20:50 ラストオーダー)"},"x":{"ko":"월요일, 명절 휴무","en":"Closed on Mondays and public holidays","ja":"月曜、名節休み"},"d":{"ko":"1980년에 개업하여 오랜 시간 사랑받고 있는 곳으로, 껍데기를 보존하여 요리하는 특별한 방식으로 더 부드러운 육질을 자랑한다. 기본에 충실하게 많은 양의 고기를 오랜 시간 삶는 것이 비법이라고 한다.","en":"Opened in 1980, it is a longtime local favorite. The skin is preserved using a special method for a softer texture. The secret is to boil a large amount of meat for a long time, which is staying true to the basics.","ja":"1980年に開業し長い間愛されてきたお店で、皮を残して調理する特別な方法でより柔らかい肉質を誇る。基本に忠実にたくさんの肉を長時間煮るのが秘法だという。"},"c":"고기·구이","g":"동래구","p":"0507-1379-1134","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417104737417_thumbL","lat":35.216038,"lng":129.08095,"v":5672,"l":13,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1522&lang_cd=ko"},{"n":{"ko":"삼락하동재첩국","en":"Samnak Hadong Jaecheopguk","ja":"三楽河東シジミスープ"},"m":{"ko":"재첩국 정식 ￦8,000\n재접회 ￦10,000","en":"Jaecheopguk set meal ￦8,000\nJaecheop hoe ￦10,000","ja":"シジミスープ定食, シジミの刺身"},"a":{"ko":"사상구 낙동대로1518번길 33","en":"33, Nakdong-daero 1518beon-gil, Sasang-gu","ja":"沙上区 洛東通り1518番ギル33"},"h":{"ko":"05:00-21:30","en":"05:00-21:30","ja":"05:00-21:30"},"x":{"ko":"연중무휴","en":"Closed on public holidays","ja":"年中無休"},"d":{"ko":"재첩국 전문 식당이 모여 있는 이 지역에서도 인기 있는 재첩국 전문점으로, 섬진강의 국산 재첩만을 사용하여, 소금물에 담가 해감을 하고, 수 차례 깨끗이 씻은 다음 끓인 국물은 간과 위의 건강에 도움이 된다고 한다. 이곳은 재첩을 회와 찜으로 새롭게 연구하여 재첩 요리를 정착시킨 곳이기도 하다.\n\n※ 2026년 설 연휴 설날 당일(2/17) 휴무","en":"This is an especially popular freshwater clam soup restaurant in the area populated by similar restaurants. They only use domestic freshwater clams from Seomjingang River and boil them after washing several times after soaking it in saltwater. Freshwater clam soup is said to help liver and stomach health. The restaurant also researched how to serve freshwater clam as raw fish and steamed, and helped establish.\n\n※ Closed on Lunar New Year’s Day (Feb 17), 2026","ja":"シジミスープ「チェチョプクク」専門食堂が集まっている、この地域でも人気のある専門店。蟾津江(ソンジンガン)で捕れたしじみのみを使用している。塩水に浸して砂抜きし、その後もていねいに洗う。しじみの汁は肝臓や胃に良いという。しじみの刺身や蒸し物にするなどのメニューを研究し、定着させている。\n\n※ 2026年旧正月（ソルラル）当日（2月17日）は休館"},"c":"해산물·회","g":"사상구","p":"051-301-7200","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417160652816_thumbL","lat":35.19344,"lng":128.98584,"v":5986,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1523&lang_cd=ko"},{"n":{"ko":"하기연진주냉면","en":"Ha Gi-yeon Jinju Naengmyeon","ja":"ハギヨンチンジュネンミョン"},"m":{"ko":"물비빔냉면 ￦12,000\n소육전 ￦24,000","en":"Mulbibim naengmyeon ￦12,000\nBeef yukjeon ￦24,000","ja":"混ぜ冷麺(スープ有り) ￦12,000\n牛肉のチヂミ ￦24,000"},"a":{"ko":"사하구 괴정로 34","en":"34, Goejeong-ro, Saha-gu","ja":"沙下区 槐亭路 34"},"h":{"ko":"10:30-19:30","en":"10:30-19:30\n(19:00 Last order)","ja":"10:30-19:30"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"멸치, 바지락, 다시마가 들어간 해물육수를 사용하고 고명으로 육전이 올라가는 진주냉면은 보기 힘든 음식 중 하나로 그만큼 전수받은 사람이 드물다고 한다. 이곳은 제주도산 흑메밀만 사용하여 면을 만드는 것이 특징.","en":"Jinju naengmyeon is made of seafood broth with anchovies, clams, and kelp and garnished with yukjeon (meat pancakes). It’s a rare delicacy, and only a few masters have been professionally trained to make it. This restaurant is characterized by using only black buckwheat from Jeju Island to make noodles.","ja":"カタクチイワシ、アサリ、昆布が入った海鮮スープを使用し、ゴミョン(盛り付け)として肉チヂミがのっている晋州冷麺(チンジュネンミョン)は、 珍しい食べ物の一つとされており、それだけ作り方を伝授された人はあまりいないという。このお店では済州島産の黒そばだけを使って麺を作る。"},"c":"면·국물","g":"사하구","p":"051-207-6555","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417172509146_thumbL","lat":35.102787,"lng":128.9677,"v":6072,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1524&lang_cd=ko"},{"n":{"ko":"장안집","en":"Janganjip","ja":"チャンアンチブ"},"m":{"ko":"오리불고기, 오리백숙","en":"Duck bulgogi, Duck baeksuk","ja":"鴨肉のプルゴギ, 鴨肉の水炊き"},"a":{"ko":"기장군 장안읍 장안로 365","en":"365, Jangan-ro, Jangan-eup, Gijang-gun","ja":"機張郡 長安邑 長安路 365"},"h":{"ko":"11:00-20:30","en":"11:00-20:30","ja":"11:00-20:30"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"바로 옆에는 계곡이 있고 인근에는 유명사찰인 장안사가 있는 한옥형태의 넓은 식당. 넓은 주차장과 개별 룸들이 있어 가족, 단체로 식사하러 가기 좋은 곳이다. 오리백숙으로 유명한 곳이기도 하다.","en":"Next to this Hanok-style restaurant is a mountain stream, and nearby is a famous temple called Jangansa. The large parking lot and private rooms are great for families and groups. It is also famous for duck soup.","ja":"すぐ隣には渓谷があり、近くには有名な寺院であるチャンアンサ(長安寺)がある韓屋造りの広いお店。広い駐車場や個室ルームがあり、家族や団体での集まりにも重宝する。鴨肉の水炊きが人気。"},"c":"고기·구이","g":"기장군","p":"051-727-1819","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607150107037_thumbL","lat":35.369785,"lng":129.24432,"v":5985,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1525&lang_cd=ko"},{"n":{"ko":"이가네칼국수","en":"Lee Family’s Kalguksu","ja":"イガネカルグクス"},"m":{"ko":"손칼국수, 왕만두","en":"Sonkalguksu, Large dumplings","ja":"手打ちカルグクス, 特大餃子"},"a":{"ko":"사상구 광장로 27","en":"27, Gwangjang-ro, Sasang-gu","ja":"沙上区 広場路 27"},"h":{"ko":"11:00-21:00","en":"11:00-21:00","ja":"11:00-21:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"사상시외버스터미널 인근은 맛있는 식당들이 모여 있기로 유명한데, 이곳 역시 그 유명한 식당 중 한 곳이다. 해물이 가득한 칼국수와 100% 수제로 만드는 만두, 그리고 밀면까지 무엇을 주문하더라도 만족스러운 식사가 될 것이다.","en":"Sasang Intercity Bus Terminal is famous for the good restaurants in its area, including this one. Whether it’s seafood kalguksu, dumplings made 100% from scratch, or milmyeon, any choice will guarantee your satisfaction.","ja":"沙上市外バスターミナルの近くは美味しいお店が集まっていることで有名だが、このお店もその一つ。海鮮たっぷりのカルグクスと100%手作りの餃子、そして小麦麺まで何を注文しても満足のいくお店。"},"c":"면·국물","g":"사상구","p":"051-322-8131","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607152613580_thumbL","lat":35.163177,"lng":128.97974,"v":5155,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1526&lang_cd=ko"},{"n":{"ko":"이가네떡볶이","en":"Lee Family’s Tteokbokki","ja":"イガネトッポッキ"},"m":{"ko":"떡볶이 1인분, 떡튀 1인분","en":"1 serving of tteokbokki, 1 serving of tteokboki and twigim","ja":"トッポッキ 1人前, トッポッキ・天ぷら 1人前"},"a":{"ko":"중구 부평1길 48","en":"48, Bupyeong 1-gil, Jung-gu","ja":"中区 富平 1キル 48"},"h":{"ko":"10:00-17:00","en":"10:00-17:00","ja":"10:00-17:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"유명 TV쇼에 출연하여 더욱 명성이 높아진 곳으로 전국적으로 많이 알려져 있어 부산 원도심관광의 필수코스 중 하나로 꼽히는 가게이기도 하다. 언제나 사람들로 북적이는 인기 가게이다.","en":"Lee Family’s Ttokbokki is well-known throughout Korea by appearing on famous TV shows. It’s a must-visit stop for touring the original Busan city center, always filled with bustling customers.","ja":"人気のテレビショーに出演後さらに名声を高めたお店で、全国的に広く知られており、釜山の原都心(ウォンドシム)での必須観光コースの一つに挙げられる。いつも人で賑わう人気店だ。"},"c":"분식·주점","g":"중구","p":"051-245-0413","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607153356051_thumbL","lat":35.10156,"lng":129.02602,"v":5842,"l":15,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1527&lang_cd=ko"},{"n":{"ko":"우성삼계탕","en":"Useong Samgyetang","ja":"ウソンサムゲタン"},"m":{"ko":"삼계탕, 똥집 추가","en":"Samgyetang, Extra gizzards","ja":"水営区 広西路 10番キル 68"},"a":{"ko":"수영구 광서로10번길 68","en":"68, Gwangseo-ro 10beon-gil, Suyeong-gu","ja":"水営区 広西路 10番キル 68"},"h":{"ko":"11:00-20:00","en":"11:00-20:00","ja":"11:00-20:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"40여 년을 삼계탕만 만들어 온 전통 있는 삼계탕전문점으로, 마늘 향이 진하게 느껴지는 국물이 특징이다. 오랜 시간 단일메뉴로 운영된 곳답게 항상 많은 손님들로 북적이고 있으며, 기본으로 제공되는 똥집튀김이 아주 인기 있다.","en":"Useong Samgyetang is a samgyetang specialty store that has only made samgyetang for more than 40 years. It is known for its thick, garlic-flavored broth. This longtime specialty restaurant is always bustling with local regulars, and the customers love the fried gizzards offered for free.","ja":"40年以上サムゲタンだけを作ってきた伝統あるサムゲタン専門店で、ニンニクの香りが濃く感じられるスープが特徴。長い間単一メニューで営んできたお店らしく常に多くの人で賑わっており、料理と一緒に出てくる砂肝の唐揚げが人気。"},"c":"면·국물","g":"수영구","p":"051-751-2984","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607154228087_thumbL","lat":35.16719,"lng":129.11409,"v":4287,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1528&lang_cd=ko"},{"n":{"ko":"몽뜰","en":"Mongtteul","ja":"モントゥル"},"m":{"ko":"육회 비빔밥, 차돌 된장찌개","en":"Yukhoe bibimbap, Chadol doenjangjjigae","ja":"ユッケビビンバ, 牛のともばら肉入りテンジャンチゲ"},"a":{"ko":"동래구 중앙대로 1381번길 33","en":"33, Joongang-daero 1381beon-gil, Dongnae-gu","ja":"東莱区 中央大路 1381番キル 33"},"h":{"ko":"11:30-22:20\n(21:30 라스트오더)","en":"11:30-22:20\n(21:30 Last order)","ja":"11:30-22:20\n(21:30 ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"한우구이 전문식당으로 육회비빔밥과 차돌 된장찌개를 찾는 고객이 많은 곳이다.\n육회비빔밥 양념장은 고추장이 아니라 직접 만든 비법양념장으로 더 깔끔한 맛이 특징이며 차돌 된장찌개가 맛있기로도 유명하다.","en":"It is a restaurant specializing in Hanwoo barbecue, but just as many customers also come here for yukhoe bibimbap and chadol doenjang jjigae.\nThe yukhoe bibimbap sauce is not just gochujang but is made with an original secret recipe, and chadol doenjang jjigae is also famous for its taste.","ja":"ユッケビビンバや牛ともばら肉入りテンジャンチゲを求めて来店するお客様が多い韓牛焼き専門店。ユッケビビンバのタレはコチュジャンではなく、自家製秘伝のヤンニョンジャンであっさりと後味がよく、牛のともばら肉入りテンジャンチゲが美味しいと有名だ。"},"c":"해산물·회","g":"동래구","p":"0507-1482-6022","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607170054185_thumbL","lat":35.210857,"lng":129.07614,"v":5945,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1529&lang_cd=ko"},{"n":{"ko":"조광심민속왕순대","en":"Cho Gwangsim Minsok Wangsundae","ja":"ジョ・グァンシムミンソクワンスンデ"},"m":{"ko":"막창 피순대 ￦25,000 / 35,000\n술국 ￦12,000","en":"Makchang pisundae ￦25,000 / 35,000\nSulguk ￦12,000","ja":"ギアラ 血スンデ ￦25,000 / 35,000\n酔い覚ましスープ ￦12,000"},"a":{"ko":"동래구 반송로 223","en":"223, Bansong-ro, Dongnae-gu","ja":"東莱区 盤松路223"},"h":{"ko":"04:00-21:00","en":"04:00-21:00","ja":"04:00-21:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"선지와 막창으로 만든 피순대는 냉동을 할 수 없어 즉석에서 수작업으로 만들고, 모든 메뉴는 국산 재료를 사용한다.\n월요일 휴무에는 자비로 무료 급식을 운영하는 이곳은 유난히 단골들이 많은 따뜻한 식당이다.","en":"Pisundae, made of pork blood curds and entrails, are made and served freshly because they cannot be frozen. All menu items use domestic ingredients. The restaurant doesn’t open for business on Mondays but opens a free kitchen for the underprivileged. The kindness of the owners always attracts local regulars.","ja":"ソンジとギアラで作った血スンデは冷凍ができないためその場で手作業で作り、すべてのメニュー\nは国産材料を使用する。月曜の休みには自費で無料給食を行なっており、 \n常連客が多い温かいお店だ。"},"c":"고기·구이","g":"동래구","p":"051-527-3927","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417105843962_thumbL","lat":35.20074,"lng":129.09787,"v":5053,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1530&lang_cd=ko"},{"n":{"ko":"할매집회국수","en":"Halamejip Hoeguksu","ja":"ハルメチブフェグクス"},"m":{"ko":"회비빔국수, 회비빔밥","en":"Hoe bibimguksu, Hoe bibimbap","ja":"刺身入り混ぜ素麺, 刺身入りビビンバ"},"a":{"ko":"중구 남포길 25-3","en":"25-3, Nampo-gil, Jung-gu","ja":"中区 南浦キル 25-3"},"h":{"ko":"10:30-19:00","en":"10:30-19:00","ja":"10:30-19:00"},"x":{"ko":"2, 4주 화요일 휴무","en":"Closed on second and fourth Tuesdays","ja":"第2/4火曜休み"},"d":{"ko":"70여 년을 운영하고 있는 유명한 식당으로, 부산의 원도심을 대표하는 식당 중 한 곳이다.\n특유의 매운맛과 가오리회가 고명인 회국수가 대표메뉴로 이곳의 맛을 잊지 못해 타지역에서도 꾸준히 찾아오는 사람들이 많다고 한다.","en":"It is a famous restaurant that has been operating for more than 70 years and is one of the leading restaurants in Busan’s original city center. Hoeguksu is the signature item with its unique spicy taste and stingray topping. Many customers return steadily because they can’t forget the taste of the food here.","ja":"70年以上営む有名なお店で、釜山の原都心(ウォンドシム)を代表する食堂の一つ。特有の辛さと盛り付けとしてエイの刺身がのせられたフェグクス(刺身入り素麺)が代表メニューで、 この店の味を忘れることができず、他の地域からも訪れる人が多いという。"},"c":"해산물·회","g":"중구","p":"051-246-4741","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419113933249_thumbL","lat":35.09885,"lng":129.03146,"v":6087,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1531&lang_cd=ko"},{"n":{"ko":"나탄약선요리","en":"Natan Yakseonyori","ja":"ナタン薬膳料理"},"m":{"ko":"아름다울“나”, 너그러울“탄”","en":"Beautiful “Na”, Generous “Tan”","ja":"美しい”ナ”, 穏やかな”タン”"},"a":{"ko":"부산진구 성지곡로 51번길 4","en":"4, Seongjigok-ro 51beon-gil, Busan-jin-gu","ja":"釜山鎮区 聖知谷路 51番キル 4"},"h":{"ko":"평일 11:30–15:00 / 17:00-22:00\n(21:00 라스트오더)\n주말 11:30~22:00\n(21:00 라스트오더)","en":"11:30–15:00 / 17:00-22:00\n(21:00 Last order)","ja":"11:30–15:00 / 17:00-22:00\n(21:00 ラストオーダー)"},"x":{"ko":"비정기휴무","en":"Open every day","ja":"年中無休"},"d":{"k s to the meticulous service, yukjeon is cooked a little bit at a time for the perfect warmth at the time of eating. No wonder this place is beloved by many.","ja":"そのまま食べてもおいしいユクジョン(肉のチヂミ)とユッケは様々な方法で食べることができるので飽きない。肉のチヂミが冷めないように少しずつ焼いて提供する心遣いは、このお店が多くの人々に愛される理由だろう。"},"c":"해산물·회","g":"사상구","p":"0507-1372-5203","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230608150916484_thumbL","lat":35.165836,"lng":128.9835,"v":5351,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1538&lang_cd=ko"},{"n":{"ko":"토북베이커리","en":"TOBUK BAKERY","ja":"トブクベーカリー"},"m":{"ko":"시그니처 토끼거북이 커피(브루잉 아메리카노), 소금빵 2개","en":"Signature Rabbit Turtle Coffee (Brewed Americano) , Salt Bread","ja":"シグネチャートッキコブギコーヒー\n(ブリューイングアメリカーノ),\n塩パン2個"},"a":{"ko":"강서구 낙동남로 526-1 토북베이커리카페","en":"Tobuk Bakery Cafe 526-1 Nakdongnam-ro, Gangseo-gu","ja":"江西区 洛東南路 526-1トブクベーカリーカフェ"},"h":{"ko":"10:00-22:00 연중무휴\n(21:40 라스트오더)","en":"10:00-22:00 Open every day\n(21:40 Last order)","ja":"10:00-22:00 年中無休\n(21:40 ラストオーダー)"},"x":{"ko":"설날 당일 휴무","en":"","ja":"旧正月当日休み"},"d":{"ko":"넓은 한옥 인테리어의 카페로 대한민국 제과제빵명장 ‘김덕규 베이커리’를 함께 즐길 수 있다. \n한옥과 어우러진 마당을 바라보며 사계절을 아름답게 바라볼 수 있는 매력적인 장소다.","en":"The cafe has a spacious hanok interior and serves Korean pastry master Kim Deokgyu’s baked goods. \nIt’s a charming spot where you can look out over the courtyard that blends in with the hanok and enjoy the beauty of the four seasons.","ja":"広い韓屋風インテリアのカフェで、大韓民国製菓製パン名匠「キム·ドッギュベーカリー」を楽しむことができる。 韓屋と調和した庭を眺めながら美しい四季を感じられる魅力的なお店。"},"c":"카페·베이커리","g":"강서구","p":"0507-1371-0250","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240415173022243_thumbL","lat":35.11187,"lng":128.87785,"v":4886,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1802&lang_cd=ko"},{"n":{"ko":"카페호밀","en":"Cafe Homil","ja":"カフェホミル"},"m":{"ko":"소금빵, 잠봉뵈르샌드위치","en":"Salt bread, Jambon beurre sandwich","ja":"塩パン, ジャンボンブールサンドイッチ"},"a":{"ko":"금정구 금샘로 34","en":"34 Geumsam-ro, Geumjeong-gu","ja":"金井 pular here, where all the side dishes are made from scratch, and the main dishes are cooked immediately after the orders are placed.","ja":"韓国料理を基本にした家庭食スタイルの定食店で、きれいな御膳を提供する。 しっかりと焼かれた焼き魚が人気のこのお店では、すべてのおかずが手作りでメインメニューは注文後すぐに調理される。"},"c":"해산물·회","g":"남구","p":"051-711-0211","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408092958955_thumbL","lat":35.13379,"lng":129.11293,"v":5097,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2324&lang_cd=ko"},{"n":{"ko":"밀양갈비","en":"Miryang Galbi","ja":"密陽カルビ"},"m":{"ko":"돼지갈비 ￦11,000\n생갈비 ￦11,000","en":"Pork ribs ￦11,000\nUnseasoned rib ￦11,000","ja":"豚カルビ ￦11,000\n生カルビ ￦11,000"},"a":{"ko":"동구 초량로 17-5","en":"17-5, Choryang-ro, Dong-gu","ja":"東区草梁路17-5"},"h":{"ko":"11:30-21:30","en":"11:30-21:30","ja":"11:30-21:30"},"x":{"ko":"둘째주 화요일 휴무","en":"Closed on second Tuesdays","ja":"第2火曜日休み"},"d":{"ko":"초량돼지갈비골목에서도 손꼽히는 식당으로 국내산 암퇘지만 사용한다. 양념갈비와 생갈비가 모두 준비되어 있으며 제공되는 모든 음식은 가게에서 직접 만든다.","en":"It is one of the best restaurants in Choryang Pork Ribs Alley and only uses domestic sows. Both seasoned and unseasoned ribs are available, and all the food served is made from scratch.","ja":"草梁豚カルビ通りの中でも指折りのお店で、韓国産の雌豚だけを使用する。味付けカルビと生カルビどちらも注文でき、提供されるすべての料理はお店の手作りだ。"},"c":"고기·구이","g":"동구","p":"051-466-4546","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408093648041_thumbL","lat":35.11918,"lng":129.03975,"v":3302,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2325&lang_cd=ko"},{"n":{"ko":"가야포차선지국밥 본점","en":"Gayapocha Seonjigukbap Main Branch","ja":"カヤポチャソンジクッパ本店"},"m":{"ko":"수구레국밥 ￦9,000\n선지국밥 ￦8,000","en":"Sugure(beef skin lining) gukbap ￦9,000\nSeonji(beef blood curd) gukbap ￦8,000","ja":"スグレクッパ ￦9,000\nソンジクッパ ￦8,000"},"a":{"ko":"부산진구 가야공원로 58","en":"58, Gayagongwon-ro, Busanjin-gu","ja":"釜山鎮区伽倻公園路58"},"h":{"ko":"00:00-24:00","en":"00:00-24:00","ja":"00:00-24:00"},"x":{"ko":"명절2일 휴무","en":"Closed for two days during holidays","ja":"名節(2日間)休み"},"d":{"ko":"24시간 영업으로 30여 년을 운영해오고 있는 이곳에서는 수구레국밥 등 쉽게 찾기 힘든 수구레요리를 만날 수 있다. 16시 이후로는 술과 곁들일 수 있는 요리를 주문할 수 있는 편안한 가게이다.","en":"This restaurant, which has remained open 24 hours for over 30 years, serves sugure gukbap and other sugure dishes that are hard to findelsewhere. It is a comfortable spot where you can order dishes to go with alcohol after 4 PM.","ja":"24時間営業で30年以上続いているこのお店では、スグレクッパなどなかなか見かけないスグレ(牛の肉と皮の間にある部位) 料理に出会える。16時以降はお酒とよく合う料理を注文できるリラックスした雰囲気のお店。"},"c":"분식·주점","g":"부산진구","p":"051-894-6921","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408094027003_thumbL","lat":35.14817,"lng":129.0299,"v":4451,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2326&lang_cd=ko"},{"n":{"ko":"30년전통가마솥석쇠돼지갈비","en":"Gamasot","ja":"30年伝統カマソッソクセテジカルビ"},"m":{"ko":"돼지갈비(200g) ￦14,000\n식사(1人) ￦2,000","en":"Pork ribs(200g) ￦14,000\nMeal(1 person) ￦2,000","ja":"豚カルビ(200g) ￦14,000\n食事(1人) ￦2,000"},"a":{"ko":"해운대구 좌동로14번길 60","en":"60, Jwadong-ro 14beon-gil, Haeundae-gu","ja":"海雲台区佐洞路14番キル60"},"h":{"ko":"12:00-22:00","en":"12:00-22:00","ja":"12:00-22:00"},"x":{"ko":"연중 무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"국내산 돼지를 사용하여 초벌구이된 양념돼지갈비 단일메뉴로 30여 년을 운영해온 돼지갈비전문점으로 모든 음식을 직접 만든다. 식사를 주문하면 제공되는 찌개와 게조림이 기대 이상의 맛을 보여준다.","en":"This pork ribs specialty restaurant has been operating for over 30 years with a single menu of seasoned domestic pork rib barbecue. All the food is made in-house. The jjigae and praised crab served at each order are delightful beyond expectations.","ja":"国産の豚を素焼きにした味付け豚カルビ、単一メニューで30年以上営業してきたテジカルビ専門店で、すべての料理をお店で作っています。食事を注文すると、提供されるチゲやカニの煮付けが期待以上の味を見せてくれる。"},"c":"고기·구이","g":"해운대구","p":"0507-1305-6175","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408094429754_thumbL","lat":35.1689,"lng":129.17159,"v":3665,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2327&lang_cd=ko"},{"n":{"ko":"달타이","en":"DALTHAI","ja":"タルタイ(Dal Thai)"},"m":{"ko":"뿌님팟퐁커리 ￦33,000\n똠얌꿍 ￦23,000","en":"Pu nim pad pong kari ￦33,000\nTom yum goong ￦23,000","ja":"プニムパッポンカリー ￦33,000\nトムヤムクン ￦23,000"},"a":{"ko":"해운대구 달맞이길 193 1층","en":"1F, 193, Dalmaji-gil, Haeundae-gu","ja":"海雲台区タルマジキル193、1階"},"h":{"ko":"11:00-20:00","en":"11:00-20:00","ja":"11:00-20:00"},"x":{"ko":"연중무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"10여 년을 운영해오며 달맞이길의 한 풍경이 되어가는 태국음식점으로, 전원 태국인 셰프로 구성된 주방에서 현지공수 또는 전용농장 계약 재배한 식재료를 사용하여 음식을 만들고 있다.","en":"This Thai restaurant has been a fixture on Dalmaji-gil for over a decade. The kitchen is\nstaffed by a team of Thai chefs who use ingredients sourced from Thailand or from contracted local farms.","ja":"10年以上営業しているタルマジキルの一風景となりつつあるタイ料理店で、タイ人のシェフでまかなうキッチンでは現地からの仕入れ、または専用農場で契約栽培した食材を使用して料理を作っている。"},"c":"양식·세계요리","g":"해운대구","p":"051-741-1122","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408095539103_thumbL","lat":35.158108,"lng":129.18246,"v":2379,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2328&lang_cd=ko"},{"n":{"ko":"란아한","en":"RAN A HAN","ja":"ランアハン"},"m":{"ko":"램쎕 ￦34,000\n꿍팟풍커리 ￦25,000","en":"Leng Saeb ￦34,000\nKkung Patpong Curry ￦25,000","ja":"レンセープ ￦34,000\nクンパッポンカリー ￦25,000"},"a":{"ko":"부산진구 서전로37번길 14-1","en":"14-1, Seojeon-ro 37beon-gil, Busanjin-gu","ja":"釜山鎮区西田路37番キル14-1"},"h":{"ko":"14:30-24:00","en":"14:30-24:00","ja":"14:30-24:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日休み"},"d":{"ko":"태국거리의 가게를 그대로 옮겨온 듯한 이곳은 태국의 호텔셰프 출신 셰프가 정통 태국요리를 만들고 있는 곳으로, 일체의 타협없는 현지의 맛을 구현하고 있다","en":"This place feels like a direct transplant of a shop from the streets of Thailand. Run by a chef with experience in Thai hotels, it offers authentic Thai cuisine with no compromises, staying true to the bold and vibrant flavors of the region.","ja":"タイ現地の通りにあるお店をそのまま運んできたようなこのレストランでは、地元ホテル出身のシェフが本格的なタイ料理を作っており、一切妥協のない本場の味を提供している。"},"c":"양식·세계요리","g":"부산진구","p":"0507-1412-9983","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408095705335_thumbL","lat":35.15837,"lng":129.06421,"v":2608,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2329&lang_cd=ko"},{"n":{"ko":"바오하우스","en":"BAOHAUS","ja":"バオ·ハウス"},"m":{"ko":"클래식바오 ￦5,000\n어향가지튀김 ￦9,000-14,000","en":"Classic bao ￦5,000\nStir-fried flavored eggplant ￦9,000-14,000","ja":"クラシックバオ ￦5,000\n魚香茄子の天ぷら ￦9,000-14,000"},"a":{"ko":"부산진구 서전로 38번길 62-9","en":"62-9, Seojeon-ro 38beon-gil, Busanjin-gu","ja":"釜山鎮区西田路38番キル62-9"},"h":{"ko":"11:30-15:00 / 17:00-21:00","en":"11:30-15:00 / 17:00-21:00","ja":"11:30-15:00 / 17:00-21:00"},"x":{"ko":"연중무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"대만식요리를 바오하우스만의 방식으로 해석하여 제공하는 캐주얼식당으로 바오, 우육면 등 대만의 대표음식들을 만날 수 있다. 음식이 신속하게 제공되는 것으로도 유명하다","en":"This is a casual restaurant that offers Taiwanese cuisine interpreted in a unique way. You can enjoy Taiwan’s representative dishes, such as bao and beef noodle soup. It is also famous for its fast food service.","ja":"台湾料理をバオハウスならではの解釈で提供するカジュアルレストラン。バオ、牛肉麺など台湾を代表する料理に出会える。食べ物がすぐに提供されることでも有名だ。"},"c":"분식·주점","g":"부산진구","p":"0507-1324-1031","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408095935004_thumbL","lat":35.154896,"lng":129.06335,"v":3258,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2330&lang_cd=ko"},{"n":{"ko":"롯데호텔 부산 블루헤이븐","en":"Blue Haven(롯데호텔 부산 블루헤이븐）","ja":"ロッテホテル釜山ブルーヘイブン（롯데호텔 블루헤이븐）"},"m":{"ko":"Lunch Course ￦67,000\nDinner Course ￦85,000-135,000\n→ Course Menu로 제공되며 식재료에 따라 메뉴 변동 있음","en":"Lunch Course ￦67,000\nDinner Course ￦85,000-135,000\n→ Provided as a course menu; the menu may vary depending on the ingredients","ja":"Lunch Course ￦67,000\nDinner Course ￦85,000~135,000\n→ Course Menuで提供、食材によるメニュー変\n動あり"},"a":{"ko":"부산진구 가야대로 772 롯데호텔 부산 7층","en":"7F, Lotte Hotel Busan, 772, Gaya-daero,\nBusanjin-gu","ja":"釜山鎮区伽倻大路772 ロッテホテル釜山7階"},"h":{"ko":"12:00-22:00","en":"12:00-22:00","ja":"12:00-22:00"},"x":{"ko":"연중 무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"낮에는 휴양지의 편안하고 여유로운 분위기를 밤에는 도심 속 야경과 함께 은은한 조명의 정원이로맨틱한 분위기를 연출하는 이곳은 캐주얼 다이닝 메뉴와 칵테일 와인 등 다양한 음료가 준비되어 있다.","en":"With the comfortable and laid-back atmosphere of a resort by day and the romantic atmosphere of a garden with soft lighting along with the night view of the city by night, Blue Haven offers a casual dining menu and a variety of drinks, including cocktails and wine.","ja":"昼はリゾートのリラックスした雰囲気を、夜は都心の夜景とともにほのかな照明が灯る庭園がロマンチックな雰囲気を演出するこのお店は、カジュアルダイニングのメニューやカクテルワインなど様々なドリンクが用意されている。"},"c":"양식·세계요리","g":"부산진구","p":"051-810-6300","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408100151107_thumbL","lat":35.15663,"lng":129.05563,"v":3768,"l":16,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2332&lang_cd=ko"},{"n":{"ko":"못난이식당 해운대점","en":"Monnani Sikdang Haeundae Branch(못난이식당 해운대점）","ja":"モンナニ食堂 海雲台店（못난이식당 해운대점）"},"m":{"ko":"갈치구이 ￦43,000\n갈치찌개 ￦43,000","en":"Grilled cutlassfish ￦43,000\nGalchi jjigae(cutlassfish stew) ￦43,000","ja":"太刀魚焼き ￦43,000\n太刀魚チゲ ￦43,000"},"a":{"ko":"해운대구 마린시티1로 91, 101동 201호","en":"#101-201, 91, Marine City 1-ro, Haeundae-gu","ja":"海雲台区マリンシティ1路91、101棟201号"},"h":{"ko":"11:00-15:00 / 17:00-19:30","en":"11:00-15:00 / 17:00-19:30","ja":"11:00-15:00 / 17:00-19:30"},"x":{"ko":"일, 월요일 휴무","en":"Closed on Sundays and Mondays","ja":"日曜、月曜日休み"},"d":{"ko":"큼직한 제주산 갈치를 사용하는 갈치요리전문점으로, 신선도가 중요한 갈치회무침을 만날 수 있다. 늙은호박을 사용해서 단맛을 내는 건강한 음식을 만들고 있다.","en":"This restaurant specializes in cutlassfish dishes using large cutlassfish from Jeju, and you can enjoy fresh tossed cutlassfish. They make healthy food using sweetness from squash.","ja":"大きな済州産の太刀魚(カルチ)をあつかう太刀魚料理専門店で、鮮度が命と言われる太刀魚の刺身の和え物を味わうことができる。 西洋かぼちゃを使って甘みを出し健康的な料理を作る。"},"c":"해산물·회","g":"해운대구","p":"0507-1418-2528","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408100308119_thumbL","lat":35.154926,"lng":129.1445,"v":6138,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2334&lang_cd=ko"},{"n":{"ko":"손내향미","en":"Sonnae hyangmi","ja":"ソンネヒャンミ"},"m":{"ko":"갈비솥밥 ￦30,000\n여포하이볼 ￦12,000","en":"Galbi sotbap ￦30,000\nYeopo highball ￦12,000","ja":"カルビ釜飯 ￦30,000\nヨポハイボール ￦12,000"},"a":{"ko":"부산진구 동성로 30번길 4","en":"4, Dongseong-ro 30beon-gil, Busanjin-gu","ja":"釜山鎮区東城路30番キル4"},"h":{"ko":"12:00-16:00 / 17:30-20:00","en":"12:00-16:00 / 17:30-20:00","ja":"12:00-16:00 / 17:30-20:00"},"x":{"ko":"수요일 휴무","en":"Closed on Wednesdays","ja":"水曜日休み"},"d":{"ko":"눈 앞에서는 솥밥을 짓는 모습이 보이고 화로에서 굽히는 목포식갈비의 향이 공간을 채운다. 오롯이 식사에 집중할 수 있는 이 공간에 20여 분간 기다린 목포식 갈비솥밥이 차려진다.","en":"Here, guests can watch as their rice is cooked in a stone pot and smell the aroma of Mokpo-style grilled ribs from the hearth that fills the space. After waiting for about 20 minutes, the Mokpo-style galbi sotbap (stone pot rice) is served in an atmosphere where one can focus solely on their meal.","ja":"目の前で釜飯を炊く様子が見え、火鉢で焼く木浦式カルビの香りが空間を満たす。 ただ食事に集中できるこのお店では、約20分後に木浦式カルビ釜飯を味わうことができる。"},"c":"고기·구이","g":"부산진구","p":"051-715-4648","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408100525344_thumbL","lat":35.153034,"lng":129.06851,"v":4241,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2336&lang_cd=ko"},{"n":{"ko":"선창횟집","en":"Seonchang Hoetjip（선창횟집）","ja":"ソンチャン刺身（선창횟집）"},"m":{"ko":"선창 코스 ￦50,000-150,000","en":"Seonchang course ￦50,000-150,000","ja":"ソンチャンコース ￦50,000-150,000"},"a":{"ko":"해운대구 달맞이길62번길 67","en":"67, Dalmaji-gil 62beon-gil, Haeundae-gu","ja":"海雲台区タルマジキル62番キル67"},"h":{"ko":"10:00-22:30","en":"10:00-22:30","ja":"10:00-22:30"},"x":{"ko":"명절연휴 2일 휴무","en":"Closed for 2 days during the national holidays","ja":"名節(2日間)休み"},"d":{"ko":"40여 년을 운영해온 이곳은 매일같이 아침마다 직접 가져온 횟감을 준비하고 당일 수급된 채소와, 직접 담근 김치 등을 준비하며 요리는 매일 새로 만들어 제공한다. 조금 특별한 날에도 어울리는 횟집이다.","en":"In operation for more than 40 years, Seonchang Hoetjip prepares its own seafood every morning and serves dishes made fresh daily with vegetables delivered that day and handmade kimchi. This is a Korean-style sliced raw fish restaurant that is suitable for a special occasion.","ja":"40年以上続くこの店は、毎朝魚を仕入れ刺身を仕込み、当日収穫された野菜や自家製のキムチなどを使い、料理は毎日新たに作りなおして提供する。ちょっと特別な日にもぴったりな刺身屋だ。"},"c":"해산물·회","g":"해운대구","p":"051-747-7470","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408102722301_thumbL","lat":35.156857,"lng":129.17383,"v":4409,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2337&lang_cd=ko"},{"n":{"ko":"수블","en":"Sooble（수블）","ja":"スーブル（수블）"},"m":{"ko":"차돌떡볶이 ￦15,000\n생참치김밥 ￦29,000","en":"Chadol tteokbokki ￦15,000\nTuna gimbap ￦29,000","ja":"牛のともばら肉入りトッポッキ ￦15,000\nマグロのキンパ ￦29,000"},"a":{"ko":"해운대구 달맞이길 62번길 19, 2층","en":"2F, 19, Dalmaji-gil 62beon-gil, Haeundae-gu","ja":"海雲台区タルマジキル62番キル19、2階"},"h":{"ko":"17:00-23:00","en":"17:00-23:00","ja":"17:00-23:00"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜日休み"},"d":{"ko":"자신이 먹고 싶은 것을 메뉴로 하고, 마시고 싶은것들을 판다고 하는 이 곳은 아름다운 풍경과 함께 수준 높은 요리로 인기 높은 요리주점이다. 청결하게 관리되고 있는 오픈키친이 인상적이다.","en":"Sooble vows to serve what the chef wants to eat and drink. This popular restaurant-bar offers a view of beautiful scenery and delectable cuisine. The open kitchen, maintained without a spot, makes a great impression.","ja":"オーナー自身が食べたいものをメニューにして、飲みたいものを販売しているというこのお店は、美しい風景とともに、レベルの高い料理で人気のあるレストラン。 清潔に管理されたオープンキッチンが印象的だ。"},"c":"분식·주점","g":"해운대구","p":"0507-1411-0178","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408103219387_thumbL","lat":35.159527,"lng":129.17055,"v":3440,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2339&lang_cd=ko"},{"n":{"ko":"스시시안","en":"Sushi sian（스시시안）","ja":"寿司是安（스시시안）"},"m":{"ko":"코스(10피스) ￦35,000","en":"Course(10 pieces) ￦35,000","ja":"コース(10貫) ￦35,000"},"a":{"ko":"해운대구 센텀1로 9 E동상가 2층 210호","en":"#210, 2F, E-dong Sangga, 9, Centum 1-ro, Haeundae-gu","ja":"海雲台区センタム1路9E洞商店街2階210号"},"h":{"ko":"18:00-20:30","en":"18:00-20:30","ja":"18:00-20:30"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜日休み"},"d":{"ko":"붉은식초를 이용한 샤리로 기름진 생선이나 등푸른 생선과 궁합이 좋은 스시집. 오마카세 수준의 스시를 비교적 저렴한 가격으로 만날 수 있으며, 예약제로만 운영하고 있다.","en":"This sushi restaurant uses red vinegar to prepare shari (vinegared rice), which goes well with fatty fish or blue-backed fish. You can enjoy omakase-level sushi at a relatively affordable price, and the restaurant operates by reservation only.","ja":"赤酢を使ったシャリが脂っこい魚や青魚と相性のいい寿司屋。おまかせレベルの寿司を比較的リーズナブルな価格で提供しており、予約制でのみ運営している。"},"c":"일식","g":"해운대구","p":"051-611-2684","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408103617676_thumbL","lat":35.167683,"lng":129.13104,"v":2714,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2340&lang_cd=ko"},{"n":{"ko":"쥬가","en":"JYUGA（쥬가）","ja":"十駕（쥬가）"},"m":{"ko":"쿠시카츠10개세트 ￦19,000\n오뎅 모리아와세(모듬) ￦20,000","en":"10-piece kushikatsu set ￦19,000\nOden moriawase(assortment) ￦20,000","ja":"串カツ10本セット ￦19,000\nおでん 盛り合わせ ￦20,000"},"a":{"ko":"해운대구 우동1로20번길 53, 2층","en":"2F, 53, Udong 1-ro 20beon-gil, Haeundae-gu","ja":"海雲台区佑洞1路20番キル53、2階"},"h":{"ko":"17:00-23:00","en":"17:00-23:00","ja":"17:00-23:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日休み"},"d":{"ko":"다년간 일본교토에서 가이세키요리를 수련한 오너와 오사카출신 일본인 요리사 부부가 누구나 편하게 즐길 수 있는 오사카의 대중음식을 만들고 있는 해리단길의 인기가게.","en":"This crowd favorite on Haeridan-gil is run by an owner who trained for many years in kaiseki cuisine in Kyoto, Japan, and his wife, a Japanese chef from Osaka. Together, they make tasty Osaka-based cuisine anyone can enjoy.","ja":"長年日本の京都で懐石料理を修行していた韓国人夫と大阪出身の日本人妻のシェフ夫婦が誰もが気軽に楽しめる大阪の大衆料理を作っているヘリダンキルの人気店。"},"c":"기타","g":"해운대구","p":"0507-1364-3516","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408104140736_thumbL","lat":35.165016,"lng":129.15915,"v":2695,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2341&lang_cd=ko"},{"n":{"ko":"쿠지라멘","en":"Kuziramen（쿠지라멘）","ja":"クジラーメン（쿠지라멘）"},"m":{"ko":"쇼유라멘 ￦10,000\n아부라소바 ￦10,000","en":"Shoyu ramen ￦10,000\nAbura soba ￦10,000","ja":"醤油ラーメン ￦10,000\n油そば ￦10,000"},"a":{"ko":"해운대구 우동2로 17","en":"17, Udong 2-ro, Haeundae-gu","ja":"海雲台区佑洞2路17"},"h":{"ko":"11:00-14:30","en":"11:00-14:30","ja":"11:00-14:30"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日休み"},"d":{"ko":"라멘이라면 대부분 진한 국물의 돈코츠라멘을 떠올리지만 이 곳은 맑은 국물의 시오라멘과 쇼유라멘 그리고 아부라소바를 만날 수 있는 곳이다. 칼국수처럼 다소 두툼한 면이 매력적인 마니아층이 단단한 가게다.","en":"When it comes to Japanese ramen, most people think of tonkotsu ramen with a thick broth, but this is a place where you can find shio ramen and shoyu ramen with a clear broth, as well as abura soba. The ramen shop with a dedicated fanbase presents slightly thicker noodles, similar to those used in kalguksu, that have a unique appeal.","ja":"ラーメンといえば、たいてい濃いスープのとんこつラーメンを思い浮かべるが、このお店では澄んだスープの塩ラーメンや醤油ラーメン、そして油そばも味わえる。カルグクスのようにやや厚みのある麺が魅力的で、マニアが集うお店。"},"c":"일식","g":"해운대구","p":"070-4795-7214","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408104843726_thumbL","lat":35.166203,"lng":129.16014,"v":3407,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2342&lang_cd=ko"},{"n":{"ko":"팔레트","en":"Palate（팔레트）","ja":"パレット（팔레트）"},"m":{"ko":"디너 코스 ￦200,000\n런치 코스 ￦88,000","en":"Course Dinner ￦200,000\nCourse Lunch ￦88,000","ja":"ディナーコース ￦200,000\nランチコース ￦88,000"},"a":{"ko":"해운대구 달맞이길65번길 154, 3층","en":"3F, 154, Dalmaji-gil 65beon-gil, Haeundae-gu","ja":"海雲台区タルマジキル65番キル154、3階"},"h":{"ko":"12:00-15:00 / 18:00-22:00","en":"12:00-15:00 / 18:00-22:00","ja":"12:00-15:00 / 18:00-22:00"},"x":{"ko":"월, 화요일 휴무","en":"Closed on Mondays and Tuesdays","ja":"月、火曜休み"},"d":{"ko":"프렌치쿠킹 테크닉과 다양한 재료의 조합을 바탕으로 하는 김재훈 셰프의 창의적이고 감각적인 다이닝레스토랑.","en":"A refined dining experience curated by Chef Kim Jae-hoon, where French cooking techniques meet a harmonious blend of diverse ingredients, resulting in creative and sophisticated cuisine.","ja":"フレンチ料理のテクニックと様々な材料の組み合わせから生まれたキム·ジェフンシェフの創意的で感覚的なダイニングレストラン 。"},"c":"양식·세계요리","g":"해운대구","p":"051-626-2364","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408111911870_thumbL","lat":35.156513,"lng":129.17834,"v":2773,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2344&lang_cd=ko"},{"n":{"ko":"1969부원동칼국수 부산본점","en":"1969 Buwondong Kalguksu Busan Main Branch","ja":"1969 府院洞カルグクス 釜山本店"},"m":{"ko":"부원칼국수 ￦9,000\n비빔칼국수 ￦9,000","en":"Buwon kalguksu ￦9,000\nBibim kalguksu ￦9,000","ja":"府院カルグクス ￦9,000\nビビンカルグクス ￦9,000"},"a":{"ko":"중구 구덕로22번길3 1층","en":"1F, 3, Gudeok-ro 22beon-gil, Jung-gu","ja":"中区九徳路22番キル3、1階"},"h":{"ko":"11:00-19:30","en":"11:00-19:30","ja":"11:00-19:30"},"x":{"ko":"연중 무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"신선도를 유지하기 위해 매일 아침 경매된 식재료를 공수하여 재료소진 시까지 한정 판매하고 있는곳으로 신선한 굴과 가리비가 듬뿍 올려진 칼국수를 만날 수 있다. 18시쯤 재료가 소진되는 경우가 많다고 한다.","en":"To maintain freshness, the restaurant receives the ingredients auctioned off every morning and operates in limited quantities until noodles are sold out. Here, you can enjoy noodles topped with plenty of fresh oysters and scallops. Typically, the ingredients are exhausted around 6 PM.","ja":"鮮度を保つために毎朝競り落とされた食材を仕入れ、材料が切れると閉まってしまうお店。新鮮なカキとホタテがたくさんのったカルグクスに出会える。18時頃に材料が切れることが多いようだ。"},"c":"면·국물","g":"중구","p":"0507-1477-9925","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408112548429_thumbL","lat":35.097927,"lng":129.03316,"v":5708,"l":10,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2345&lang_cd=ko"},{"n":{"ko":"고등어연구소 본점","en":"Mackerel Research Institute Main Branch","ja":"サバ研究所 本店"},"m":{"ko":"고태솥밥 + 오차즈케 ￦10,900\n고등어온소바 ￦10,900","en":"Stone pot rice with mackerel with ochazuke ￦10,900\nWarm soba with mackerel ￦10,900","ja":"ゴテ釜飯 + お茶漬け ￦10,900\nサバの温そば ￦10,900"},"a":{"ko":"중구 중앙대로 79-1","en":"79-1, Jungang-daero, Jung-gu","ja":"中区中央大路79-1"},"h":{"ko":"11:00-15:00 / 17:00-21:30","en":"11:00-15:00 / 17:00-21:30","ja":"11:00-15:00 / 17:00-21:30"},"x":{"ko":"명절휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"다양한 연구를 통하여 고등어의 비린맛을 완벽하게 제거한 이 곳은 일식베이스의 고등어요리를 제공하는 곳으로, 고태솥밥, 고등어온소바, 고등어봉초밥 등 다채로운 고등어요리가 준비되어 있다.","en":"This restaurant perfected the art of serving\nmackerel dishes in the freshest way possible through various research. It offers a wide array of Japanese-cuisine-based dishes, including stone pot rice with mackerel, warm soba with mackerel, and mackerel sushi.","ja":"様々な研究を通じてサバの生臭さを完璧に取り除くこのお店は、和食ベースのサバ料理を提供するところで、ゴテ釜飯、サバの温そば、サバの棒寿司など多彩なサバ料理を楽しめる。"},"c":"일식","g":"중구","p":"0507-1428-0048","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408113257860_thumbL","lat":35.104816,"lng":129.03603,"v":4188,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2346&lang_cd=ko"},{"n":{"ko":"동삼정","en":"DONGSAMJUNG","ja":"東三亭"},"m":{"ko":"한우육회 타르타르 ￦25,000\n동삼정김밥 ￦10,000","en":"Yukhoe(Korean beef tartare) ￦25,000\nDongsamjung gimbap ￦10,000","ja":"韓牛ユッケのタルタル ￦25,000\n東三亭のキンパ ￦10,000"},"a":{"ko":"중구 광복중앙로 14-62 1층","en":"1F, 14-62, Gwangbokjungang-ro, Jung-gu","ja":"中区光復中央路14-62、1階"},"h":{"ko":"18:00-23:50","en":"18:00-23:50","ja":"18:00-23:50"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"月曜日休み"},"d":{"ko":"깔끔한 공간에서 서양식 조리법으로 만든 독특한 한식 창작요리를 만날 수 있는 이 곳은 계절마다 제철음식을 사용하여 다양한 술과 어울리는 음식이 기다리고 있는 한식주점이다.","en":"This is a Korean bar where you can enjoy unique Korean fusion dishes made with Western cooking methods in a clean space. It serves seasonal dishes that go well with various types of alcoholic drinks.","ja":"こぎれいな空間で西洋風の調理法で作ったユニークな韓国料理創作料理に出会えるこのお店は、季節ごとに旬の食材を使用し、色々な種類のお酒と合う料理を楽しめる韓国料理居酒屋だ。"},"c":"해산물·회","g":"중구","p":"051-912-8343","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408113919836_thumbL","lat":35.10059,"lng":129.03143,"v":2839,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2347&lang_cd=ko"},{"n":{"ko":"유원","en":"Yuwon","ja":"留園"},"m":{"ko":"오향장육 ￦38,000\n깐소새우 ￦35,000\n광동면 ￦11,000","en":"Five-spice braised pork ￦38,000\nChili shrimp ￦35,000\nGuangdong noodles ￦11,000","ja":"五香醤肉 ￦38,000\nエビのチリソース ￦35,000\n広東麺 ￦11,000"},"a":{"ko":"중구 충장대로9번길 29 보전빌딩 지하1층","en":"B1, Bojeon Building,\n29, Chungjang-daero 9beon-gil, Jung-gu","ja":"中区忠壮大路9番キル29 ポジョンビル地下1階"},"h":{"ko":"12:00-15:00 / 17:00-20:30","en":"12:00-15:00 / 17:00-20:30","ja":"12:00-15:00 / 17:00-20:30"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜日休み"},"d":{"ko":"번화가에서 조금 떨어진 곳 ‘코모도호텔’ 인근에 자리한 이 곳은 언뜻 큰 특징이 없어 보이나, 무려 50여 년간 주방을 지켜온 화교 출신의 오너셰프가 직접 요리하고 있는 중식당이다.","en":"Located a little away from the downtown area near the Komodo Hotel, it doesn’t seem to have any outstanding features at first glance, but it is a Chinese restaurant where the owner-chef, who is of Chinese descent and has been in charge of the kitchen for more than 50 years, cooks the food himself.","ja":"繁華街から少し離れた「コモドホテル」の近くにあるこのお店は一見大きな特徴がないように見えるが、なんと50年以上も厨房を守ってきた華僑出身のオーナーシェフが料理する中華料理店なのだ。"},"c":"기타","g":"중구","p":"0507-1492-5659","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408114718754_thumbL","lat":35.10799,"lng":129.03767,"v":7507,"l":266,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2348&lang_cd=ko"},{"n":{"ko":"야스마루 닌니쿠","en":"Yasumaru Ninniku","ja":"やすまる-にんにく（야스마루 닌니쿠）"},"m":{"ko":"파랑국수 ￦11,000\n고등어김말이 ￦12,000","en":"Parang guksu ￦11,000\nMackerel seaweed roll ￦12,000","ja":"パラングクス ￦11,000\nサバのり巻き ￦12,000"},"a":{"ko":"부산진구 서전로38번길 35-14","en":"35-14, Seojeon-ro 38beon-gil, Busanjin-gu","ja":"釜山镇区西田路38号街35-14"},"h":{"ko":"12:00-14:50 / 17:30-21:00","en":"12:00-14:50 / 17:30-21:00","ja":"12:00-14:50 / 17:30-21:00"},"x":{"ko":"일요일, 2, 4주 월요일 휴무","en":"Closed on Sundays and second and fourth Mondays","ja":"日曜、第2/4月曜休み"},"d":{"ko":"입맛 없는 여름에 맛있게 먹을 수 있는 음식을 만들려고 했다지만 계절에 관계없이 항상 긴 줄이 서있는 곳으로 독특한 모습의 파랑국수가 대표메뉴.간판 없는 인기식당으로도 유명하다.","en":"The restaurant started out to present good food when people lose their appetite in the summer. But it’s known for the long queue regardless of the season. It’s known for parang guksu noodles with a unique appearance and not having a signboard.","ja":"食欲のない夏においしく食べられる料理を作ったといわれるが季節に関係なくいつも長い列ができる店で、ユニークなパラングクスが代表メニュー。看板のない人気店としても知られる。"},"c":"면·국물","g":"부산진구","p":"010-9238-0508","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408114844827_thumbL","lat":35.15606,"lng":129.06438,"v":2910,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2349&lang_cd=ko"},{"n":{"ko":"지즈","en":"Jeez","ja":"ジーズ（ＪＥＥＺ）"},"m":{"ko":"로스카츠정식 ￦12,000\n히레카츠정식 ￦13,000","en":"Sirloin katsu set meal ￦12,000\nTenderloin katsu set meal ￦13,000","ja":"ロースカツ定食 ￦12,000\nヒレカツ定食 ￦13,000"},"a":{"ko":"부산진구 서전로 58번길 34-1, 1층","en":"1F, 34-1, Seojeon-ro 58beon-gil, Busanjin-gu","ja":"釜山鎮区西田路58番キル34-1、1階"},"h":{"ko":"11:30-15:00 / 17:00-21:00","en":"11:30-15:00 / 17:00-21:00","ja":"11:30-15:00 / 17:00-21:00"},"x":{"ko":"연중 무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"작은 골목안에 자리한 이 곳은 양식적인 요소를 적용한 일본식 돈카츠를 만드는 곳으로, 지저스의 줄임말인 지즈라는 가게명처럼 첫 입에 감탄을 할 수 있는 음식을 목표로 한다고 한다","en":"This restaurant, located in a small alley, serves Japanese-style tonkatsu with Western elements. As the name of the restaurant, Jeez(short for Jesus), suggests, it aims to serve food that will impress you the first time you taste it.","ja":"小さな路地に位置するこのお店は、洋食の要素を取り入れた和風トンカツを作っている。ジーザス (Jesus! )の略であるジーズという店名のように、一口目に感嘆できる一皿を目指しているそうだ。"},"c":"한식·백반","g":"부산진구","p":"0507-1485-1331","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408115051503_thumbL","lat":35.15622,"lng":129.06595,"v":3125,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2350&lang_cd=ko"},{"n":{"ko":"순사이쿠보","en":"Shunsai Kubo","ja":"旬彩久保"},"m":{"ko":"히츠마부시 ￦39,000\n생연어덮밥 ￦17,500","en":"Hitsumabushi ￦39,000\nSalmon rice bowl ￦17,500","ja":"ひつまぶし ￦39,000\nサーモン丼 ￦17,500"},"a":{"ko":"북구 양달로 4번길 17","en":"17, Yangdal-ro 4beon-gil, Buk-gu","ja":"北区ヤンダル路4番キル17"},"h":{"ko":"12:00-15:00 / 17:30-20:20","en":"12:00-15:00 / 17:30-20:20","ja":"12:00-15:00 / 17:30-20:20"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日休み"},"d":{"ko":"나고야식 장어덮밥인 히츠마부시 전문점으로 최고급 생물 풍천장어만 사용한다. 특제소스를 발라가며 전통방식으로 정성껏 구운 장어와 함께 아이가 즐길 수 있는 메뉴도 준비되어 있다.","en":"Shunsai Kubo is a restaurant specializing in hitsumabushi, a Nagoya-style eel rice bowl that uses only the finest Pungcheon eels. It offers traditionally prepared eel, grilled with care by brushing special sauce, as well as dishes for children to enjoy.","ja":"名古屋名物のひつまぶし専門店で、最高級のプンチョンうなぎのみを使用する。 特製ソースを塗りながら伝統的な方法で丹念に焼いたうなぎ料理や、お子様が楽しめるメニューも用意されている。"},"c":"일식","g":"북구","p":"051-365-2959","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408115525042_thumbL","lat":35.240913,"lng":129.01465,"v":3072,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2351&lang_cd=ko"},{"n":{"ko":"델리봉","en":"DELI BONG","ja":"デリボン"},"m":{"ko":"디너코스 ￦75,000","en":"Dinner course ￦75,000","ja":"ディナーコース ￦75,000"},"a":{"ko":"연제구 신금로 25, 노블레스스퀘어 110호","en":"#110, Noblesse Square, 25, Singeum-ro 25, Yeonje-gu","ja":"蓮堤区新金路25、ノブレススクエア110号"},"h":{"ko":"19:00-21:00","en":"19:00-21:00","ja":"19:00-21:00"},"x":{"ko":"일, 월요일 휴무","en":"Closed on Sundays and Mondays","ja":"日、月曜日休み"},"d":{"ko":"샤퀴테리를 활용한 프랑스 코스요리전문점으로 셰프가 혼자 운영하고 있는 곳이다. 이곳을 찾는다면 간판이 없어 잠깐 당황스러울 수도 있을 것이나 그 안에선 분명 만찬이 벌어지고 있다.","en":"DELI BONG, run by a single-owner chef, offers French course dining using charcuterie. Upon the first visit, guests may be a little confused because there is no signboard, but there is definitely a feast going on inside.","ja":"シャルキュトリーを活用したフランスコース料理専門店で、シェフが一人で営んでいる。このお店は看板がなく、少し戸惑ってしまうかもしれないが、店内では確かに晩餐会が開かれている。"},"c":"한식·백반","g":"연제구","p":"051-868-6848","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408122426619_thumbL","lat":35.19158,"lng":129.09442,"v":2620,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2353&lang_cd=ko"},{"n":{"ko":"보느파티쓰리","en":"Bonheur Patisserie","ja":"ボーヌパティスリー"},"m":{"ko":"계절디저트 ￦9,500-12,000\n까늘레 ￦2,900","en":"Seasonal dessert ￦9,500-12,000\nCanelé ￦2,900","ja":"季節のデザート ￦9,500-12,000\nカヌレ ￦2,900"},"a":{"ko":"연제구 교대로 7, 2층","en":"2F, 7, Gyodae-ro, Yeonje-gu","ja":"蓮堤区キョデ路7、2階"},"h":{"ko":"11:30-19:00","en":"11:30-19:00","ja":"11:30-19:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日休み"},"d":{"ko":"프랑스 르 꼬르동 블루를 졸업하고, 호텔 샹그릴라 파리, 호텔리츠 파리 등 14년간 파리에서 활동한 김지연 파티시에의 디저트가게로 프랑스제과가 기초가 된 프랑스디저트 전문점이다.","en":"This is a French dessert shop run by pastry chef Kim Ji-yeon, who graduated from Le Cordon Bleu in France and worked at Hotel Shangri-La Paris and Hotel Ritz Paris for 14 years.","ja":"フランスのル·コルドン·ブルーを卒業し、ホテルシャングリラ·パリ、ホテルリッツ·パリなど14年間パリで活動したキム·ジヨンパティシエのデザート店で、フランス製菓が基礎となるフランスのデザート専門店。"},"c":"카페·베이커리","g":"연제구","p":"051-502-2451","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408123831370_thumbL","lat":35.19527,"lng":129.07895,"v":3073,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2354&lang_cd=ko"},{"n":{"ko":"남천면가","en":"Namcheonmeonga","ja":"南川麵家"},"m":{"ko":"들기름메밀면 ￦9,500\n남천소바 ￦10,000","en":"Perilla oil buckwheat noodles ￦9,500\nNamcheon soba ￦10,000","ja":"エゴマ油そば ￦9,500\n南川そば ￦10,000"},"a":{"ko":"수영구 황령대로473번길 14-2","en":"14-2, Hwangnyeongdae-ro 473beon-gil,\nSuyeong-gu","ja":"水営区荒嶺大路473番キル14-2"},"h":{"ko":"11:00-20:00","en":"11:00-20:00","ja":"11:00-20:00"},"x":{"ko":"연중무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"국내산 메밀을 사용하여 매일 직접 반죽하고 뽑는 메밀면을 제공하고 있는 곳으로, 건강한 음식을 대접하고 싶은 마음으로 음식 한 그릇마다 많은 정성과 시간을 담아 내놓는다고 한다.","en":"This restaurant serves buckwheat noodles that are made from scratch daily from domestic buckwheat. They put a lot of effort and time into each bowl of food to serve healthy food to customers.","ja":"韓国産のそばを使って毎日自家製のそばを打ち提供しているお店で、健康によい食べ物をもてなしたいという気持ちで、料理一皿ごとに真心と時間を込めて出すという。"},"c":"일식","g":"수영구","p":"0507-1349-1631","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408131231343_thumbL","lat":35.139626,"lng":129.10675,"v":4064,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2356&lang_cd=ko"},{"n":{"ko":"닭발의 지존","en":"Dakbaljizon","ja":"DAKBALJIZON"},"m":{"ko":"닭발 ￦15,000-21,000\n조개탕 ￦15,000-21,000","en":"Seasoned chicken feet ￦15,000-21,000\nClam soup ￦15,000-21,0 8132244401_thumbL","lat":35.153927,"lng":129.11264,"v":4657,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2358&lang_cd=ko"},{"n":{"ko":"백일평냉","en":"100.1.pyeongnaeng","ja":"ペクイルピョンネン"},"m":{"ko":"평양냉면 ￦13,000\n비빔냉면 ￦13,000","en":"Pyeongyang naengmyeon ￦13,000\nBibim naengmyeon ￦13,000","ja":"平壌冷麺 ￦13,000\nビビン冷麺 ￦13,000\n水営区南川パダ路10番キ"},"a":{"ko":"수영구 남천바다로10번길 29, 1층","en":"1F, 29, Namcheonbada-ro 10beon-gil, Suyeong-gu","ja":"水営区南川パダ路10番キル29、1階"},"h":{"ko":"11:30-15:30 / 17:00-19:00","en":"11:30-15:30 / 17:00-19:00","ja":"11:30-15:30 / 17:00-19:00"},"x":{"ko":"연중 무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"전통의 맛과 냉면 기술자들의 고집으로, 오직 고깃국물과 소금으로만 만들어진 육수와 80% 함량의 메밀면으로 만든 제대로 된 평양냉면을 완성하였다. 수제 이북 만둣국, 한우 불고기 등의 메뉴도 준비되어 있다.","en":"With the traditional flavors and the principle of the cold noodle technicians, the restaurant has completed the art of making authentic Pyeongyang naengmyeon, consisting of beef broth, salt, and 80% buckwheat noodles. The menu also includes homemade North Korean manduguk (dumpling soup) and Hanwoo bulgogi.","ja":"伝統の味を守ろうとする冷麺職人のこだわりで、肉で取っただしと塩だけで作られたスープと80%含量のそばで作った本物の平壌冷麺を完成させた。 自家製の以北餃子スープ、韓牛のプルコギなどのメニューも用意されている。"},"c":"면·국물","g":"수영구","p":"051-625-5515","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408132935773_thumbL","lat":35.148556,"lng":129.11166,"v":6888,"l":10,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2359&lang_cd=ko"},{"n":{"ko":"아펙트","en":"Afekt","ja":"アフェクト"},"m":{"ko":"오징어세비체 ￦28,000\n시금치 쉬림프 오일 소스 타야린 ￦25,000","en":"Squid ceviche ￦28,000\nSpinach shrimp oil sauce tajarin ￦25,000","ja":"イカのセビチェ ￦28,000\nほうれん草とシュリンプオイルソースのタヤリン ￦25,000"},"a":{"ko":"수영구 무학로 64번길 31, 1층","en":"1F, 31, Muhak-ro 64beon-gil, Suyeong-gu","ja":"水営区舞鶴路64番キル31、1階"},"h":{"ko":"18:00-21:00","en":"18:00-21:00","ja":"18:00-21:00"},"x":{"ko":"일, 월요일 휴무","en":"Closed on Sundays and Mondays","ja":"日、月曜日休み"},"d":{"ko":"커다란 U자 형태의 테이블이 인상적인 이 곳은 제철재료를 이용하여 만든 프렌치 베이스의 다이닝 레스토랑으로, 와인과의 페어링이 좋은 메뉴를 구성하고 있다.","en":"This impressive restaurant with a large U-shaped table is a French-based dining restaurant that uses seasonal ingredients and offers a menu that pairs great with wine.","ja":"大きなU字型のテーブルが印象的なこのお店は、旬の材料を利用して作ったフレンチベースのダイニングレストランで、ワインとの相性が良いメニューを楽しむことができる。"},"c":"양식·세계요리","g":"수영구","p":"0507-1307-7822","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408133516752_thumbL","lat":35.159874,"lng":129.12129,"v":12284,"l":42,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2360&lang_cd=ko"},{"n":{"ko":"야키토리 백탄","en":"Yakitori BAEKTAN","ja":"焼き鳥 白炭"},"m":{"ko":"백코스 ￦35,000\n탄코스 ￦19,000","en":"Baek Course ￦35,000\nTan Course ￦19,000","ja":"白套餐 ￦35,000\n炭套餐 ￦19,000"},"a":{"ko":"수영구 민락로13번길 21, 2층","en":"2F, 21, Millak-ro 13beon-gil, Suyeong-gu","ja":"水营区民乐路13号街21，2楼"},"h":{"ko":"17:30-23:30","en":"17:30-23:30","ja":"17:30-23:30"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"星期一休息"},"d":{"ko":"모든 꼬치는 매일 아침 들어온 생닭을 직접 발골하여 당일생산 당일판매의 원칙으로 제공하는 야키토리전문점으로 코스주문 후 단품을 주문하는 방식이다. 잘 구워진 꼬치를 다양한 방법으로 즐길 수 있다.","en":"All the skewers are served on the same day as they are made using chicken that has been deboned by hand every morning. This yakitori specialty restaurant follows the principle of serving what is cooked on the same day. To order, choose a course first, then add individual items. You can enjoy well-grilled skewers in various ways.","ja":"すべての串焼きは、毎朝入荷した鶏を骨抜きし、当日生産当日販売を原則として提供する焼き鳥専門店で、コース注文後に単品を追加で注文する。 絶妙に焼けた串焼きを\n色々味わうことができる。"},"c":"일식","g":"수영구","p":"0507-1332-6043","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250408134146562_thumbL","lat":35.15614,"lng":129.1215,"v":5203,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=2361&lang_cd=ko"},{"n":{"ko":"야키토리 해공","en":"Yakitori HAEGONG (야키토리 해공）","ja":"焼き鳥 該工（야키토리 해공）"},"m":{"ko":"토종닭 야키토리 오마카세 ￦59,000","en":"Korean native chicken yakitori omakase\n￦59,000","ja":"地鶏の焼き鳥おまかせ￦59,000"},"a":{"ko":"수    search:"搜索店名·菜单·地区",list:"列表",map:"地图",catLabel:"菜系",guLabel:"地区",all:"全部",
   count:n=>`<b>${n}</b>家`,call:"电话",mapBtn:"导航",detail:"详情",
   sorts:{def:"默认",view:"浏览最多",like:"点赞最多",name:"名称"},
   empty:"没有符合条件的餐厅。<br>请更换关键词或筛选条件。",
   hint:"点击图钉查看店铺信息",
   foot:`内容整理自VisitBusan公开数据，可能与实际不符，到店前请确认营业时间·休息日。中文模式下店铺详情以英文显示。<br>菜系为自动分类 · 地图 © OpenStreetMap·CARTO · 更新 2026-05-31`}};

const state={q:"",cat:"전체",gu:"전체",sort:"def",view:"list",
  lang:(()=>{const s=localStorage.getItem("bf_lang");if(s)return s;const n=(navigator.language||"ko").slice(0,2);return ["en","ja","zh"].includes(n)?n:"ko"})()};

// 다국어 텍스트 선택: zh는 en으로 폴백, en/ja 없으면 ko
function tr(o){if(!o)return "";const L=state.lang;if(L==="zh")return o.en||o.ko||"";return o[L]||o.en||o.ko||""}
function catName(k){return (CAT_I18N[k]||{})[state.lang]||k}
function guName(k){return (GU_I18N[k]||{})[state.lang]||k}
function U(){return UI[state.lang]}

const PIN='<svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.3-7-11a7 7 0 0114 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg>';
const CLK='<svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
const FORK='<svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v7a2 2 0 002 2 2 2 0 002-2V3M7 12v9M17 3c-1.5 0-2.5 2-2.5 5s1 4 2.5 4v9"/></svg>';
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const norm=s=>(s||"").toLowerCase().replace(/\s+/g,"");

function tally(key){const m=new Map();DATA.forEach(r=>m.set(r[key],(m.get(r[key])||0)+1));return [...m.entries()].sort((a,b)=>b[1]-a[1])}

function buildChips(elId,key,stateKey,nameFn){
  const el=document.getElementById(elId);
  const label=key==="c"?U().catLabel:U().guLabel;
  let h=`<span class="chiplabel">${label}</span><button class="chip${state[stateKey]==="전체"?" on":""}" data-v="전체">${U().all}<i class="ct">${DATA.length}</i></button>`;
  tally(key).forEach(([v,n])=>h+=`<button class="chip${state[stateKey]===v?" on":""}" data-v="${esc(v)}">${esc(nameFn(v))}<i class="ct">${n}</i></button>`);
  el.innerHTML=h;
  el.onclick=e=>{const b=e.target.closest(".chip");if(!b)return;state[stateKey]=b.dataset.v;[...el.children].forEach(c=>c.classList&&c.classList.toggle("on",c===b));render()};
}

function filtered(){
  const q=norm(state.q);
  let list=DATA.filter(r=>{
    if(state.cat!=="전체"&&r.c!==state.cat)return false;
    if(state.gu!=="전체"&&r.g!==state.gu)return false;
    if(q){const hay=norm(tr(r.n)+tr(r.m)+tr(r.a)+r.g+r.c+(r.n.ko||"")+(r.n.en||""));if(!hay.includes(q))return false}
    return true;
  });
  const s=state.sort;
  if(s==="view")list=[...list].sort((a,b)=>b.v-a.v);
  else if(s==="like")list=[...list].sort((a,b)=>b.l-a.l);
  else if(s==="name")list=[...list].sort((a,b)=>tr(a.n).localeCompare(tr(b.n),state.lang==="zh"?"zh":state.lang));
  return list;
}

function card(r){
  const col=CAT_COLORS[r.c]||"#7a8896";
  const menu=tr(r.m).split("\n").filter(Boolean).join(" · ");
  const cls=esc((tr(r.x)||"").trim()), hrs=esc(tr(r.h));
  const closedTxt=cls&&!/^(연중무휴|연중 무휴|Open (365|every))/i.test(cls)?" · "+cls:"";
  const tel=(r.p||"").replace(/[^0-9+]/g,"");
  const mapq=encodeURIComponent(tr(r.n)+" "+r.g);
  const img=r.t?`<img loading="lazy" src="${esc(r.t)}" alt="${esc(tr(r.n))}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="ph" style="display:none">🍽️</div>`:`<div class="ph">🍽️</div>`;
  return `<article class="card"><div class="thumb">${img}<span class="badge" style="background:${col}">${esc(catName(r.c))}</span><span class="gbadge">${esc(guName(r.g))}</span></div>
  <div class="body"><a class="name" href="${esc(r.u)}" target="_blank" rel="noopener">${esc(tr(r.n))}</a>
  ${menu?`<div class="menu">${FORK}<span>${esc(menu)}</span></div>`:""}
  <div class="row">${PIN}<span>${esc(tr(r.a))}</span></div>
  ${hrs?`<div class="row">${CLK}<span>${hrs}${closedTxt}</span></div>`:""}
  ${tr(r.d)?`<div class="desc">${esc(tr(r.d))}</div>`:""}
  <div class="stat">👁 ${r.v.toLocaleString()} &nbsp; ♥ ${r.l}</div>
  <div class="acts">${tel?`<a class="act call" href="tel:${tel}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3 19.5 19.5 0 01-6-6 19.8 19.8 0 01-3-8.6A2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.5 2.1L8 9.6a16 16 0 006 6l1.2-1.2a2 2 0 012.1-.5c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z"/></svg>${U().call}</a>`:""}
  <a class="act" href="https://map.kakao.com/?q=${mapq}" target="_blank" rel="noopener">${PIN.replace('class="ic" ','')}${U().mapBtn}</a>
  <a class="act" href="${esc(r.u)}" target="_blank" rel="noopener">${U().detail}</a></div></div></article>`;
}

/* ── 지도 ── */
let map,cluster,mapReady=false;
function initMap(){
  if(mapReady)return;
  map=L.map("map",{zoomControl:true,attributionControl:true}).setView([35.16,129.07],11);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/">CARTO</a>',
    subdomains:"abcd",maxZoom:19}).addTo(map);
  cluster=L.markerClusterGroup({maxClusterRadius:48,spiderfyOnMaxZoom:true,showCoverageOnHover:false});
  map.addLayer(cluster);
  mapReady=true;
}
function popHtml(r){
  const tel=(r.p||"").replace(/[^0-9+]/g,"");
  const menu=tr(r.m).split("\n").filter(Boolean).join(" · ");
  const mapq=encodeURIComponent(tr(r.n)+" "+r.g);
  return `<div class="pop">${r.t?`<img class="pimg" src="${esc(r.t)}" alt="" onerror="this.style.display='none'">`:""}
  <div class="pbody"><div class="pn">${esc(tr(r.n))}</div>
  ${menu?`<div class="pm">${esc(menu)}</div>`:""}
  <div class="pa">${esc(catName(r.c))} · ${esc(guName(r.g))}<br>${esc(tr(r.a))}</div>
  <div class="pacts">${tel?`<a class="call" href="tel:${tel}">${U().call}</a>`:""}<a href="https://map.kakao.com/?q=${mapq}" target="_blank" rel="noopener">${U().mapBtn}</a><a href="${esc(r.u)}" target="_blank" rel="noopener">${U().detail}</a></div></div></div>`;
}
function renderMap(list){
  initMap();cluster.clearLayers();
  const ms=[];
  list.forEach(r=>{
    if(r.lat==null||r.lng==null)return;
    const col=CAT_COLORS[r.c]||"#7a8896";
    const m=L.marker([r.lat,r.lng],{icon:L.divIcon({className:"",html:`<div class="mk" style="background:${col}"></div>`,iconSize:[16,16],iconAnchor:[8,15],popupAnchor:[0,-14]})});
    m.bindPopup(popHtml(r),{closeButton:true});
    ms.push(m);
  });
  cluster.addLayers(ms);
  setTimeout(()=>map.invalidateSize(),60);
  if(list.length){try{cluster.getBounds().isValid()&&map.fitBounds(cluster.getBounds().pad(.12),{maxZoom:14})}catch(e){}}
}

function render(){
  const list=filtered();
  document.getElementById("count").innerHTML=U().count(list.length);
  if(state.view==="map"){renderMap(list);}
  else{
    const g=document.getElementById("grid");
    g.innerHTML=list.length?list.map(card).join(""):`<div class="empty"><div class="em">🔍</div><p>${U().empty}</p></div>`;
  }
}

/* ── 언어/뷰 적용 ── */
function setToolsH(){document.documentElement.style.setProperty("--toolsH",(document.querySelector(".tools").offsetHeight+document.querySelector(".hero").offsetHeight)+"px")}
function applyLang(){
  const u=U();document.documentElement.lang=state.lang;
  document.getElementById("brand").textContent=u.brand;
  document.getElementById("subtitle").textContent=u.sub(DATA.length);
  document.getElementById("src").innerHTML=u.src;
  document.getElementById("q").placeholder=u.search;
  document.querySelector(".vlist").textContent=u.list;
  document.querySelector(".vmap").textContent=u.map;
  document.getElementById("footer").innerHTML=u.foot;
  document.getElementById("maphint").innerHTML=u.hint;
  const sel=document.getElementById("sort");sel.innerHTML=Object.entries(u.sorts).map(([k,v])=>`<option value="${k}"${state.sort===k?" selected":""}>${v}</option>`).join("");
  document.querySelectorAll("#langs button").forEach(b=>b.classList.toggle("on",b.dataset.l===state.lang));
  buildChips("cats","c","cat",catName);
  buildChips("gus","g","gu",guName);
  render();setToolsH();
}

function setView(v){
  state.view=v;
  document.querySelectorAll("#viewtog button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  document.getElementById("grid").classList.toggle("hidden",v==="map");
  document.getElementById("map").classList.toggle("show",v==="map");
  document.getElementById("top").classList.toggle("show",false);
  render();
  if(v==="map"){const h=document.getElementById("maphint");h.classList.add("show");setTimeout(()=>h.classList.remove("show"),2600)}
}

// 이벤트
let t;document.getElementById("q").addEventListener("input",e=>{clearTimeout(t);state.q=e.target.value;t=setTimeout(render,120)});
document.getElementById("sort").addEventListener("change",e=>{state.sort=e.target.value;render()});
document.getElementById("viewtog").addEventListener("click",e=>{const b=e.target.closest("button");if(b)setView(b.dataset.v)});
document.getElementById("langs").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;state.lang=b.dataset.l;localStorage.setItem("bf_lang",state.lang);applyLang()});
const topBtn=document.getElementById("top");
addEventListener("scroll",()=>topBtn.classList.toggle("show",state.view==="list"&&scrollY>600),{passive:true});
topBtn.addEventListener("click",()=>scrollTo({top:0,behavior:"smooth"}));
addEventListener("resize",setToolsH);

applyLang();
</script>
</body>
</html>
