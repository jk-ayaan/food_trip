hest of seafood that even those who don’t know much about ingredients can tell how fresh they are. When the seafood is almost ready, they add a live octopus before serving.","ja":"海鮮鍋すなわち「ヘムルタン」は、元々ボリュームたっぷりのシーフード料理だ が、この店の海鮮鍋は誰もが新鮮だとわかるような魚介類が、蓋が閉まらない ほどたくさん入っている。火が通ったのを見計らって、活きたタコ「ナクチ」を入 れてくれる。"},"c":"해산물·회","g":"연제구","p":"051-758-8838","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819103408604_thumbL","lat":35.182316,"lng":129.10692,"v":6664,"l":31,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=929&lang_cd=ko"},{"n":{"ko":"옻바다전복삼계탕","en":"Otbada Jeonbok Samgyetang","ja":"オッパダアワビ蔘鶏湯"},"m":{"ko":"옻삼계탕, 삼계탕","en":"Chicken Soup with Lacquer Tree Chips, Samgyetang","ja":"漆サムゲタン、サムゲタン"},"a":{"ko":"부산 연제구 월드컵대로 119번길 16","en":"16, World cup-daero 119beon-gil, Yeonje-gu","ja":"釜山広域市蓮堤区ワールドカップ通り119番ギル16"},"h":{"ko":"am 10:00 ~ pm 22:00","en":"am 10:00 ~ pm 22:00","ja":"am 10:00 ~ pm 22:00"},"x":{"ko":"3월~5월. 9월~11월 첫째,셋째 일요일 휴무","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"연산동 중심가골목에 위치한 삼계탕전문점으로, 대표적인 보양음식인 옻나무삼계탕에 전복을 추가하여 먹을 수 있는 것이 특징이다. 식전주로 옻술이 제공되는 이 곳은 TV프로그램에도 소개 된 유명한 식당이다.","en":"The restaurant specializes in samgyetang(chicken soup) and serves onnamu samgyetang (chicken soup with lacquer tree chips), one of the most popular dishes for stamina, with sea abalone. Lacquer tree wine is also offered as an aperitif. This famous restaurant was also featured on TV shows.","ja":"蓮山洞中心部の路地にある参鶏湯専門店で、代表的なスタミナ食である漆サムゲタン (蔘鶏湯)にアワビも追加できるのが特徴。食前酒として漆酒が提供される。テレビ番組 でも紹介された有名なレストラン。"},"c":"해산물·회","g":"연제구","p":"051-862-3307","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819105118416_thumbL","lat":35.18473,"lng":129.08128,"v":6233,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=933&lang_cd=ko"},{"n":{"ko":"팔미초밥","en":"Palmi Chobap","ja":"パルミ寿司"},"m":{"ko":"생선초밥, 코스요리","en":"Sushi, Course meal","ja":"寿司、コース料理"},"a":{"ko":"부산 연제구 월드컵대로 119번길 8","en":"8, World cup-daero 119beon-gil, Yeonje-gu","ja":"釜山広域市蓮堤区ワールドカップ通り119番ギル8"},"h":{"ko":"11:30 -22:00\n(15:00-16:30 브레이크 타임)","en":"11:30 -22:00 \n(Break time 15:00-16:30)","ja":"11:30-22:00\n(15:00-16:30休憩時間)"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"부산의 대표적인 일식전문점 중 한 곳으로, 상업지역인 이 지역에서도 손님을 대접하기 좋은 곳으로 유명한 식당이다. 30년 경력의 오너쉐프가 운영하고 있으며, 이 곳의 코스요리는 가격에 비해 높은 만족도를 자랑한다.","en":"This restaurant is one of Busan’s best-known Japanese food restaurants, a great place for serving guests in the commercial area. It is run by an owner-chef with 30 years of experience, and the course meals at this restaurant are satisfying compared to the price.","ja":"釜山の代表的な日本料理専門店の一つで、オフィス街だけに、ゲストをもてなす時に も最適な場所としても有名だ。30年以上のオーナーシェフが営んでおり、コース料理 は値段の割に満足度が高い。"},"c":"일식","g":"연제구","p":"051-861-7679","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819110257649_thumbL","lat":35.184906,"lng":129.0818,"v":6312,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=936&lang_cd=ko"},{"n":{"ko":"다리집 본점","en":"Darijip","ja":"タリジプ"},"m":{"ko":"떡볶이, A세트","en":"Ddeokboki, A set","ja":"トッポッキ, Aセット"},"a":{"ko":"수영구 남천바다로10번길 70 101호","en":"No. 101, 70, Namcheonbada-ro 10beon-gil, Suyeong-gu","ja":"水営区 南川パダ路 10番キル 70 101号"},"h":{"ko":"11:30–21:00 (20:30 라스트오더)","en":"11:30–21:00 (20:30 Last order)","ja":"11:30–21:00 (20:30 ラストオーダー)"},"x":{"ko":"화요일 휴무","en":"Closed on Tuesdays","ja":"火曜休み"},"d":{"ko":"부산에서 가장 유명한 떡볶이 전문점 중 한 곳으로, 포장마차 장사를 하던 시절에\n손님들의 다리만 밖에서 보인다하여 다리집이라 불리게 된 이곳은\n한 개만 먹어도 배가 부를 것 같은, 큼직한 떡볶이와 오징어튀김이 유명하다.","en":"It is one of the most famous tteokbokki joints in Busan. Back when it was a pojangmacha\n(street food vendor), only the legs of customers were seen from the outside; hence it earned\nthe name “house of legs (Darijip).” They are especially known for huge sizes of tteokbokki\nand fried squid—just one piece is enough to make you full.","ja":"釜山で有名なトッポッキ専門店の一つで、屋台で商売をしていた頃に \nお客さんの足(タリ)だけが外から見えることから、タリチブと呼ばれるようになったこのお店は\n一本だけ食べてもお腹がいっぱいになりそうな大きめのトッポッキとイカの天ぷらが有名。"},"c":"분식·주점","g":"수영구","p":"051-625-0130","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819112147736_thumbL","lat":35.146637,"lng":129.11076,"v":7698,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=942&lang_cd=ko"},{"n":{"ko":"남촌","en":"Namchon","ja":"ナムチョン"},"m":{"ko":"흑돼지","en":"Whole black pork","ja":"黒豚"},"a":{"ko":"북구 금곡대로8번길 14","en":"14, Geumgok-daero 8beon-gil, Buk-gu","ja":"北区金谷通り8番ギル14"},"h":{"ko":"10:00-22:00","en":"10:00-22:00","ja":"10:00-22:00"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"청정지역인 지리산 아래 산청의 흑돼지만 사용하고 있는 믿을 수 있는 돼지구이전문점이다.\n사용되는 흑돼지 자체가 일반적인 돼지고기와 식감과 맛의 차이가 많이 나며,\n껍데기가 붙어 있는 오겹살 흑돼지 고기를 쓰는 것이 특징이다.","en":"It is a pork specialty shop that uses only black pork from the clean area below Jiri Mountain.\nThe black pork they serve has an entirely different texture and taste from the usual pork.\nThey are known for using 5-layered black pork belly with the rind.","ja":"清浄地域と言われる智異山の麓、山清の黒豚のみを使用している焼豚専門店。使用されている黒\n豚は一般的な豚肉と食感や味が確かに違う。皮までついた五枚肉「オギョプサル」を使用するの\nが特徴といえる。"},"c":"고기·구이","g":"북구","p":"051-335-9294","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417155301384_thumbL","lat":35.21074,"lng":129.00595,"v":5645,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=944&lang_cd=ko"},{"n":{"ko":"북경의 자전거","en":"Beijing Bicycle","ja":"北京の自転車"},"m":{"ko":"짜장면, 탕수육","en":"JJjajangmyeon, Sweet and sour pork","ja":"ジャージャー麺, 酢豚(タンスユク)"},"a":{"ko":"부산광역시 북구 용당로5번길 14","en":"14, Yongdang-ro 5beon-gil, Buk-gu","ja":"釜山北区龍塘路5番キル14"},"h":{"ko":"11:30-22:30\n(21:30 라스트 오더)","en":"11:30-22:30 \n(Last order 21:30)","ja":"11:30-22:30\n(21:30ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"본격적인 중국풍의 인테리어가 특색있는 이 중식당은 중국인 쉐프들이 요리하고 있는 것으로 유명하다. 사용되는 면은 전통방식인 수타로 만들고, 다양하고 많은 종류의 요리들을 만드는 단골 손님이 많은 가게이다.","en":"This Chinese restaurant features authentic Chinese-style interior, with dishes prepared by Chinese chefs. The noodles are made by traditional hand-pulling method, and with a variety of dishes, many regulars frequent this place.","ja":"本格的な中国風のインテリアが特徴のこのレストランは、中国人シェフが調理 していることで有名。使用されている麺は、伝統的な手打ち式で作られている。 多くのメニューがあり、常連客も多い。"},"c":"중식","g":"북구","p":"051-902-8282","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200820091146813_thumbL","lat":35.230934,"lng":129.00957,"v":8095,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=949&lang_cd=ko"},{"n":{"ko":"광안리 언양불고기부산집","en":"Gwangalli Eonyang Bulgogi Busanjip","ja":"広安里オンヤンプルコギ 釜山店"},"m":{"ko":"언양불고기(200g) ￦35,000","en":"Eonyang Bulgogi(200g) ￦35,000","ja":"オンヤンプルコギ ￦35,000"},"a":{"ko":"부산 수영구 남천바다로 32","en":"32, Namcheonbada-ro, Suyeong-gu","ja":"釜山広域市水営区南川パダ路32"},"h":{"ko":"11:00-21:30","en":"11:00-21:30","ja":"11:00-21:30"},"x":{"ko":"연중무휴","en":"Open every day","ja":"年中無休"},"d":{"ko":"30여 년 전통의 광안리 언양불고기집으로, 엄선된 100% 한우암소와 직접 재배한 유기농 농작물을 사용한다. 큰 설명이 필요치 않은 식당 중 한 곳이다.","en":"This 30-year-old Gwangalli Eonyang Bulgogi restaurant uses carefully selected 100%Korean beef cows and home-grown organic produce.\nThis is one of those restaurants that doesn’t need much introduction.","ja":"30年以上の伝統がある広安里オンヤンプルコ\nギ店で、厳選された100%韓牛雌牛と自ら栽培\nした有機農作物を使用する。説明を必要としな\nい有名店の一つ。"},"c":"고기·구이","g":"수영구","p":"051-754-1004","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418102343022_thumbL","lat":35.1479,"lng":129.11357,"v":10568,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=950&lang_cd=ko"},{"n":{"ko":"식당 3선 덕천점","en":"Sikdang Samseon","ja":"食堂3選徳川店"},"m":{"ko":"양념돼지갈비(330g), 고추장돼지갈비(330g)","en":"Seasoned pork ribs, Gochujang pork ribs","ja":"味付け豚カルビ、コチュジャン豚カルビ"},"a":{"ko":"부산 북구 금곡대로 112","en":"112, Geumgok-daero, Buk-gu","ja":"釜山広域市北区金谷通り112"},"h":{"ko":"am 11:00 ~ pm 22:00\n(21:00 라스트오더)","en":"am 11:00 ~ pm 22:00\n(21:00 Last order)","ja":"am 11:00 ~ pm 22:00\n(21:00 ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"숯불구이, 파삼겹구이, 밀면 등을 맛볼 수 있는 식당인 이곳은 나이와 취향에 관계없이 즐길 수있는 대중적인 맛이 특징으로, 넓은 공간을 가지고 있어 가족외식장소로 인기 있다. 메인요리인 숯불구이는 조리되어 제공되어서 먹기 편하다.","en":"This restaurant serves charcoal-grilled meat, green onion with pork belly, and wheat noodles. It has a large space and is popular as a place for family dining. The main dish is charcoal-grilled meat, which is convenient to eat as they serve them cooked.","ja":"炭火焼き、ネギサムギョプ焼き、小麦麺などを味わうことができる。老若男女・年齢に関 わらず楽しむことができる大衆的な味わいが特徴。広々としいるので、家族連れでの外 食にも人気がある。メイン料理の炭火焼きは、調理された状態で提供され、食べやすい。"},"c":"고기·구이","g":"북구","p":"051-333-0050","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819154140644_thumbL","lat":35.21927,"lng":129.00708,"v":10681,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=953&lang_cd=ko"},{"n":{"ko":"함경면옥 덕천점","en":"Hamgyeong Myeonok","ja":"咸鏡麺屋"},"m":{"ko":"물냉면, 회비빔면","en":"Mulnangmyeon, bibimnangmyeon","ja":"水冷麺、刺身ビビン麺"},"a":{"ko":"부산 북구 금곡대로 21","en":"21, Geumgok-daero, Buk-gu","ja":"釜山広域市北区金谷通り21"},"h":{"ko":"11:00-21:00\n(20:30 라스트 오더)","en":"11:00-21:00\n(Last order 20:30)","ja":"am 11:00 ~ pm 21:20"},"x":{"ko":"매주 월요일 휴무","en":"Closed every other Monday","ja":"名節（旧正月・秋夕）"},"d":{"ko":"22년의 전통을 가지고 있는 함흥냉면 전문점으로, 메뉴에 들어가는 모든 재료들을 직접 만든다. 고구마 전분 특유의 탄력과 쫄깃함을 가진 함흥식 냉면 사리가 특징이며, 진한 육수가 맛있는 물냉면과 숙성된 가오리 회가 올라가는 회비빔면이 인기메뉴이다.","en":"This is a restaurant specializing in Hamheung naengmyeon with 22 years of tradition. Known for their signature Hamheung style of chewy noodles made of sweet potato starch, mulnaengmyeon with rich soup stock and hoe bibimmyeon topped fermented stingray hoe are the most popular dishes.","ja":"22年の伝統がある咸興冷麺専門店で、メニューに使われる食材は全て手作り。サツ マイモの澱粉特有の弾力とコシがある咸興冷麺が特徴であり、濃厚なスープがおい しい水冷麺と、熟成されたエイの刺身が特に美味しい刺身ビビン麺が人気メニュー。"},"c":"해산물·회","g":"북구","p":"0507-1440-5034","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200820091029413_thumbL","lat":35.21178,"lng":129.00423,"v":6937,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=958&lang_cd=ko"},{"n":{"ko":"홍옥당","en":"Hongokdang","ja":"ホンオッタン"},"m":{"ko":"단팥빵, 단팥죽","en":"Red Bean bun, Sweet Red Bean Porridge","ja":"あんパン 、小豆粥"},"a":{"ko":"부산 수영구 남천동로 108번길 49","en":"49, Namcheondong-ro 108beon-gil, Suyeong-gu","ja":"釜山広域市水営区南川東路108番ギル49"},"h":{"ko":"am 10:00 ~ pm 21:00","en":"am 10:00 ~ pm 21:00","ja":"am 10:00 ~ pm 21:00"},"x":{"ko":"","en":"","ja":""},"d":{"ko":"광안리해수욕장 앞 골목길에 위치한 아담한 이 가게는 국산 팥만을 사용하여 음식들을 만드는 팥전문점이다. 팥빙수와 단팥죽, 단팥빵이 유명한데,\n특히 단팥빵의 인기가 높아 빵을 사가려는 사람들의 줄이 길게 늘어서곤 한다.","en":"This small shop is located in an alley in front of Gwangalli Beach. It is a specialty store that uses only domestic red beans for its creations. It is famous for its red bean shaved ice, red bean porridge, and red bean buns. The buns are so popular that you often see long lines of customers who want to purchase them.","ja":"広安里海水浴場の前の路地に位置するこぢんまりとした店。韓国産の小豆だけを使用する小豆の専門店だ。小豆氷や小豆粥、あんパンが有名で特に人気が高く、パンを買おうとする人で長蛇の列ができる。"},"c":"카페·베이커리","g":"수영구","p":"051-627-1026","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230531122205481_thumbL","lat":35.146893,"lng":129.11392,"v":6324,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=959&lang_cd=ko"},{"n":{"ko":"디에이블 부산송도점","en":"The 8ble Songdo Branch","ja":"ディエイブル松島店"},"m":{"ko":"디에이블 파스타, 디에이블 피자","en":"The 8ble Pasta, The 8ble Pizza","ja":"ディエイブルパスタ, ディエイブルピザ"},"a":{"ko":"부산 서구 충무대로 47 3층","en":"3F, 47, Chungmu-daero 34beon-gil, Seo-gu","ja":"釜山広域市西区忠武通り34番ギル47 3階"},"h":{"ko":"11:00-22:00\n(21:20 라스트 오더)","en":"11:00-22:00 \n(Last order 21:20)","ja":"11:00-22:00\n(21:20ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"유명한 양식레스토랑인 디에이블의 분점으로, 가게 전체에서 보이는 멋진 바다풍경 속에서 특별한 식사를 할 수 있는 곳이다. 시그니처 메뉴인 피자는 페스츄리 도우를 사용해 촉촉한 것이 특징이며, 특제소스를 사용해 매콤하면서 고소한 파스타도 인기 있다.","en":"This is the branch of the famous Western restaurant, The 8ble, where you can enjoy a special meal in the beautiful ocean view anywhere from the inside. The signature pizza is characterized by moist dough, and the spicy and aromatic pasta made with their special sauce is also popular.","ja":"有名な洋食レストランであるディエイブルのチェーン店で、素敵な海の景色を楽しみ ながら特別な食事ができるところだ。 看板メニューのピザはペイストリー生地を使用し、しっとりとしている。特製ソースでス パイシーでありながら香ばしいパスタも人気。"},"c":"양식·세계요리","g":"서구","p":"0507-1433-9177","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819132345743_thumbL","lat":35.076706,"lng":129.01715,"v":9600,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=960&lang_cd=ko"},{"n":{"ko":"몽실종가돼지국밥 감천문화마을 본점","en":"Mongsil Jongga Dwaejigukbap","ja":"モンシル宗家テジクッパ"},"m":{"ko":"돼지국밥 ￦9,000\n수육 ￦24,000","en":"Pork Soup ￦9,000\nSteamed pork ￦24,000","ja":"テジクッパ ￦9,000\nゆで肉 ￦24,000"},"a":{"ko":"서구 까치고개로 197번길 3, 1층","en":"1F, 3, Kkachigogae-ro 197beon-gil, Seo-gu","ja":"西区 カチゴゲ路197番ギル3, 1階"},"h":{"ko":"09:00-20:00","en":"09:00-20:00","ja":"09:00-20:00 (19:40 ラストオーダー)"},"x":{"ko":"명절 휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"감천문화마을 근처에 있는 돼지국밥전문점으로, 청결한 실내와 친절한 점원들이 인상적이다.\n사골뼈를 24시간 이상 푹 고아 만든 국물이 유명하고, 국밥에 들어가는 고기양과 고기 종류를 \n선택할 수 있는 것이 특징이다.","en":"The restaurant is located near Gamcheon Culture Village. The interior is neat and friendly staff \nprovide memorable service. It is famous for the soup made from boiling beef broth for more than \n24 hours. You can choose the amount and the cut of meat to eat with the soup.","ja":"甘川文化村の近くにあるテジクッパ専門店で、清潔な室内と親切な店員が印象的だ。牛の骨を24時間\n以上じっくり煮込んだスープが有名で、クッパに入れる肉の量と種類を選択できるのが特徴だ。"},"c":"고기·구이","g":"서구","p":"051-256-0133","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417173451717_thumbL","lat":35.10019,"lng":129.01718,"v":9396,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=961&lang_cd=ko"},{"n":{"ko":"식당 토성동","en":"Sikdang Toseong-dong","ja":"食堂土城洞"},"m":{"ko":"한입 스테이크 덮밥, 돈카츠정식","en":"Bite-sized Steak Rice Bowl, Tonkatsu","ja":"一口ステーキ丼、とんかつ"},"a":{"ko":"부산 서구 구덕로 124번길 27","en":"27, Gudeok-ro 124beon-gil, Seo-gu","ja":"釜山広域市西区九徳路124番ギル27"},"h":{"ko":"월-금 10:00-20:30","en":"Monday-Friday 10:00-20:30","ja":"月曜日～金曜日10:00-20:30"},"x":{"ko":"토요일, 일요일","en":"Saturday, Sunday","ja":"土曜日、日曜日"},"d":{"ko":"의외의 장소에 자리하고 있는 아담하고 예쁜 인테리어의 덮밥전문점으로, 간단한 음식, 깔끔한 맛, 친절한 서비스로 유명한 곳이다. 모든 음식이 인기메뉴이긴 하지만, 손질과 숙성을 거쳐 부드러운 맛의 한입 스테이크 덮밥이 대표메뉴라고 한다.","en":"The petite, charming restaurant is located at an unexpected place, and is famous for its simple food, refreshing taste, and friendly service. Although all of the dishes are popular, the main menu is the bite-sized steak bowl with a mild taste through trimming and aging.","ja":"意外な場所にある小さく素敵なインテリアの丼物専門店。気軽に食べられるメニュ ーで、小綺麗で美味しく、スタッフの気の利いたサービスでも有名。 全てのメニューがみな評判が高いが、中でも下ごしらえ後、じっくり熟成させる柔ら かい「一口ステーキ丼」が看板メニューという。"},"c":"일식","g":"서구","p":"0507-1394-1425","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819133843312_thumbL","lat":35.097954,"lng":129.02257,"v":7154,"l":7,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=963&lang_cd=ko"},{"n":{"ko":"청죽","en":"Cheongjuk","ja":"青竹"},"m":{"ko":"스페셜코스, VIP코스","en":"Lunch Course, Dinner Course","ja":"ランチコース, ディナーコース"},"a":{"ko":"부산 서구 망양로 23","en":"23, Mangyang-ro, Seo-gu","ja":"釜山広域市西区望洋路23"},"h":{"ko":"am 11:00 ~ pm 22:00\n(20:30 라스트 오더)","en":"am 11:00 ~ pm 22:00\n(break time 15:00 ~ 16:30)","ja":"am 11:00 ~ pm 22:00\n(break time 15:00 ~ 16:30)"},"x":{"ko":"명절","en":"Traditional holidays","ja":"名節（旧正月・秋夕）"},"d":{"ko":"입구까지 이어진 근사한 정원이 멋진 일식코스요리전문점으로, 이 지역에서는 상견례 등격조 있는 모임의 장소로 많이 이용하는 곳이다. 비교적 비싼 가격의 식당이지만, 맛과 서비스 모두 충분히 만족스러운 곳이라고 한다. 일본식코스요리가 대표메뉴.","en":"With a beautiful garden that extends to the entrance, this Japanese restaurant specializes in course meals. It is a popular place for classy gatherings. Although it is relatively expensive, guests find it satisfying in both taste and service. Japanese courses are their main presentation.","ja":"入口まで続く素敵な庭園が印象的な、コース料理専門の日本料理店。この地域では 大切なお客様をもてなす時などによく利用されている。 値段は比較的高い方だが、味だけでなくサービスにおいても自信を持てる。日本式 コース料理が代表メニュー。"},"c":"한식·백반","g":"서구","p":"051-247-8555","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819134238418_thumbL","lat":35.11293,"lng":129.01305,"v":6963,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=964&lang_cd=ko"},{"n":{"ko":"편의방","en":"Pyeonuibang","ja":"便宜坊"},"m":{"ko":"삼선만두 ￦10,500\n군만두 ￦8,000","en":"Samseon dumplings ￦10,500\nGrilled dumplings ￦8,000","ja":"三聖餃子 ￦10,500\n焼き餃子 ￦8,000"},"a":{"ko":"서구 대신공원로 13-5","en":"13, Daesingongwon-ro, Seo-gu","ja":"西区大新公園路13-5"},"h":{"ko":"11:00-15:30 / 16:30-21:00","en":"11:00-15:30 / 16:30-21:00","ja":"11:00-15:30 / 16:30-21:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜休み"},"d":{"ko":"빨간 간판이 눈에 띄는 이곳은 3대째 이어오는 중국만두전문점으로, \n하루에 40인분 한정에, 30분 전에 미리 전화로 주문해야 한다는 삼선만두가 유명한 곳이다.\n주문과 동시에 만드는 삼선만두는 각종야채와 새우가 가득 차 육즙이 흘러넘친다.","en":"Flashing a striking red signboard, Pyeonuibang is a Chinese dumpling shop operated by \nthe third generation of owners. It is famous for samseon dumplings, which are limited to 40 \nservings per day, and must be ordered by phone 30 minutes in advance. Made at the time of \norder, juicy samseon dumplings are filled with various vegetables and prawns.","ja":"赤い看板が目立つ、3代続く中国餃子専門店。1日に40人前限定で、30分前に電話で注文しなけ\nればならないという三聖餃子が有名。注文を受けてから作る三聖餃子は各種野菜とエビがたく\nさん入っていて、食べると肉汁がこぼれるほどだ。"},"c":"중식","g":"서구","p":"051-256-2121","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418091306849_thumbL","lat":35.11915,"lng":129.01625,"v":7998,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=965&lang_cd=ko"},{"n":{"ko":"동원장수촌","en":"Dongwon Jangsuchon","ja":"トンウォン長寿村"},"m":{"ko":"녹두한방백숙, 능이백숙","en":"Herbal Duck Soup with Mung Beans, Chicken Soup with Neungi Mushroom","ja":"緑豆韓方水炊き, ヌンイ水炊き"},"a":{"ko":"사하구 동매로 117 건우리안 상가 B 201호","en":"#201, B, 117, Dongmae-ro, Saha-gu","ja":"沙下区ドンメ路 117B 201号"},"h":{"ko":"평일: 11:20-15:00 / 16:30-21:20\n주말: 11:20-21:20","en":"Tuesday-Friday 11:30-21:20","ja":"火曜日～金曜日：11:30-21:20"},"x":{"ko":"화요일 휴무","en":"Closed on Mondays","ja":"月曜日"},"d":{"ko":"도자기 장인이 빚어낸 둥그런 뚝배기에 음식을 담아내는 보양음식전문점으로,\n모임 등의 장소로도 인기 있는 곳. 녹두한방백숙이 특히 인기 있는 메뉴로\n황기, 구기자, 감초 등의 한약재와 녹두오리를 오래 삶아 보약 같은 국물과 부드러운 고기가 특징이다.","en":"This is a restaurant specializing in stamina cuisine, served in an earthen pot called\nddukbaegi made by master potters. It is also a popular place for group gatherings.\nHanbang nokdu baeksuk (herbal duck soup with mung beans) is a particularly popular dish. It\nfeatures medicinal herbs such as milk vetch roots, matrimony vine, and licorice, as well as mung\nbeans and duck boiled for a long time. The soup and the meat are deeply nourishing.","ja":"陶芸家が焼いた素敵な丸い器に料理を盛り付ける補養食専門店。宴会などの各種集まりにも人気が\nある。韓方緑豆水炊き「ハンバンノクトゥペクス」が特に人気で、キバナオウギやクコ、甘草などの韓薬\n剤で、緑豆アヒルを長時間煮込んだ補薬(漢方薬)のようなスープと柔らかい肉が絶品。"},"c":"고기·구이","g":"사하구","p":"051-202-4100","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607132213312_thumbL","lat":35.10194,"lng":128.97113,"v":6762,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=966&lang_cd=ko"},{"n":{"ko":"포항가자미물회국수말이전문점","en":"Pohang Gajami Mulhoe","ja":"浦項カジャミムルフェ"},"m":{"ko":"여름물회, 겨울물회","en":"Summer Mulhoe, Winter Mulhoe","ja":"夏の刺身の冷たいスープ, 冬の刺身の冷たいスープ"},"a":{"ko":"부산광역시 사상구 사상로 275-1","en":"275-1, Sasang-ro","ja":"沙上路275-1"},"h":{"ko":"화-금 : 11:30-20:00\n(15:00-17:00 브레이크 타임)\n(19:30 라스트 오더)","en":"Tuesday-Friday 11:30-20:00 \n(Break time 15:00-17:00) \n(Last order 19:30)","ja":"火曜日～金曜日：11:30-20:00\n(15:00-17:00休憩時間)\n(19:30ラストオーダー)"},"x":{"ko":"월요일","en":"Mondays","ja":"月曜日"},"d":{"ko":"소박한 느낌의 동네식당으로, 시원한 물회에 국수를 말아먹는 것으로 유명한 물회전문점이다. 갖은 양념에 무쳐진 회와 물회 육수가 따로 제공되며, 여름에는 신선한 토마토에 싸먹고 겨울에는 김에 싸먹는 것으로 유명한 곳이다.","en":"It is a simple neighborhood restaurant, and is famous for mulhoe, or noodles and hoe in cold soup. Hoe and broth seasoned with various sauces are served separately. It’s delicious to eat fish with fresh tomatoes in summer and seaweed in winter.","ja":"素朴な雰囲気のお店で、冷たいムルフェ(刺身のスープ)に麺を入れて食べることで有名なムルフェ専門店。 あらゆる調味料で和えた刺身と刺身の出汁が別々に提供され、夏には新鮮なトマトに包んで食べ、冬にはのりで包んで食べるのが特徴的だ。"},"c":"해산물·회","g":"사상구","p":"051-303-6640","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819143114772_thumbL","lat":35.169525,"lng":128.98228,"v":6643,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=969&lang_cd=ko"},{"n":{"ko":"괘법쭈꾸미전문점","en":"Gwaebeop Jjukkumi","ja":"掛法チュックミ"},"m":{"ko":"웰빙쭈꾸미","en":"Well-Being Jjukkumi (Webfoot Octopus)","ja":"ウェルビンチュックミ"},"a":{"ko":"부산 사상구 광장로81번길 33","en":"33, Gwangjang-ro 81beon-gil","ja":"広場路81番ギル33"},"h":{"ko":"11:30-23:00","en":"11:30-23:00","ja":"11:30-23:00"},"x":{"ko":"명절","en":"Traditional holidays","ja":"名節(旧正月·秋夕)"},"d":{"ko":"2007년 괘법동에서 시작한 이 지역의 대표적인 쭈꾸미요리전문점으로, 직접 만든 비법소스를 사용하여 매우면서도, 자꾸 먹게 되는 맛이 특징이다. 대표메뉴는 웰빙쭈꾸미이며, 단일메뉴로 꾸준한 맛을 유지 하고 있는 것이 오랜 인기의 비결이다.","en":"This is one of the most popular restaurants specializing in webfoot octopus dishes in the region, which started in Gwaebeop-dong in 2007. It uses secret homemade sauce that creates this deliciously spicy flavor that you will crave again and again. The signature item is Well-Being Jjukkumi. Their secret to longstanding popularity is maintaining the quality of that single dish.","ja":"2007年に掛法洞で営業し始めたこの地域の代表的なチュックミ(イイダコ)料理専門店。手作りのビビンソースを使って、辛いがなぜか食べてしまう味が特徴的だ。 代表メニューはウェルビンチュックミで、このメニュー１つをずっと変わらず守ってきたことが長年の人気の秘訣。"},"c":"한식·백반","g":"사상구","p":"051-323-1383","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20200819161305335_thumbL","lat":35.163906,"lng":128.98459,"v":6473,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=974&lang_cd=ko"},{"n":{"ko":"삼진어묵 본점","en":"","ja":""},"m":{"ko":"","en":"","ja":""},"a":{"ko":"부산시 영도구 태종로99번길 36","en":"","ja":""},"h":{"ko":"09:00~19:00","en":"","ja":""},"x":{"ko":"","en":"","ja":""},"d":{"ko":"삼진어묵은 1953년부터 3대 째 가억을 잇고있는 대한민국 대표 어묵 브랜드입니다.","en":"","ja":""},"c":"기타","g":"영도구","p":"051-715-5865","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210415134915004_thumbL","lat":35.092953,"lng":129.04279,"v":11183,"l":9,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1065&lang_cd=ko"},{"n":{"ko":"광명집","en":"Gwangmyeongjip","ja":"クァンミョンチプ"},"m":{"ko":"아귀찜 ￦40,000-60,000\n대구찜 ￦40,000-60,000","en":"Agujjim (Braised Monkfish), Daegujjim (Braised Codfish)","ja":"鮟鱇の蒸し煮 ￦40,000-60,000\nたらの頭の蒸し煮 ￦40,000-60,000"},"a":{"ko":"남구 신선로 458","en":"458, Sinseon-ro, Nam-gu","ja":"南区神仙路458"},"h":{"ko":"화-일 : 11:00-22:00","en":"Tuesday-Sunday 11:00-22:00 \n(Last order 21:00)","ja":"11:00-22:00"},"x":{"ko":"월요일, 명절 휴무","en":"Closed on Mondays and public holidays","ja":"月曜、名節休み"},"d":{"ko":"20년이 넘게 대를 이어 운영 중인 아귀찜/대구뽈찜 전문점으로\n신선하고 품질 좋은 재료들로 찜요리를 만들고 있다.\n대구뽈찜은 양파가 가득 올려 진 독특한 조리법이 사용되며, 두 가지 찜 요리가 모두 인기 있다","en":"For over twenty years, this restaurant has been operated by generations of family members. They specialize in braised monkfish and codfish dishes made with fresh and quality ingredients. For braised codfish heads, their unique cooking style adds heaps of onions on top. Both braised fish dishes are popular.","ja":"20年にわたり代を継いでいる「アグチム」(鮟鱇の蒸し煮)と「テグポルチム」(たらの頭の蒸し煮)の専門\n店で、新鮮で良質の食材で煮込み料理を作っている。たらの蒸し煮は玉ねぎがたくさん盛り付けられ\nる独特な方法で調理される。この二種類の蒸し料理が人気だ。"},"c":"한식·백반","g":"남구","p":"051-621-4376","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250515142651174_thumbL","lat":35.125664,"lng":129.10095,"v":5242,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1092&lang_cd=ko"},{"n":{"ko":"명지첫집 국제신도시본점","en":"Myeongjicheotjip","ja":"鳴旨チョッチブ"},"m":{"ko":"쭈꾸미보쌈, 보쌈정식 점심특선 2인","en":"Jjukkumi Bossam M (Webfoot Octopus with Steamed Pork), Lunch special: Bossam set meal for two","ja":"イイダコのポサム(M), ポサム定食 ランチ特選 2人前"},"a":{"ko":"강서구 명지국제6로232번길 18","en":"18, Myeongji Gukje 6-ro 232beon-gil, Gangseo-gu","ja":"江西区鳴旨国際6路232番ギル18"},"h":{"ko":"11:00-21:00\n(15:00-17:00 브레이크 타임)\n(20:30 라스트 오더)","en":"11:00-21:00 \n(Break time 15:00-17:00) \n(Last order 20:30)","ja":"11:00-21:00\n(15:00-17:00休憩時間)\n(20:30ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"기분이 좋아지는 푸짐한 한상차림의 보쌈정식과 쭈꾸미보쌈이 대표메뉴로\n명지를 상징하는 식재료인 소금과 대파를 활용한 젓갈과 대파김치를 보쌈요리에 곁들였다.","en":"The signature dishes are generous servings of bossam jeongsik (steamed pork set meal) and\njjukkumi bossam (spicy webfoot octopus and steamed pork).\nSide dishes include jeotgal (fish sauce) and green onion kimchi, each representing Myeongji’s\nspecialty ingredients: salt and green onion.","ja":"ボリュームがうれしいポサム定食やイイダコのポサムが代表メニューで\n鳴旨(ミョンジ)を象徴する食材である塩と長ネギを使った塩辛や長ネギキムチをポサム料理に添\nえて提供してくれる。"},"c":"한식·백반","g":"강서구","p":"0507-1348-9599","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230607165446819_thumbL","lat":35.095818,"lng":128.92444,"v":7339,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1094&lang_cd=ko"},{"n":{"ko":"명품외식 육면정","en":"Yukmyeonjeong","ja":"名品外食ユンミョンジョン"},"m":{"ko":"생진갈비살150g, 양념갈비300g, 갈비살양념구이250g","en":"Beef Ribs 150g, Marinated Ribs 300g, Marinated Ribs 250g","ja":"骨なし生カルビ, 味付けカルビ, 骨なし味付けカルビ焼き"},"a":{"ko":"남구 황령대로 329","en":"329, Hwangnyeong-daero, Nam-gu","ja":"釜山南区荒嶺大路329"},"h":{"ko":"11:30-21:50\n(20:50 라스트 오더)","en":"11:30-21:50\n(Last order 20:50)","ja":"11:30-21:50\n(20:50ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"다양한 연회석과 어린이 시설, 넓은 주차장을 가지고 있는 큰 규모의 구이전문식당으로 질 좋은 소고기와 신선한 야채들을 제공하고, 최고등급의 위생수준을 인증 받았다. 단체모임이나 가족외식하기 좋은 곳 이다.","en":"Yukmyeonjeong is a large restaurant specializing in Korean barbecue, with various banquet halls, facilities for children, and a spacious parking lot. They serve high-quality beef and fresh vegetables and are certified with top ratings in hygiene. It’s an excellent place for groups and families to dine out.","ja":"宴会場や子供向けのルーム、広い駐車場を備えた大規模な焼き肉専門店で、質\nの高い牛肉と新鮮な野菜を提供し衛生面においても最高レベルと承認された。 \n団体の集まりや家族での外食に最適と言える。"},"c":"고기·구이","g":"남구","p":"051-623-6667","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913100010495_thumbL","lat":35.148415,"lng":129.09482,"v":6473,"l":3,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1099&lang_cd=ko"},{"n":{"ko":"호포갈비 문현점","en":"Hopogalbi Munhyeon Branch","ja":"ホポカルビ　門峴店"},"m":{"ko":"고기, 호포갈비탕","en":"Meat, Hopo Rib Soup","ja":"1階で精肉(時価）を購入した場合、テーブルセッティング1名, ホポカルビスープ"},"a":{"ko":"남구 우암로 359","en":"359, Uam-ro, Nam-gu, Busan","ja":"南区牛岩路359"},"h":{"ko":"11:30-21:30\n(20:40 라스트 오더)","en":"11:30-21:30 \n(Last order 20:40)","ja":"11:30-21:30\n(20:40ラストオーダー)"},"x":{"ko":"설날, 추석 당일만 휴무","en":"Closed on the day of Seollal & Chuseok","ja":"旧正月・秋夕当日のみ休業"},"d":{"ko":"1층의 정육판매점에서 구입한 고기를 2층의 식당에서 구워먹는 방식의 식당으로,\n깔끔한 인테리어와 수준 높은 청결상태를 자랑한다.\n판매점에서는 질 좋은 육류를 취급하고 있으며, 다양한 부위의 한우를 직접 고를 수 있다","en":"Customers buy meat from the butcher on the first floor at this restaurant and bring it up to the\nsecond floor to grill and eat. It is known for the neat decor and cleanliness. The butcher section\nhas a wide selection of high-quality Hanwoo cuts for customers to choose from.","ja":"1階の精肉店で肉を購入し、2階のお店で焼いて食べることができる。すっきりとしたインテリアで清潔\n感のあるお店。販売店では上質の肉類を取り扱い、さまざまな部位の韓牛を直接選ぶことができる。"},"c":"고기·구이","g":"남구","p":"051-639-9200","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230601215049360_thumbL","lat":35.13401,"lng":129.06631,"v":7130,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1100&lang_cd=ko"},{"n":{"ko":"평산옥","en":"Pyeongsanok","ja":"ピョンサノク"},"m":{"ko":"수육, 국수, 열무국수","en":"Steamed Pork, Noodles, Yeolmu Guksu (Cold Noodles with Young Radish)(Summer only)","ja":"ゆで肉, 素麺, 大根の若菜入りキムチ素麺"},"a":{"ko":"동구 초량중로 26","en":"26, Choryangjung-ro, Dong-gu","ja":"釜山東区草梁中路26"},"h":{"ko":"am 10:00 ~ pm 20:00","en":"am 10:00 ~ pm 20:00","ja":"am 10:00 ~ pm 20:00"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"4대에 걸쳐 운영하고 있는 100년 전통의 돼지수육전문식당으로 돼지수육과 수육 삶은 육수에 말은 국수가 유명하다. 국내산 신선한 고기로 만드는 육수는 맑은 국물 색과 담백하지만 진한 맛을 낸다. 100년을 이어온 자부심에 어울리는 맛이다.","en":"Run by a family for four generations, this restaurant with a 100-year tradition is known for the steamed pork meats and noodles served with the soup from cooking meat. Made with fresh, domestic meat, the clear broth is nourishing and rich. The taste is nothing short of their longstanding history.","ja":"4代にわたって続いてきた100年の伝統を持つ老舗テジスユクという豚\nのゆで肉専門食堂。テジスユクとスープに入れて食べる「ククス」（麺）が\n有名だ。国産の新鮮な肉で作るスープは澄んでいて、さっぱりした深みの\nある味わい。100年間続く店としての誇りにふさわしい味だ。"},"c":"면·국물","g":"동구","p":"051-468-6255","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913104329974_thumbL","lat":35.114292,"lng":129.0371,"v":7419,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1104&lang_cd=ko"},{"n":{"ko":"공감식당","en":"Gonggamsikdang","ja":"コンガム食堂"},"m":{"ko":"선별숙성삼겹살130g, 선별숙성목살130g","en":"Select Aged Pork Belly 130g, Select Aged Pork Shoulder 130g","ja":"選別熟成サムギョプサル, 選別熟成モクサル（肩ロース）"},"a":{"ko":"부산진구 동평로 81","en":"81, Dongpyeong-ro, Busanjin-gu","ja":"釜山釜山鎮区東平路81"},"h":{"ko":"월-금 : 17:00-22:00\n(21:30 라스트 오더)\n토-일 : 11:30-22:00\n(15:00-17:00 브레이크 타임)\n(21:30 라스트 오더)","en":"Monday-Friday 17:00-22:00 \n(Last order 21:30) \nSaturday-Sunday 11:30-22:00 \n(Break time 15:00-17:00) \n(Last order 21:30)","ja":"月曜日～金曜日：17:00-22:00\n(21:30ラストオーダー)\n土曜日～日曜日：11:30-22:00\n(15:00-17:00休憩時間)\n(21:30ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"보리를 사료로 키운 돼지를 전문가가 직접 선별, 숙성하여 전문교육을 받은 직원들이 직접 구워주는 구이전문점으로, 삼겹살과 구워먹는 치즈가 이 곳의 인기메뉴이다. 다양한 사이드 메뉴도 준비되어 있다.","en":"Barley-fed pigs are selected and aged by specialists, then grilled by trained attendants at this Korean barbecue restaurant. Pork belly and cheese on the grill are their most popular items. You can also order a variety of side dishes.","ja":"大麦を飼料として与えた豚を専門家が選別している。肉は熟成させた後、専門教\n育を受けた従業員が丁寧に焼いてくれる焼き肉専門店。サムギョプサルと一緒に\n焼くチーズがこの店の人気メニュー。サイドメニューも豊富に用意されている。"},"c":"고기·구이","g":"부산진구","p":"051-891-2041","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913110103549_thumbL","lat":35.16551,"lng":129.03838,"v":4496,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1106&lang_cd=ko"},{"n":{"ko":"다옴 서면 삼정타워점","en":"Daom (Samjeong Tower Branch, Seomyeon)","ja":"タオム（西面サムジョンタワー店）"},"m":{"ko":"차돌박이비빔국수, 칼국수, 비빔밥","en":"Chadolbagi Bibimguksu (Mixed Noodles with Brisket), Kalguksu (Hand-cut Noodle Soup), Noodles, Bibimbap (Mixed Rice with Toppings)","ja":"牛のともばら肉のビビン素麺, カルグクス, 素麺, ビビンバ"},"a":{"ko":"부산진구 중앙대로 672, 삼정타워 5층","en":"5th floor, Samjeong Tower, 672, Jungang-daero, Busanjin-gu","ja":"釜山市釜山鎮区中央大路672、サムジョンタワー5階"},"h":{"ko":"매일 11:00~22:00","en":"Monday-Thursday, Sunday 11:00-22:00 \n(Last order 21:00) \nFriday-Saturday 11:00-22:30 \n(Last order 21:30)","ja":"月曜日～木曜日、日曜日：11:00-22:00\n(21:00ラストオーダー)\n金曜日～土曜日：11:00-22:30(ラストオーダー20:30頃)\n(21:30ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"가볍게 즐길 수 있는 한식메뉴를 선보이는 식당으로 남해안멸치로 만드는 육수와 과일을 첨가하여 만든 숙성양념 등 음식준비에 많은 정성을 들인다. 차돌박이가 토핑 된 비빔국수와 비빔밥이 대표메뉴이다.","en":"Daom presents a casual Korean dining experience. The food is prepared with special care, from their broth made of anchovies from the southern coast to aged marinade mixed with fruit. Bibimguksu (mixed noodles) topped with beef brisket and bibimbap (mixed rice) are their signature dishes.","ja":"気軽に楽しめる韓国料理を提供するお店で、南海岸のカタクチイワシの出汁や果\n物を煮込んだ熟成タレなど真心を込めて準備する。「チャドルバギ」（牛のともばら\n肉）がトッピングされた「ビビングクス」（ビビン素麺）とビビンバが代表メニュー。"},"c":"면·국물","g":"부산진구","p":"0507-1370-3778","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913110833421_thumbL","lat":35.152874,"lng":129.05957,"v":7656,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1107&lang_cd=ko"},{"n":{"ko":"당감밀면","en":"Danggammilmyeon","ja":"タンガムミルミョン"},"m":{"ko":"밀면, 비빔밀면, 손만두4개/8개, 손칼국수","en":"Milmyeon (Cold Wheat Noodle Soup), Bibimmilmyeon (Cold Mixed Wheat Noodles), Dumplings","ja":"ミルミョン, ビビンミルミョン, 手作り餃子4個, 8個, 手打ち麺"},"a":{"ko":"부산진구 당감로 5 삼익아파트상가 B동 1층","en":"B-1F, Samik Apt., 5, Danggam-ro, Busanjin-gu","ja":"釜山市釜山鎮区堂甘路5、 サムイクアパートサンガ B棟 1階"},"h":{"ko":"am 11:00 ~ pm 20:00\n19:30 (라스트오더)","en":"am 11:00 ~ pm 20:00\n19:30 (last order)","ja":"am 11:00 ~ pm 20:00\n19:30 (last order)"},"x":{"ko":"","en":"","ja":""},"d":{"ko":"지역민들이 추천하는 밀면전문점으로 육수와 면·양념에 이르기까지 모든 재료를 주방장의 독자적인 비법으로 만들어 특징적인 밀면의 맛을 자랑한다. 직접 만드는 손만두도 담백한 맛으로 인기 있다.","en":"","ja":"地域住民が推薦する「ミルミョン」すなわち小麦粉の冷麺専門店。スープはも\nちろん、麺やヤンニョムに至るまですべてシェフ独自の秘法で作っており、独\n特な味を誇る。手作り餃子も淡泊な味で人気がある。"},"c":"면·국물","g":"부산진구","p":"051-896-0177","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913111405621_thumbL","lat":35.162247,"lng":129.03975,"v":5768,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1108&lang_cd=ko"},{"n":{"ko":"버거샵 서면","en":"Burger Shop","ja":"バーガーショップ"},"m":{"ko":"클래식버거, 베이컨치즈","en":"Classic Burger, Bacon Cheeseburger","ja":"クラシックバーガー, ベーコンチーズ"},"a":{"ko":"부산진구 동천로 108번길 11","en":"11, Dongcheon-ro 108beon-gil, Busan-jin-gu","ja":"釜山鎮区東川路108番ギル11"},"h":{"ko":"10:00-20:30 (20:00 라스트오더)","en":"10:00-20:30 (20:00 Last order)","ja":"10:00-20:30 (20:00 ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"직접 손질하는 1등급 한우 패티와 매일 아침 구운 브리오슈 번으로 만드는 수제버거전문점으로, 외국인 손님들도 많이 찾는 곳이다. 독특한 인테리어를 즐기며 다양한 소품들도 구입하고 볼 수 있는 가게이다.","en":"This handmade burger shop makes burgers with Grade 1 Hanwoo patties and brioche buns baked fresh every morning. It’s also frequented by many foreign customers. It features unique decor and also sells various merchandise.","ja":"直接仕込んだ1等級の韓牛パティと毎朝焼くブリオッシュバンズで作る手作りバーガー専門店で、外国人客も多く訪れる。個性的なインテリアが楽しく、様々な小物も取り揃えられ販売されている。"},"c":"양식·세계요리","g":"부산진구","p":"051-911-4960","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913112340644_thumbL","lat":35.15856,"lng":129.06306,"v":5350,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1110&lang_cd=ko"},{"n":{"ko":"소수인","en":"Sosuin","ja":"所守人"},"m":{"ko":"시메사바 이소베마키 ￦18,000","en":"Shime Saba Isobemaki ￦18,000","ja":"しめ鯖の磯辺巻き ￦18,000"},"a":{"ko":"부산진구 가야대로750번길 17","en":"17, Gaya-daero 750beon-gil, Busanjin-gu","ja":"釜山鎮区伽倻大路750番ギル17"},"h":{"ko":"17:00-24:00","en":"17:00-24:00","ja":"17:00-24:00"},"x":{"ko":"명절휴무","en":"Closed on public holidays","ja":"名節休み"},"d":{"ko":"일식을 모티브로 한 새로운 스타일의 요리를 만들고 있는 일본식주점으로 영업을 시작한지 얼마 되지 않아 항상 사람들이 가득한 곳이 되었다. 개성강한 요리들은 술안주로도 식사로도 잘 어울린다.","en":"Sosuin is a Japanese-style bar that offers new Japanese-inspired dishes. Shortly after its opening, it started becoming packed with customers. Their distinct dishes make great meals and also pair well with drinks.","ja":"日本料理をモチーフにした新しいスタイルの料理を提供する日本式の居酒屋で、営業を始めてからいつもたくさんの人々で賑わう。個性的なメニューがお酒のおつまみとしても絶妙だ。"},"c":"분식·주점","g":"부산진구","p":"051-808-4036","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20250523160110075_thumbL","lat":35.156677,"lng":129.05383,"v":5171,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1111&lang_cd=ko"},{"n":{"ko":"양평칼국수 본점","en":"Yangpyeong Kalguksu","ja":"ヤンピョンカルグクス"},"m":{"ko":"양평칼국수, 비빔칼국수, 멸치칼국수, 고기만두","en":"Yangpyeong Kalguksu (Hand-cut Noodle Soup), Bibim Kalguksu (Mixed Hand-cut Noodles), Kalguksu with Anchovies, Meat Dumplings","ja":"ヤンピョンカルグクス, ビビンカルグクス, ミョルチカルグクス, 肉餃子"},"a":{"ko":"사하구 다대로 680-1","en":"680-1, Da-daero, Saha-gu","ja":"釜山沙下区多大路680-1"},"h":{"ko":"월-금 : 11:00-20:00 \n(15:30~17:00 브레이크타임)\n(19:30 라스트오더)\n토 : 11:00-15:30\n(15:00 라스트오더)","en":"Monday-Friday 11:00-20:00 \n(Break time 15:30-17:00)\n(Last order 19:30)\nSaturday 11:00-15:30\n(Last order 15:00)","ja":"月曜日～金曜日：11:00-20:00\n(15:30~17:00休憩時間)\n(19:30ラストオーダー)\n土曜日：11:00-15:30\n(15:00ラストオーダー)"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"다대포 해수욕장 인근의 식당으로 20년 경력의 칼국수 장인인 주인이 직접 반죽한 숙성면에 국산 배추로 매일 매일 담는 김치가 매력을 더한다. 여름에만 맛 볼 수 있는 냉칼국수, 냉콩칼국수 등의 한정메뉴들도 무척 인기 있다.","en":"At this restaurant located near Dadaepo Beach, the owner-chef with a 20-year experience in kalguksu (hand-cut noodle soup) makes their own ripened noodle dough and kimchi with domestic napa cabbage for a delectable dining experience. Cold noodles and cold noodles with soybeans are their popular summer-only specials.","ja":"多大浦海水浴場の近くにあるお店で、職人歴20年のカルグクス職人が作った熟成麺に韓国産の白菜で毎日漬けるキムチが本当に美味しい。夏にしか味わえない冷カルグクス、豆乳冷きしめんなどの限定メニューも人気だ。"},"c":"고기·구이","g":"사하구","p":"051-265-0907","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913114940489_thumbL","lat":35.048454,"lng":128.967,"v":6185,"l":6,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1117&lang_cd=ko"},{"n":{"ko":"영진돼지국밥 본점","en":"Yeongjin Dwaeji Gukbap Main Branch","ja":"ヨンジンテジクッパ 本店"},"m":{"ko":"수육백반 ￦12,000\n돼지국밥 ￦9,000","en":"Suyuk Baekban(Steamed Pork Set Menu)\n￦12,000\nDwaejigukbap(Pork Soup with Rice) ￦9,000","ja":"ゆで肉定食 ￦12,000\n豚クッ ￦9,000"},"a":{"ko":"사하구 하신번영로157번길 39","en":"39, Hasinbeonyeong-ro 157beon-gil, Saha-gu","ja":"釜山沙下区下新繁栄路157番キル39"},"h":{"ko":"09:30-15:00 / 17:00-21:30","en":"Monday-Saturday 09:30-15:00 / 17:00-21:30","ja":"09:30-15:00 / 17:00-21:30"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"유명한 돼지국밥 전문점 중 한 곳으로, 항상 많은 사람들이 찾아오는 곳이다. 돼지 특유의 냄새를 제거하여 깔끔하고 담백한 맛을 자랑하며 수육과 두부, 볶음김치가 함께 나오는 수육백반이 무척 인기 있다.","en":"Yeongjin is one of the most famous dwaejigukbap (pork soup with rice) joints always filled with guests. The distinct meat odor is removed for a refreshing taste, and their Suyuk Baekban with steamed pork, tofu, and stir-fried kimchi is very popular.","ja":"有名な豚クッパ専門店の一つで、いつも人々で賑わっている。豚特有の臭みを取り除き、淡泊な味が自慢だ。ゆで肉や豆腐、キムチ炒めがセットになった「スユクペッパン」といわれるゆで肉定食が人気。"},"c":"고기·구이","g":"사하구","p":"051-206-3820","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240417165519984_thumbL","lat":35.09664,"lng":128.95784,"v":15625,"l":11,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1118&lang_cd=ko"},{"n":{"ko":"신흥반점","en":"Sinheungbanjeom","ja":"新興飯店"},"m":{"ko":"짬뽕, 자장면, 깐풍기, 삼선볶음밥","en":"Jjamppong (Spicy Noodle Soup with Seafood), Jajangmyeon (Black Bean Noodles), Spicy Garlic Chicken, Seafood Fried Rice","ja":"チャンポン, ジャージャー麺, ピリ辛甘酢鶏唐揚げ, 海鮮炒飯"},"a":{"ko":"서구 충무대로 284-1","en":"284-1, Chungmu-daero, Seo-gu","ja":"釜山西区忠武大路284-1"},"h":{"ko":"월-토 : 11:00-20:00\n(13:50-16:00 브레이크 타임)\n(19:30 라스트 오더)","en":"Monday-Saturday 11:00-20:00 \n(Break time 13:50-16:00) \n(Last order 19:30)","ja":"月曜日～土曜日：11:00-20:00\n(13:50-16:00休憩時間)\n(19:30ラストオーダー)"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"2대째 운영 중인 신흥반점은 서구에서 55년 동안 화교 가족들이 운영해오고 있는 곳으로, 중국 현지의 식당 같은 분위기의 가게에서 다양한 중국요리를 맛 볼 수 있다. 짬뽕국물과 깐풍기가 이 곳에서 추천하는 인기 메뉴이다.","en":"Sinheungbanjeom has been managed by two generations of a Chinese family for the past 55 years in Seo-gu. You can taste various Chinese dishes in an authentic atmosphere. Jjamppong soup and spicy garlic chicken are the recommended dishes.","ja":"2代目が経営する新興飯店は、西区で55年間にわたり華僑一家が続けてきたお店。中国現地さながらの雰囲気の店で、様々な中華料理が味わえる。チャンポンのスープやピリ辛甘酢鶏唐揚げがおすすめの人気メニュー。"},"c":"중식","g":"서구","p":"051-242-6164","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913133410983_thumbL","lat":35.09595,"lng":129.02463,"v":5567,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1121&lang_cd=ko"},{"n":{"ko":"동원숯불갈비","en":"Dongwon Sutbul Galbi","ja":"トンウォン　スップルカルビ"},"m":{"ko":"돼지갈비230g","en":"Pork Ribs 230g","ja":"豚カルビ"},"a":{"ko":"연제구 과정로276번길 9","en":"9, Gwaseon-ro 276beon-gil, Yeonje-gu","ja":"釜山蓮堤区瓜亭路276番キル9"},"h":{"ko":"11:00-22:00\n(15:00~17:00 브레이크타임)\n(21:00 라스트 오더)\n\n*월요일 격주로 운영","en":"10:00-22:00 \n(Last order 21:00) \n\n*Open every other Monday","ja":"10:00-22:00\n(21:00ラストオーダー)\n\n*月曜日は隔週で営業"},"x":{"ko":"격주 월요일 휴무","en":"Closed every other Monday","ja":"隔週月曜日"},"d":{"ko":"한적한 골목길에 숨겨져 있는 이 돼지갈비전문점은 38년간 숯불돼지갈비 한 메뉴로 이 장소를 지켜온 식당이다. 쉽게 찾기 힘든 위치에 있지만 친근하고 꾸준한 맛으로 많은 단골고객들이 찾아오는 곳.","en":"This is a hidden spot in a quiet alley specializing in pork ribs. They have stayed in one place for 38 years with just one dish: charcoal-grilled pork ribs. Despite the remote location, the restaurant has many regulars for the familiar flavor and steady quality.","ja":"静かな路地にたたずむ豚カルビ専門店は、38年間、炭火豚カルビのメニューひとつでお店を守ってきた。見つけにくい場所にあるが、親しみやすくいつも変わらない味で多くの常連客が訪れる。"},"c":"고기·구이","g":"연제구","p":"051-864-2379","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913141552746_thumbL","lat":35.188595,"lng":129.09715,"v":5337,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1132&lang_cd=ko"},{"n":{"ko":"도날드즉석떡볶이","en":"Donald Tteokbokki","ja":"ドナルド即席トッポッキ"},"m":{"ko":"2인 Set ￦10,400\n3인 Set ￦14,100","en":"Set for 2 ￦10,400\nSet for 3 ￦14,100","ja":"2人前セット ￦10,400\n3人前セット ￦14,100"},"a":{"ko":"영도구 꿈나무길 267(1층)","en":"267, Kkumnamu-gil, Yeongdo-gu","ja":"影島区ツクムナムギル267"},"h":{"ko":"월-토 : 11:00-19:30\n(19:00 라스트 오더)","en":"Monday-Saturday 11:00-19:30 \n(Last order 19:00)","ja":"月曜日～土曜日：11:00-19:30\n(19:00ラストオーダー)"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"지역민들에게 추억의 장소인 이곳은 35년간 운영해온 유명한 즉석떡볶이 전문점으로 해물 육수와 고추장소스를 사용하여 독특한 맛을 자랑한다. 후식으로 판매하는 빵크림을 먹기 위해 찾아오는 사람들도 많다.","en":"A famous nostalgic joint for the locals, Donald Tteobokki is a made-to-order tteobokki shop that has been in operation for 35 years. They are known for their original flavors with seafood broth and gochujang sauce. Many also come here for Ppeong Cream, an ice cream sandwich with ppeongtwigi (rice puff) sold as dessert.","ja":"地域住民にとって思い出の場所であるこのお店は、35年間続く有名な即席トッポッキ専門店で、海鮮出汁と唐辛子味噌のソースで作った独特な味が自慢。トッポッキを食べた後はスイーツ「ポンクリーム」まであり、これを食べるために訪れる人も多い。"},"c":"분식·주점","g":"영도구","p":"051-413-9990","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240418141930357_thumbL","lat":35.085815,"lng":129.04295,"v":6310,"l":18,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1133&lang_cd=ko"},{"n":{"ko":"영도우","en":"Young Dough","ja":"ヨンドウ"},"m":{"ko":"영도우피자, 청학동파스타","en":"Young Dough Pizza, Cheonghak-dong Pasta","ja":"ヨンドウピザ, 青鶴洞パスタ"},"a":{"ko":"영도구 조내기로5번길 2","en":"2, Jonaegi-ro 5beon-gil, Yeongdo-gu","ja":"影島区チョネギ路5番ギル2"},"h":{"ko":"화-일 : 11:30-20:30\n(15:00-17:00 브레이크 타임)\n(20:00 라스트 오더)","en":"Tuesday-Sunday 11:30-20:30\n(Break time 15:00-17:00)\n(Last order 20:00)","ja":"火曜日～日曜日：11:30-20:30\n(15:00-17:00休憩時間)\n(20:00ラストオーダー)"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日"},"d":{"ko":"부산항이 한눈에 들어오는 장소에 위치한 피자전문점으로 자체개발한 도우로 만든 테두리가 없는 사각형의 디트로이트식 피자가 대표메뉴이다. 임실치즈를 아낌없이 사용하여 풍부한 치즈의 맛을 즐길 수 있다","en":"Young Dough is a pizzeria with a wide view of the Busan Port. The signature dish is the square Detroit-style pizza without the crust, made with their original dough. They use Imsil cheese generously to give a rich flavor to the pizza.","ja":"釜山港が一望できる場所にあるピザ専門店で、独自開発したピザ生地で作る縁のない四角形のデトロイト風ピザが代表メニュー。イムシルチーズをふんだんに使用して、豊かなチーズの風味を楽しめる。"},"c":"양식·세계요리","g":"영도구","p":"070-4659-0169","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913152113856_thumbL","lat":35.08781,"lng":129.06128,"v":5497,"l":17,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1135&lang_cd=ko"},{"n":{"ko":"함흥보쌈사계절냉면","en":"Hamheung Bossam","ja":"咸興ポッサム"},"m":{"ko":"모둠보쌈 소/중/대, 함흥냉면, 평양냉면","en":"Assorted Bossam (Steamed Pork), Hamheung Naengmyeon, Pyeongyang Naengmyeon","ja":"盛り合わせポッサム, 咸興冷麺, 平壌冷麺"},"a":{"ko":"영도구 남항로 42","en":"42, Namhang-ro, Yeongdo-gu","ja":"釜山影島区南港路42"},"h":{"ko":"월-일 : 10:50-20:00\n(15:20-16:00 브레이크 타임)\n(19:30 라스트 오더)\n\n*수요일 휴무","en":"Monday-Sunday 11:00-20:00\n(Break time 15:30-16:00) \n\n*Closed on Wednesdays","ja":"月曜日～日曜日：11:00-20:00\n(15:30-16:00休憩時間)\n\n*定休日は水曜日"},"x":{"ko":"수요일","en":"Wednesdays","ja":"水曜日"},"d":{"ko":"냉면전문점으로 시작하여 50여년을 운영 중인 보쌈전문점으로 싱싱한 고기를 사용하고 부드러운 맛으로 유명하다. 오랜 전통을 자랑하는 냉면도 인기메뉴이며 어떤 메뉴를 주문하든 만족스러운 양이 제공된다.","en":"Originally a naengmyeon (cold noodle soup) restaurant, it has become a bossam (steamed pork) restaurant and has been in operation for over 50 years. They are famous for using fresh meat and soft texture. Their long-standing-item, naengmyeon, is still popular, and every order is generously portioned.","ja":"冷麺専門店からスタートした約50年間続くポッサム専門店で、新鮮な肉を使用し、柔らかく口当たりがいいことで有名。長い伝統を誇る冷麺も人気で、どのメニューもボリュームがあり大満足間違いなし。"},"c":"면·국물","g":"영도구","p":"051-416-2342","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913152733413_thumbL","lat":35.08845,"lng":129.04108,"v":5026,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1136&lang_cd=ko"},{"n":{"ko":"원산면옥 1953","en":"Wonsanmyeonok","ja":"元山麺屋"},"m":{"ko":"평양냉면 ￦14,000\n함흥냉면 ￦14,000","en":"Pyeongyang Naengmyeon ￦14,000\nHamheung Naengmyeon ￦14,000","ja":"平壌冷麺, 咸興冷麺"},"a":{"ko":"중구 광복로 56-8","en":"56-8, Gwangbok-ro, Jung-gu","ja":"中区光復路56-8"},"h":{"ko":"11:00-21:30","en":"11:00-21:30","ja":"11:00-21:30"},"x":{"ko":"추석당일 휴무","en":"Open every day","ja":"年中無休"},"d":{"ko":"60여 년의 전통을 가진 냉면전문점으로 3대째 운영하고 있는 무척 유명한 곳이다.\n한우와 국내산 생돼지고기, 생닭을 사용하고 10여 가지 재료가 들어간 육수로 만든 냉면은 변하지 않는 맛을 자랑한다.","en":"Wonsanmyeonok is a longstanding naengmyeon (cold noodle soup) establishment with 60 years of history, run by third-generation family members. They use Hanwoo, domestic pork, and fresh chicken, and the naengmyeon broth made of over 10 ingredients boasts the same flavor every time.","ja":"60年以上の伝統がある冷麺専門店で、3代目が経営する有名なお店。韓牛と韓国産の豚肉、鶏肉を使用し10種類以上の材料が入ったスープで作った冷麺はいつも変わらない味が自慢だ。"},"c":"면·국물","g":"중구","p":"051-245-2310","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419110909568_thumbL","lat":35.098976,"lng":129.03105,"v":5905,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1137&lang_cd=ko"},{"n":{"ko":"개미집신도시점","en":"Gaemijip Sindosi Branch","ja":"ケミジプ新都市店（ナクチ炒めケミジプ）"},"m":{"ko":"낙지볶음, 곱창전골","en":"Stir-fried Octopus, Tripe Hot Pot","ja":"ナクチ炒め, ホルモン鍋"},"a":{"ko":"해운대구 좌동로 10번길 51-5","en":"51-5, Jwadong-ro 10beon-gil, Haeundae-gu","ja":"釜山海雲台区佐洞路10番キル 51-5"},"h":{"ko":"10:00-22:00","en":"10:00-22:00","ja":"10:00-22:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"부산의 대표적인 낙지요리전문점인 개미집의 분점으로, 본점에 뒤쳐지지 않는 맛을 선보이고 있다. 본점과 같이 낙지볶음, 낙지새우볶음, 낙지곱창볶음 등의 요리들이 모두 인기 있으며, 불고기낙지버섯전골과 곱창전골을 찾는 손님도 많다.","en":"It is a branch of Gaemijip, Busan’s most famous stir-fried octopus chain, but the taste here is just as great as the original. Just as the original store, it serves stir-fried octopus, stir-fried octopus with shrimp, and stir-fried octopus, tripe, and shrimp. All of them are popular. Many customers also order bulgogi hot pot with octopus and mushroom and tripe hot pot.","ja":"釜山の代表的なタコ「ナクチ」料理専門店「ケミジプ」のチェーン店で、本店にも遜色ない美味しさ。本店と同じようにナクチやナクチ・エビ、ナクチ・ホルモン炒めなどが人気料理。焼肉ナクチキノコ鍋とホルモン鍋を注文する利用客も多い。"},"c":"해산물·회","g":"해운대구","p":"051-744-6446","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20210913153737388_thumbL","lat":35.167637,"lng":129.17154,"v":6505,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1138&lang_cd=ko"},{"n":{"ko":"오리한상 명지본점","en":"Orihansang","ja":"オリハンサン"},"m":{"ko":"오리소금구이, 오리양념구이","en":"Grilled duck with salt, Grilled duck with seasoning","ja":"鴨の塩焼き, 鴨の味付け焼き"},"a":{"ko":"명지국제9로 66, 지봉빌딩 2층","en":"2F, Jibong Building, 66, Myongjigukje9-ro","ja":"鳴旨国際9路66ジボンビル2階"},"h":{"ko":"월-금 : 11:30-22:00\n(15:00-17:00 브레이크 타임)\n(21:00 라스트 오더)\n토-일 : 11:30-22:00\n(21:00 라스트 오더)","en":"Monday-Friday 11:30-22:00 \n(Break time 15:00-17:00) \n(Last order 21:00) \nSaturday-Sunday 11:30-22:00 \n(Last order 21:00)","ja":"月曜日～金曜日：11:30-22:00\n(15:00-17:00休憩時間)\n(21:00ラストオーダー)\n土曜日～日曜日：11:30-22:00\n(21:00ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"청둥오리를 사용한 소금구이와 급속 냉동된 오리를 아주 얇게 슬라이스한 불고기가 모두 인기있는 이곳은, 커다란 창을 활용한 깔끔하고 여유로운 공간과 함께 개별룸도 운영하고 있어 가족외식하기에도 좋은 곳이다.","en":"Salt-grilled mallard duck and thinly sliced quick-frozen duck barbecue are both popular dishes. It has a large window and a clean and spacious space, as well as private rooms that are great for family dining.","ja":"マガモの塩焼きと急速冷凍した鴨肉を薄くスライスしたプルゴギが人気のこのお店は、大きな窓を活かした清潔で余裕のある店内や個室があり、家族連れの外食にも最適。"},"c":"고기·구이","g":"강서구","p":"0507-1486-0417","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220510145207922_thumbL","lat":35.097855,"lng":128.92471,"v":4848,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1219&lang_cd=ko"},{"n":{"ko":"만포밀면옥","en":"Manpo Milmyeon","ja":"マンポミルミョン"},"m":{"ko":"물밀면, 비빔밀면, 찐만두","en":"Mulmilmyeon, Bibimmilmyeon, Steamed Dumplings","ja":"ムルミルミョン, ビビンミルミョン, 蒸し餃子"},"a":{"ko":"기장읍 차성로 322번길 40","en":"40, Chaseong-ro 322beon-gil, Gijang-eup","ja":"機張邑チャソン路322番ギル40"},"h":{"ko":"11:00-20:30\n(20:00 라스트 오더)","en":"11:00-20:30 \n(Last order 20:00)","ja":"11:00-20:30\n(20:00ラストオーダー)"},"x":{"ko":"설날‧추석 당일\n매주 목요일 휴무 (11~2월)","en":"Lunar New Year’s Day and Chuseok\nClosed every Thursday (November to February)","ja":"旧暦1月1日・秋夕当日\n毎週木曜日お休み(11~2月)"},"d":{"ko":"매장에 들어서면 진한 육수냄새가 맛을 기대하게 하는 이곳은 가야식 밀면을 만들고 있는 곳으로, 95년 가게를 연 이후 매일 그 날 판매할 밀면을 시식하는 것으로 시작한다고 한다. 변하지 않는 맛은 언제나 기쁘다.","en":"When you enter the store, the smell of rich broth makes you anticipate the flavors. Known for their Gaya-style wheat noodles, they start each day since opening in 1995 by tasting the wheat noodles for sale that day. It is always a pleasure to discover a consistent spot.","ja":"お店に足を踏み入れると濃厚なスープの香りが漂う当店は、伽耶風の小麦麺を作っている。95年に開店して以来、毎日その日に販売する小麦麺を味見することから始まるという。 いつも変わらない味が嬉しい。"},"c":"면·국물","g":"기장군","p":"0507-1350-7516","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220510161651267_thumbL","lat":35.245934,"lng":129.21597,"v":5284,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1221&lang_cd=ko"},{"n":{"ko":"맛사랑채","en":"Matsarangchae","ja":"マッサランチェ"},"m":{"ko":"쌈정식, 고등어조림, 닭도리탕","en":"Ssamjeongsik, Braised mackerel, Dakdoritang","ja":"野菜包み定食, さばの煮付け, 鶏肉の炒め煮"},"a":{"ko":"기장읍 읍내로 93-6","en":"93-6, Eupnae-ro, Gijang-eup","ja":"機張邑邑内路93-6"},"h":{"ko":"월-토 : 11:00-21:00","en":"Monday-Saturday 11:00-21:00","ja":"月曜日～土曜日：11:00-21:00"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"생선구이가 포함된 12가지의 반찬과 함께 매일 다른 국이 제공되는 이곳의 정식은 집밥 보다 더 집밥 같다는 평을 듣고 있다. 인심 가득한 밥상을 만나기 위해 먼 곳에서 찾아오는 손님들도 많다고 한다.","en":"With 12 side dishes, including grilled fish and a different soup every day, the set meal here tastes more home-cooked food than real home cooking. Many customers come from far away to try their hearty meal.","ja":"焼き魚を含む12種類のおかずとともに日替わりのスープが提供される定食は、家のご飯よりもさらに家庭の味だと評価されている。 人情あふれる食膳を味わうため遠方から訪れるお客さんも多い。"},"c":"면·국물","g":"기장군","p":"051-722-4210","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220510170244967_thumbL","lat":35.24538,"lng":129.2147,"v":4364,"l":5,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1222&lang_cd=ko"},{"n":{"ko":"우정까망촌돼지","en":"Ujeong Kkamangchon Dwaeji","ja":"ウジョンカマンチョンテジ"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"장림번영로 53","en":"53, Jangnimbeongyeong-ro","ja":"長林繁栄路53"},"h":{"ko":"12:00 -23:00","en":"12:00 -23:00","ja":"12:00 -23:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"구이전문점인 이곳은, 어린 시절 시골에서 먹던 돼지고기의 맛을 재현하기 위해 청정지역에서 키운 돼지를 공수해온다고 한다. 솥뚜껑에 구워먹는 것이 특징인데 맛도 맛이지만, 구워지는 모습이 정말 참기 힘들다.","en":"This restaurant specializes in grilling and sources pork from clean environments to reproduce the taste of the pork they ate in the countryside as a child. They use the lid of a Korean cauldron called sot as the grill. It not only tastes delicious but makes your mouth water while it’s being grilled.","ja":"焼きもの専門店のこの店は、子供の頃田舎で食べたことのある豚肉の味を再現するために清浄地域で育てられた豚を空輸している。 釜の蓋で焼いて食べるのが特徴的で味もおいしいが、焼けるまで待つのがつらいほどだ。"},"c":"고기·구이","g":"사하구","p":"051-261-6021","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220510173949671_thumbL","lat":35.08081,"lng":128.97154,"v":3496,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1223&lang_cd=ko"},{"n":{"ko":"금랑횟집 광안리본점","en":"Geumnang Hoetjip, Gwanalli Main Store","ja":"グムランフェッチブ 広安里本店"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"광안해변로344번길 17-5, 마린리치건물 6층","en":"6F, Marine Rich Building, 17-5 Gwanganhaebyeon-ro 344beon-gil","ja":""},"h":{"ko":"11:30-22:30\n(21:30 라스트 오더)","en":"11:30-22:30\n(21:30 last order)","ja":"11:30-22:30\n(21:30 last order)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"수변공원 회센터에 자리한 횟집으로 메인요리인 회와 함께 제공되는 음식들이 다양하고 수준이 높아 회를 즐기지 않는 사람들도 충분히 즐길 만한 곳이다. 광안대교의 전경이 보이는바다풍경으로 유명한 곳이기도 하다.","en":"It is a hoe restaurant located in the waterside park hoe center. Many different kinds of dishes are served with the main dish, and are all very high in quality, so even those who don’t enjoy hoe can have a great time here. It is also famous for its seascape with a panoramic view of the Gwangan Bridge.","ja":"水辺公園の刺身センターにあるフェッチブ(刺身屋)。メイン料理であるお刺身とともに提供される料理が多彩でレベルが高いためお刺身が苦手な人でも十分楽しめる。 広安大橋の全景が見える海の風景が有名なお店。"},"c":"해산물·회","g":"수영구","p":"0507-1400-5209","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220510180602206_thumbL","lat":35.155155,"lng":129.131,"v":6868,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1225&lang_cd=ko"},{"n":{"ko":"난파센","en":"Nanpasen","ja":"ナンパセン"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"남천동로108번길 43","en":"43, Namcheondong-ro 108beon-gil","ja":"南川東路108番ギル43"},"h":{"ko":"월-일 : 11:30-21:00\n(15:00-17:00 브레이크 타임)\n(14:30, 20:30 라스트 오더)\n\n*수요일 휴무","en":"Monday-Sunday 11:30-21:00 \n(Break time 15:00-17:00) \n(Last order 14:30, 20:30)","ja":"月曜日～日曜日：11:30-21:00\n(15:00-17:00休憩時間)\n(14:30、20:30ラストオーダー)"},"x":{"ko":"수요일","en":"Wednesdays","ja":"水曜日"},"d":{"ko":"좋은 재료를 직접 손질하고 직접 만든 특제 소스를 사용해 인기 높은 튀김덮밥전문점으로 밥과 어울리는 튀김을 만들기 위해 무척 많은 연구를 한다고 한다. 밥 위에 올려진 갈색의 튀김이 특징적이다.","en":"It is a popular tendon (tempura overrice) restaurant that uses only good ingredients and special sauce. The chefs do a lot of research to make tempura that goes well with rice. The brown color of tempura on top of rice is their signature.","ja":"良質な材料を使った自家製の特製ソースを使用する人気の天丼専門店。ご飯に合う天ぷらを作るために、日々研究を重ねているという。 ご飯の上にのせられた茶色い天ぷらが特徴的。"},"c":"한식·백반","g":"수영구","p":"0507-1483-0536","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511104527053_thumbL","lat":35.14674,"lng":129.11339,"v":4737,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1226&lang_cd=ko"},{"n":{"ko":"화국반점","en":"Hwaguk Banjeom","ja":"ファグク飯店"},"m":{"ko":"탕수육, 간짜장","en":"Sweet and Sour Pork, Ganjjajang","ja":"タンスユク(酢豚), カンジャジャン"},"a":{"ko":"중구 백산길3","en":"3, Baeksan-gil, Jung-gu","ja":"中区ベクサンギル3"},"h":{"ko":"11:30-15:30 / 17:00-21:30","en":"11:30-15:30 / 17:00-21:30","ja":"11:30-15:30 / 17:00-21:30"},"x":{"ko":"매달 1.3째주 월요일 휴무","en":"Closed on 1st and 3rd Monday of each month","ja":"毎月第1・3月曜日は休業"},"d":{"ko":"43년 전통의 중식전문점으로 간짜장이 특히 유명한 이곳은, 전통적인 방식의 요리로 외국인들이 많이 찾는 곳이기도 하다. 신세계와 범죄와의 전쟁 등 영화촬영지로도 유명하다.","en":"Hwaguk Banjeom is a 43-year-old Chinese restaurant specializing in ganjjajang. It is \nrenowned for the traditional style of cooking beloved by foreign visitors. It is also famous \nas a filming location for films like New World and the Nameless Gangster.","ja":"43年の伝統がある中華専門店でカンジャジャンが特に有名なこのお店は、伝統的な料理を\n目当てに多くの外国人が訪れる場所である。映画「新しき世界」や「悪いやつら」などのロケ\n地としても有名。"},"c":"중식","g":"중구","p":"051-245-5305","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230602160354975_thumbL","lat":35.10253,"lng":129.0342,"v":4565,"l":1,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1227&lang_cd=ko"},{"n":{"ko":"로얄경양식&스테이크 광안점","en":"Royal Gyeongyangsik & Steak, Gwangan Branch","ja":"ローヤル軽洋食&ステーキ 広安店"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"민락수변로 29, 2층 201~203호","en":"#201-203, 2F, 29, Millaksubyeon-ro","ja":"民楽水辺路29、2階201~203号"},"h":{"ko":"11:30-22:00\n(21:20 라스트 오더)","en":"11:30-22:00 \n(Last order 21:20)","ja":"11:30-22:00\n(21:20ラストオーダー)"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"광안리의 바다풍경을 즐기며 식사를 할 수 있는 패밀리레스토랑으로 가격에 비해 높은 수준의 음식과 서비스를 제공하고 있다. 조리하는 모습을 직접 볼 수 있는 오픈주방을 운용하고있으며, 바다를 충분히 즐길 수 있는 실내 환경이 인상적이다.","en":"At this family restaurant, you can enjoy a meal while enjoying the sea view of Gwangalli. For the price, it offers a great quality of food and service. It has an open kitchen where customers can watch the food being prepared, and the indoor environment allows you to enjoy an impressive view of the sea.","ja":"広安里の海の景色を眺めながら食事ができるファミリーレストラン。リーズナブルな価格でレベルの高い料理とサービスを提供する。 調理の様子を直接見ることができるオープンキッチンがあり、海を十分に楽しめる店内が印象的。"},"c":"고기·구이","g":"수영구","p":"0507-1334-8718","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511111431528_thumbL","lat":35.153294,"lng":129.12462,"v":6353,"l":9,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1228&lang_cd=ko"},{"n":{"ko":"본참치","en":"Bonchamchi","ja":"本マグロ"},"m":{"ko":"특정식 ￦34,000\n특초밥 ￦18,000","en":"Special Set ￦34,000\nSpecial Sushi ￦18,000","ja":"特定食 ￦34,000\n特寿司 ￦18,000"},"a":{"ko":"중구 해관로73","en":"73, Haegwan-ro, Jung-gu","ja":"中区海関路73"},"h":{"ko":"11:30-14:30 / 17:00-22:30","en":"11:30-14:30 / 17:00-22:30","ja":"11:30-14:30 / 17:00-22:30"},"x":{"ko":"일요일 휴무","en":"Closed on Sundays","ja":"日曜休み"},"d":{"ko":"전국의 참치 매니아들이 찾아오는 유명한 참치전문점으로, 조리명인인 오너쉐프가 운영하고 있는 곳이다. 당일재료는 당일소진하고 있으며, 노인들을 위한 행사를 개최하는 등 지역 사회에 기여하고 있는 식당이기도 하다.","en":"This is a famous tuna restaurant that attracts tuna lovers from all over the country. It is run by an owner-chef who is a master cook. All the ingredients are used up within the day. They also contribute to the local community by holding events for the elderly.","ja":"全国のマグロ好きが訪れる有名なマグロ専門店で、料理名人のオーナーシェフが営む。当日の材料は当日に使い切り、お年寄りのためのイベントを開催するなど、地域社会にも貢献しているお店だ。"},"c":"일식","g":"중구","p":"051-463-3737","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419095246698_thumbL","lat":35.10548,"lng":129.03526,"v":4808,"l":8,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1229&lang_cd=ko"},{"n":{"ko":"무궁화","en":"Mugunghwa","ja":"ムグンファ"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"황령산로8번길 5","en":"5, Hwangnyeongsan-ro 8beon-gil","ja":"荒嶺山路8番ギル5"},"h":{"ko":"화-일 : 11:30-21:00\n(15:00-17:00 브레이크 타임)\n(14:00, 20:00 라스트 오더)","en":"Tuesday-Sunday 11:30-21:00 \n(Break time 15:00-17:00) \n(Last order 14:00, 20:00)","ja":"火曜日～日曜日：11:30-21:00\n(15:00-17:00休憩時間)\n(14:00、20:00ラストオーダー)"},"x":{"ko":"월요일","en":"Mondays","ja":"月曜日"},"d":{"ko":"할머니집에 놀러온 것 같은 느낌을 주는 이곳은 전골요리로 무척 유명한 식당으로, 직접 만든 커다란 만두를 사용한 만두전골이 특히 인기 있다. 신선한 야채를 사용하는 이곳은 항상 변함없는 맛으로 기억되는 곳이기도 하다.","en":"This restaurant makes you feel like you are at your grandmother’s house. It’s very famous for hotpot dishes, and the dumpling hotpot with large dumplings made from scratch is the most popular item. The vegetables are all fresh, and the dishes are always remembered for the consistent taste.","ja":"おばあちゃんの家に遊びに来たような雰囲気のお店。鍋料理がとても有名で、自家製の大きな餃子を使った餃子鍋が特に人気だ。新鮮な野菜を使い、いつも変わらない味が記憶に残る。"},"c":"면·국물","g":"수영구","p":"051-623-5700","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511113221248_thumbL","lat":35.14778,"lng":129.10925,"v":4286,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1230&lang_cd=ko"},{"n":{"ko":"어가초밥","en":"Eoga Chobap","ja":"オガ寿司"},"m":{"ko":"","en":"","ja":""},"a":{"ko":"자갈치로 41","en":"41, Jagalchi-ro","ja":"チャガルチ路41"},"h":{"ko":"월-토: 12:00-21:00\n(14:00-17:00 브레이크 타임)","en":"Monday-Saturday 12:00-21:00 \n(Break time 14:00-17:00)","ja":"月曜日～土曜日：12:00-21:00\n(14:00-17:00休憩時間)"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"부산 최대 수산물시장인 자갈치시장과 인접한 일식전문점으로 빠르게 재료를 공수하여 신선한 음식을 제공하고 있다. 대부분의 좌석이 독립된 룸으로 운영되고 있어 편안하게 식사를 즐길 수 있기도 하다.","en":"Eoga Chobap is a Japanese restaurant located adjacent to Jagalchi Market, the largest fish market in Busan. Most of the seating is in private rooms, so customers can enjoy their meals in comfort.","ja":"釜山最大の水産物市場であるチャガルチ市場に隣接する日本料理専門店。素早く食材を空輸し新鮮な料理を提供する。ほとんどの座席が個室なので、ゆったり食事を楽しむことができる。"},"c":"일식","g":"중구","p":"051-247-3777","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511113442878_thumbL","lat":35.097214,"lng":129.02882,"v":5138,"l":0,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1231&lang_cd=ko"},{"n":{"ko":"배꼽시계","en":"Baekkopsigye","ja":"ペッコプシゲ"},"m":{"ko":"황칠유황오리백숙, 능이유황오리백숙, 오리불고기","en":"Duck Soup with Korean Dendropanax, Duck Soup with Neungi Mushrooms, Duck Bulgogi","ja":"黄漆硫黄入り鴨肉の水炊き, ヌンイ硫黄入り鴨肉の水炊き, 鴨のプルコギ"},"a":{"ko":"부산광역시 기장군 일광읍 장곡길 63-14","en":"63-14, Janggok-gil, Ilgwang-myeon","ja":"日光面ジャンゴクギル63-14"},"h":{"ko":"화-일 : 11:30-22:00","en":"Tuesday-Sunday 11:30-22:00","ja":"火曜日～日曜日：11:30-22:00"},"x":{"ko":"월요일 휴무","en":"Closed on Mondays","ja":"月曜日"},"d":{"ko":"약선 요리를 추구하여 수술 후 환자들도 자주 찾을 만큼 건강한 음식을 만드는 오리요리전문점으로 계절재료를 사용해 장아찌를 담고 2년 이상 숙성시킨 김치를 사용한다. 오리백숙은 시간이 많이 걸리니 2시간 이상 전 예약이 필수다.","en":"This restaurant specializes in duck cuisine with herbal effects, cooking healthy food that patients covet to enjoy after surgery. They make pickles using seasonal ingredients and serve kimchi preserved for over two years. Because it takes a long time to cook duck soup, make reservations at least 2 hours in advance.","ja":"薬膳料理を一筋に、手術を終えた患者さんもよく訪れるほど健康に良い料理を作る鴨料理専門店。季節の食材を使って漬物を漬け、2年以上熟成させたキムチを使用する。 鴨の水炊きは時間がかかるため、2時間以上前に予約しよう。"},"c":"고기·구이","g":"기장군","p":"051-728-6118","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511115114884_thumbL","lat":35.30255,"lng":129.24944,"v":4492,"l":11,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1232&lang_cd=ko"},{"n":{"ko":"사랑도횟집","en":"Sarangdo Hoetjip","ja":"サランド フェッチブ"},"m":{"ko":"자연산회, 앙장구비빔밥, 물회","en":"Wild Hoe, Uni Bibimbap, Mulhoe(Hoe with Cold Soup)","ja":"天然産の刺身, ウニのビビンバ, ムルフェ(冷たい刺身のスープ)"},"a":{"ko":"기장읍 차성로 337-1","en":"337-1, Chaseong-ro, Gijang-eup","ja":"機張邑チャソン路337-1"},"h":{"ko":"월-토 : 11:30-21:00\n(14:00-17:00 브레이크 타임)","en":"Monday-Saturday 11:30-21:00 \n(Break time 14:00-17:00)","ja":"月曜日～土曜日：11:30-21:00\n(14:00-17:00休憩時間)"},"x":{"ko":"일요일","en":"Sundays","ja":"日曜日"},"d":{"ko":"매일 좋은 횟감을 선별해서 준비하고, 직접 만든 반찬들로 식탁을 채운다. 음식에 대해 정직하게 운영한다는 이곳은 단골이 많기로 유명한 횟집으로, 가격이 다소 높아 보이지만 음식이 차려지면 오히려 저렴하다는 생각이 들게 한다.","en":"This restaurant selects and prepares quality hoe (Korean-style sashimi) every day and fills the table with side dishes made from scratch. Known for their integrity about food, this hoe restaurant is famous for having many regulars. The price may look slightly high at first, but once the food is served, it actually seems inexpensive for the quality.","ja":"毎日新鮮なお刺身を仕込み、自家製のおかずで食卓を満たす。 料理に正直に営むこのお店は、常連客が多いことで有名な刺身屋だ。少々値段が高めだと思われがちだが、料理が並べられた後にはむしろ安く感じるだろう。"},"c":"해산물·회","g":"기장군","p":"051-722-7001","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511131104127_thumbL","lat":35.247726,"lng":129.21346,"v":4686,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1236&lang_cd=ko"},{"n":{"ko":"삼송초밥 부산남포본점","en":"Samsong Chobap","ja":"三松寿司"},"m":{"ko":"김초밥(후토마끼) ￦17,000\n초밥 정식 특선 ￦32,000-52,000","en":"Futomaki ￦17,000\nSushi Special ￦32,000-52,000","ja":"キムチョバプ(太巻き) ￦17,000\n寿司定食 特選 ￦32,000-52,000"},"a":{"ko":"중구 광복로55번길 13","en":"13, Gwangbok-ro 55beon-gil, Jung-gu","ja":"中区光復路55番ギル13"},"h":{"ko":"11:00-14:30 / 16:30-21:00","en":"11:00-14:30 / 16:30-21:00","ja":"11:00-14:30 / 16:30-21:00"},"x":{"ko":"일요일, 명절 휴무","en":"Closed on Sundays and public holidays","ja":"日曜、名節休み"},"d":{"ko":"부산에서 가장 유명한 일식전문점 중 한 곳으로 65년 이상의 역사를 가지고 있으며, 대를 이어 오는 손님들이 이곳의 변치 않는 맛을 보증하고 있다. 특히 김초밥으로 많이 알려져 있기도 한 곳이다.","en":"As one of the most well-known Japanese restaurants in Busan, it has a history of more than 65 years. Generations of customers guarantee its consistent taste. Their futomaki is especially popular.","ja":"釜山で最も有名な日本料理専門店のひとつで、65年以上の歴史を持つ。代々変わらず訪れるお客様が、このお店の変わらぬ味の証だ。特にキムチョバプ(太巻き)が有名。"},"c":"일식","g":"중구","p":"051-245-7870","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20240419104310358_thumbL","lat":35.099678,"lng":129.02986,"v":4851,"l":2,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1237&lang_cd=ko"},{"n":{"ko":"솔리보","en":"Solivo","ja":"ソリーヴォ"},"m":{"ko":"포모도로파스타, 새우로제파스타, 부채살스테이크","en":"Pomodoro Pasta, Shrimp Rose Pasta, Grilled Beef Steak","ja":"ポモドーロパスタ, 海老ロゼパスタ, ミスジステーキ"},"a":{"ko":"일광면 해송4로 21, 201호","en":"#201, 21, Haesong 4-ro, Ilgwang-myeon","ja":"日光面海松4路21、201号"},"h":{"ko":"월-금 : 11:30-21:00\n(15:00-17:00 브레이크 타임)\n(14:00,20:00 라스트 오더)\n토-일 : 11:30-21:00\n(20:00 라스트 오더)","en":"Monday-Friday 11:30-21:00 \n(Break time 15:00-17:00) \n(Last order 14:00,20:00) \nSaturday-Sunday 11:30-21:00 \n(Last order 20:00)","ja":"月曜日～金曜日：11:30-21:00\n(15:00-17:00休憩時間)\n(14:00、20:00ラストオーダー)\n土曜日～日曜日：11:30-21:00\n(20:00ラストオーダー)"},"x":{"ko":"","en":"Closed on 2nd and 4th Monday of each month","ja":"毎月第2・4月曜日は休業"},"d":{"ko":"스승에게 전수받아 계승·발전시킨 토마토 소스가 특기라는 젊은 오너쉐프는, 스테이크에 쓰는 고기도 직접 정육하여 8시간 이상의 수비드 과정을 거쳐 만들고 있다. 햇살이 들어오는 단정한 인테리어의 공간이 이름처럼 무척 따듯하게 느껴지는 곳이다.","en":"The young owner-chef, whose specialty is tomato sauce that he inherited and developed from his master, also dresses the meat used for steak himself and prepares it through a sous vide process for more than 8 hours. As the name suggests, the nicely decorated space makes you feel the warmth of the sunlight that shines through.","ja":"師匠に伝授され継承、また発展させたトマトソースが得意という若いオーナーシェフは、ステーキに使う肉も直接扱い、8時間以上のスゥヴィド過程を経て仕込んでいる。 日差しが差し込む端正なインテリアが店名のようにとても暖かい空間を感じさせる。"},"c":"고기·구이","g":"기장군","p":"0507-1420-4401","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20220511132220417_thumbL","lat":35.26711,"lng":129.23145,"v":3551,"l":4,"u":"https://www.visitbusan.net/index.do?menuCd=DOM_000000201002001000&uc_seq=1238&lang_cd=ko"},{"n":{"ko":"부산족발","en":"Busan Jokbal","ja":"釜山豚足"},"m":{"ko":"족발, 냉채족발","en":"Jokbal, Naengchae Jokbal","ja":"チョッパル(豚足),ネンチェチョッパル(冷菜豚足)"},"a":{"ko":"중구 광복로 13-1","en":"19-1, Gwangbok-ro, Jung-gu","ja":"中区光復路13-1"},"h":{"ko":"10:00-24:00","en":"10:00-24:00","ja":"10:00-24:00"},"x":{"ko":"연중무휴","en":"Open 365 days","ja":"年中無休"},"d":{"ko":"부평동 돼지족발골목에 위치한 족발전문점으로, TV 프로그램으로도 자주 소개되는 유명한 식당이다. 이 지역은 부산의 향토음식인 냉채족발이 탄생한 곳으로도 유명한데, 부산족발도 담백하고 탄력 있는 족발과 냉채족발이 유명하다.","en":"Located in Bupyeong-dong Jokbal Alley, this is a famous restaurant that is often introduced on TV programs. It is also famous as the birthplace of naengchae jokbal (cold tossed pork hocks), a local delicacy of Busan. The restaurant’s light and chewy jokbal and naengchae jokbal are popular.","ja":"富平洞の豚足通りに位置する豚足専門店で、テレビ番組でもよく紹介される有名なお店。この地域は、釜山の郷土料理である冷菜豚足が誕生した場所として有名である。このお店でも淡白で弾力のある豚足と冷菜豚足が味わえる。"},"c":"고기·구이","g":"중구","p":"0507-1412-5359","t":"https://www.visitbusan.net/uploadImgs/files/cntnts/20230608133922872_thumbL","lat":35.09
